<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>6年级 字卡与阅读</title>
<style>
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; height:100%; font-family:-apple-system,"PingFang SC","Heiti SC",sans-serif; background:#f4f1ea; color:#222; overflow:hidden; }
  #app{ display:flex; height:100%; }

  /* sidebar: 12 classes */
  #side{ width:96px; flex:none; background:#2c3e50; overflow-y:auto; -webkit-overflow-scrolling:touch; }
  #side button{ display:block; width:100%; border:none; background:none; color:#cdd6df;
    font-size:16px; padding:16px 4px; cursor:pointer; border-bottom:1px solid rgba(255,255,255,.06); }
  #side button.on{ background:#1abc9c; color:#fff; font-weight:600; }

  #main{ flex:1; display:flex; flex-direction:column; min-width:0; }
  #tabs{ display:flex; flex:none; }
  #tabs button{ flex:1; border:none; background:#e7e2d6; color:#555; font-size:17px; padding:12px 4px; cursor:pointer; }
  #tabs button.on{ background:#f4f1ea; color:#c0392b; font-weight:700; box-shadow:inset 0 -3px 0 #c0392b; }

  #deckView,#testView{ flex:1; display:flex; flex-direction:column; min-height:0; }
  .counter{ text-align:center; color:#888; font-size:14px; padding:4px; flex:none; }
  .autospk{ display:block; margin:0 auto 4px; font-size:13px; padding:4px 14px; border:1px solid #ccc;
    border-radius:14px; background:#fff; color:#888; cursor:pointer; flex:none; }
  .autospk.on{ background:#27ae60; color:#fff; border-color:#27ae60; }
  .stage{ flex:1; display:flex; align-items:center; justify-content:center; padding:8px; min-height:0; }
  .card{ background:#fff; border-radius:22px; box-shadow:0 6px 20px rgba(0,0,0,.12);
    width:100%; max-width:760px; aspect-ratio:3/2; max-height:100%; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:14px; padding:18px; }
  .pinyin{ font-size:clamp(28px,5.5vh,60px); color:#c0392b; letter-spacing:1px; min-height:1.2em; text-align:center; }
  #pinyin{ display:none; }   /* hide pinyin on flashcard decks (still shown in 测验 via #qpinyin) */
  .hanzi{ font-size:min(34vh,40vw); line-height:1; text-align:center; white-space:nowrap; }
  .speak{ font-size:28px; background:#3498db; color:#fff; border:none; border-radius:50%; width:60px; height:60px; cursor:pointer; flex:none; }
  .speak:active{ transform:scale(.92); }
  .nav{ display:flex; gap:10px; padding:10px 14px 6px; flex:none; }
  .nav button{ flex:1; font-size:20px; padding:14px; border:none; border-radius:12px; background:#2c3e50; color:#fff; cursor:pointer; }
  .nav button:active{ opacity:.7; }
  .nav button.on{ background:#e67e22; }
  .test{ flex:none; display:block; width:calc(100% - 28px); margin:0 14px 16px; font-size:20px;
    padding:14px; border:none; border-radius:12px; background:#27ae60; color:#fff; cursor:pointer; }
  .testRow{ flex:none; display:flex; gap:10px; margin:0 14px 16px; }
  .testRow .test{ width:auto; flex:1; margin:0; }
  .zuci{ background:#8e44ad; }
  .zuci.on{ background:#5e3370; }

  .opts{ display:grid; grid-template-columns:1fr 1fr; gap:10px; width:100%; max-width:560px; padding-top:8px; }
  .opts button{ font-size:28px; padding:14px; border:1px solid #ccc; border-radius:12px; background:#fff; cursor:pointer; }
  .opts button.right{ background:#27ae60; color:#fff; }
  .opts button.wrong{ background:#e74c3c; color:#fff; }
  .prompt{ font-size:22px; color:#c0392b; text-align:center; }
  .score{ text-align:center; font-size:18px; padding:6px; }

  /* 课文 / 整本书 reader */
  #keView{ flex:1; display:flex; flex-direction:column; padding:14px; gap:10px; min-height:0; }
  #keText{ flex:1; overflow:auto; -webkit-overflow-scrolling:touch; white-space:pre-wrap;
    font-size:24px; line-height:2; padding:14px; border:1px solid #ccc; border-radius:12px;
    background:#fff; min-height:0; text-align:left; }
  #keText .kc{ cursor:pointer; padding:0 1px; border-radius:4px; }
  #keText .kc:active{ background:#ffe08a; }
  #keText .kc.kseg{ background:#fdf0c2; }
  #keText .kc.khl{ background:#ffb347; }
  .keBtns{ display:flex; gap:10px; }
  .keBtns button{ flex:1; font-size:18px; padding:14px; border:none; border-radius:12px; color:#fff; cursor:pointer; }
  #read{ background:#27ae60; } #stop{ background:#e67e22; }

  .hidden{ display:none !important; }

  /* iPad / large landscape */
  @media (min-width:768px) and (orientation:landscape){
    #side{ width:120px; } #side button{ font-size:19px; padding:20px 4px; }
    #tabs button{ font-size:20px; padding:14px; }
    .card{ max-width:1000px; aspect-ratio:16/9; }
    .hanzi{ font-size:34vh; } .pinyin{ font-size:6vh; }
    .opts{ grid-template-columns:repeat(4,1fr); } .opts button{ font-size:36px; }
    #keText{ font-size:26px; }
  }
</style>
</head>
<body>
<div id="app">
  <nav id="side"></nav>
  <div id="main">
    <div id="tabs">
      <button data-tab="eka">字卡</button>
      <button data-tab="zika">两联字卡</button>
      <button data-tab="ke">课文</button>
      <button data-tab="after">课后阅读</button>
    </div>

    <!-- flashcard deck (字卡 / E字卡) -->
    <div id="deckView">
      <div class="counter" id="counter"></div>
      <button id="autospk" class="autospk"></button>
      <div class="stage"><div class="card">
        <div class="pinyin" id="pinyin"></div>
        <div class="hanzi" id="hanzi"></div>
        <button class="speak" id="speak">&#128264;</button>
      </div></div>
      <div class="nav">
        <button id="prev">&#8592;</button>
        <button id="shuffle" title="打乱顺序">&#128256;</button>
        <button id="next">&#8594;</button>
      </div>
      <div class="testRow">
        <button class="test" id="startTest">测验</button>
        <button class="test zuci hidden" id="zuciBtn">组词</button>
      </div>
    </div>

    <!-- test -->
    <div id="testView" class="hidden">
      <div class="score" id="score"></div>
      <div class="stage"><div class="card">
        <div class="prompt" id="tprompt">读拼音，选对应的字</div>
        <div class="pinyin" id="qpinyin"></div>
        <button class="speak" id="qspeak">&#128264;</button>
        <div class="opts" id="opts"></div>
      </div></div>
      <div class="nav"><button id="backToCards">返回</button></div>
    </div>

    <!-- 课文 / 整本书 reader -->
    <div id="keView" class="hidden">
      <div id="keText"></div>
      <div class="keBtns">
        <button id="read">&#128266; 朗读</button>
        <button id="stop">&#9208; 暂停</button>
      </div>
    </div>
  </div>
</div>

: "wèi"}]}], "kewen": {"1": "马鲁莎的爸爸在北极\n[俄罗斯]卡拉肖娃/著 韦苇译\n小马鲁莎的爸爸在北极工作，是北极科学考察队的一名队员。北极那个地方，没有城市，没有村庄，没有河流，四下里望去，只见大片大片的冰地和雪坡，整个北极是一个冰的世界。\n白熊却很容易见到。它们常常带着小熊来营地做客。它们站下来，瞅瞅科学考察队搭建的考察营，在冰地上翻几个跟斗，翻了一个又一个，翻哪翻哪，直到玩够了才慢悠悠地走开。它们一点儿也不怕人，因为人从来没有伤害过它们。\n直升机常给马鲁莎爸爸他们带来家信和邮包、新鲜的水果，以及各种各样的生活必需品。直升机离开的时候，又带走考察队员们捎给亲友的信件，带走他们的种种嘱托。\n飞机给科学考察队送来的信件中，有一封信是马鲁莎写给爸爸的。她在信中说，爸爸说的那些白熊太好玩了，她太喜欢它们了。要是她有一头小白熊，只要一头，她一定让它在洗衣盆里洗澡，带它到花园里去溜达。她一定会和小白熊玩得很好的，她的小伙伴们都会来看它，来和它玩。\n爸爸读过马鲁莎的信，就想：为什么不给女儿弄到这份快乐呢？马鲁莎的妈妈也喜欢小动物哇！他们家旁边就是商店，店里能买到鲜肉，这样小白熊最喜欢的食物也有了。小白熊长大了以后好送给动物园。他就把他的想法写信告诉了自己的女儿。\n逮小白熊是不难的。小白熊摇摇摆摆走得很慢，虽然是四条腿，跑起来却比人慢得多。小白熊可以请直升机捎回去，到机场转乘普通客机。请服务员发个电报给马鲁莎和她的妈妈，让她们来接航班，这样不是很妥当吗？\n一切都考虑当了，马鲁莎爸爸就开始留心雪地上走过的小白熊。他运气不错：一天早晨，他走出营房，发现雪地上有一团白茸茸的东西。那是一头小白熊，它正不时用煤粒般乌溜溜的黑眼睛四下里瞅着，四条腿在冰地上费劲地走动。\n马鲁莎爸爸伸手把这团白茸茸的小家伙捧了起来，它躺在爸爸的手套上，像躺在摇篮里似的，一副很舒服的样子。\n就在这时，一头大白熊从一块大冰块后头转出来，大步流星地直向自己的小白熊走来。很快，母子俩碰在一起了。妈妈在雪地上躺了下来，娃娃用后腿站起来，娃娃的小脸贴上妈妈的大脸。妈妈的脸准是刺巴巴的，可小熊不怕刺着疼，就那样紧紧地亲着。这时，熊妈妈从冰上坐了起来，眯缝起眼睛，亲昵地抚摩着自己的孩子。母子俩根本不管马鲁莎爸爸就站在它们身旁。爸爸走开了，回到营房里。\n晚上，大家都在写信，好让飞行员带走。马鲁莎爸爸也给自己的女儿写信。\n“小马鲁莎，我不能给你捎小白熊去了。”爸爸写着，“你别难过。我知道，我生生拆开熊妈妈和它的娃娃，是不应该的。你可以想象一下，要是有人把你从我们身边带走，将会怎么样呢？小熊对新的生活会不会不习惯？我和你觉得我们的城市是世界上最好的地方，而对白熊来说，这北极是最美妙的地方了。就让它生活在它出生、它喜欢的地方吧！”\n“吻你，今天特别想你。”\n马鲁莎的爸爸这样结束了自己的信。", "2": "奇怪的雨伞\n张秋生\n熊妈妈和她的宝宝小熊姑娘出门。\n天下起雨来了。\n熊妈妈撑开一把漂亮的雨伞，熊妈妈和小熊姑娘听小雨点儿在伞上跳着舞、唱着歌。\n为了不让雨点儿打湿小熊姑娘的衣裳和头上的蝴蝶结，熊妈妈总是把雨伞伸向小熊姑娘那一边……\n雨停了，熊妈妈收起了雨伞。\n小熊姑娘摸摸自己身上，一点也没淋湿，她再一瞧，妈妈半边身子全湿了。小熊姑娘说：\n“怎么我身上没湿，妈妈的身上却湿了，真是一把奇怪的雨伞啊！”\n小熊姑娘长大了，她也当上了妈妈。\n有一天，小熊妈妈抱着自己的宝宝小熊弟弟逛街。天上开始飘下雨点儿。小熊妈妈打开了漂亮的小雨伞，他们一起听小雨点儿在伞上唱歌、跳舞。\n为了不让小熊弟弟淋着雨，不让小雨点儿打湿他的衣服和新买的小足球，小熊妈妈总是把小雨伞往小熊弟弟那边靠。\n天晴了，小熊妈妈收起雨伞。\n小熊弟弟瞧着自己身上和手里的小足球一点没湿，小熊妈妈却湿了半边身子，他说：\n“这真是一把奇怪的小雨伞。”\n小熊妈妈说：“是的，从前我妈妈也有一把这样的雨伞。”", "3": "一天只有一次清晨\n（中国台湾）林武宪\n号手的金喇叭已经吹起，\n小鸟也唱着甜美的歌儿叫你。\n别再贪睡了，\n别再留恋着梦里。\n你可知道，\n一个美好的日子在等着你。\n花儿露出鲜艳的面孔向日出敬礼，\n树上的松鼠也正欢欣地跳跃。\n别再贪睡了，\n别再留恋着梦里。\n你可知道，\n一个清新的日子在等着你。\n请记着——\n一天只有一次清晨，\n别让这可爱的时刻，\n像水消失在沙里。\n你，为什么不和太阳比赛早起？\n\n钟走得太快了\n叶圣陶\n上午，妈妈对三个孩子说：“下午三点钟，我和你们看戏去。”兄弟三个都很高兴。\n吃过了午饭，他们拨动了钟上的针，对妈妈说：“两点三刻，我们去吧。”\n他们走过戏场，一个看客也不见。\n妈妈说：“两点三刻出门，到这里不会这样早。一定是我们的钟走得太快了。”\n\n丢掉了一天\n[俄罗斯]符·奥谢耶娃\n一位同学来找维佳的哥哥。他把棉帽朝椅子上一摔，说：\n“我这一天算丢掉了！”\n等那位同学走了以后，维佳问他的哥哥：\n“怎么会把一天丢掉了呢？难道每天不都是一样的吗？”\n“每天在时间长短上都是一样的。”哥哥说，“可按做的事情多少来说，并不是每天都是一样。如果一个人在一天时间里，什么有益的事也没做，什么东西也没学到，知识也没有比昨天增加，这一天就算丢掉了。”\n从这天起，每当上床睡觉的时候，维佳就把他所做的一切事讲给哥哥听，并且总要问上一句：\n“我这一天不算丢掉了吧？”", "4": "火把花\n吴然\n六月，火把花开了。\n我们这座小小的山村，我们这座要走许许多多山路才走得到的遥远的小山村：六月，火把花开了！\n村前的水塘边，青石板铺的村道两边；\n溪边，水流湍急的碓房和磨房那儿，潮湿的长满墨绿色青苔的卵石垒砌的墙边；\n我们山村小学的校门口，我们的篮球场旁边和跳远的沙坑旁边。\n艳红的火把花，你开得多么热烈呀！\n从每一家的小院里伸出来；从一团一团的绿树里伸出来；你玫瑰色的红光，闪耀在我们这个小小的山村。山村里的每一条小路，都被你照亮了；每一条小路上，都有你飘落的花瓣。\n啊，火把花，你真是仙女的火把吗？我听阿奶讲，有一位美丽的仙女，她要到我们这个小小的山村里来。茂林密箐，山道弯弯。仙女打着火把走着，无数晶亮的火星，围在她身旁飞舞。当她终于走到村口的时候，公鸡叫了，太阳公公惊醒了！仙女一声叹息，将火把插在地上。太阳出山以前，仙女飞走了。霞光中，燃烧的火把变成满树红花……\n告诉我，火把花，你真是仙女的火把吗？\n一个雨后的早晨，我去上学。粉红色的薄雾里，有雀鸟的鸣叫声；有木碓的舂米声；有牛铎清响的叮当声；有羊群出厩时的咩咩声……突然，我看见我们的老师，我们的老师在校门口的火把花树下！火把花明艳地映照着，她淡黄色的衬衣上，隐约有一层红光。她在打扫校园，在轻轻地扫着被夜雨打落的花瓣。啊，难道我们的老师，就是那位举着火把的仙女吗？她从城里来到我们小小的山村，走了多少弯弯的山间小路哟！她来了，好教我们唱歌，教我们识字，教我们算术，教我们画画……啊，她是，她就是举着火把的仙女，她举着知识的火把！\n火把花哟，六月里盛开的花！你满树红花如同燃烧的火把，照亮了遥远的小山村，照亮了我们——山村里的小学生。", "5": "节日的饭桌\n我不是个好厨师，\n可我顶愿意做饭。\n在节日的饭桌上，\n我实现了自己的心愿。\n黄铜的火锅，黑色的炭，\n涮羊肉我最喜欢；\n一条葱烧大鲤鱼，\n味道又嫩又鲜。\n再让大朵的蘑菇，\n坐在对虾旁边；\n白色是奶油的颜色，\n看一眼都让人发馋。\n最后添几根菠菜，\n绿色的菜叶象征春天；\n春节时送给爷爷，\n他准会乐得胡子直颤！\n妈妈不许我进厨房，\n我只好在画纸上冒险。\n我做的饭菜虽没有香味儿，\n可是能让你保留到永远……", "6": "蝰蛇的太阳浴\n[苏联]维·比安基/著 许杨/译\n这时节的太阳暖极了！是最适合蝰蛇好好晒个太阳浴、舒活舒活筋骨、抖擞抖擞精神的时间了！\n每天早上，这些蝰蛇都费力地爬向一个一个的矮树墩，在太阳底下暖着因为寒冷而凝冻的血液和尾巴。等到它们晒暖了，就开始寻思怎么用它们的毒牙来捕捉青蛙和老鼠了。\n\n蚂蚁窝微微动起来了\n[苏联]维·比安基/著 韦苇/译\n在一棵枞树下面，我们找到一个大蚂蚁窝。起先，我们还以为这只不过是一堆子什么废弃物和老针叶，却想不到它竟会是一个蚂蚁城堡——真的，一只蚂蚁也看不到呢。\n春阳一照，堆堆上的雪化了，蚂蚁就纷纷出来晒太阳了。几个月的冬眠之后，它们已经变得非常虚弱。粘连在一块儿，黑乎乎的一团，躺在蚂蚁窝上。\n我们拿过一根小棒棒，轻轻拨拉它们。它们只稍稍动了动，连用蚁酸来刺激我们的力气都没有。\n它们还得过几天才能重新开始干活呢！", "7": "谁醒了\n[苏联]维·比安基/著 许杨/译\n我们常常会用修辞的方法说出这样一句话：春天睡醒了！\n真是这样简单吗？\n依我们看，睡醒的不只是春天，更是春天的万物！\n现在，我们可以看到蝙蝠们睡醒了，夜里的晴空是它们的运动场和狩猎场。生得扁平的步行虫、圆鼓鼓的蜣螂、好玩的磕头虫都睡醒了。\n睡醒了的磕头虫们不太乐于老实待着，它们乐于向人们展示那让人头昏脑涨的魔术：如果你把它仰面朝天地放下，它会把脑袋在地上磕得啪啪作响，然后趁你不注意时，后腿儿一蹬，在空中来个转体，最后会像体操运动员一样平稳着陆。\n一场春雨过后，泥土露出了本来的芬芳，棕红色的蚯蚓宝宝开始松土了；新鲜的蘑菇也长出来了；蒲公英开花了，一朵一朵黄橙像是绿色海洋里的明星一样受人瞩目；桦树的叶子一一展开了，这让它光秃了一冬的枝干犹如披上了仙女的羽衣。就这样，动物们的粮仓也就要开了！\n春天的池塘慢慢活跃起来，青蛙妈妈们离开水藻里的温床，产下一个个卵以后就跳上岸参加森林里的派对，然而，与之相反，北螈现在忙不迭地由岸上赶回水里。\n在列宁格勒，孩子们把北螈称为“百螈”。这种动物身体漆黑又带有些许橙黄，它们有长长的尾巴，这让它们看起来比青蛙更像蜥蜴。到了冬天，它们会离开池塘移居到林子里，然后，把头埋进湿漉漉的青苔。醒来的还有癞蛤蟆，它们陆续开始产卵。和这些家伙的卵不同，青蛙的卵看起来像一团一团的胶状物漂在水里，上面有一个个的鼓泡，而每个泡泡里又都有一个黑点。癞蛤蟆的卵则是附着在一条带子之上，这条带子紧紧地粘在水下的水草上，保证了这些卵的安全。", "8": "（本周没有课文）", "9": "森林清洁工\n[苏联]维·比安基/著 许杨/译\n在寒冷的冬日里，常常会有这样的悲剧发生：在一场严寒袭来时，一些可怜的鸟儿和小野兽还没做好过冬的准备，它们一只只地被冻僵，随即又被一场一场的冬雪埋在底下！当春暖花开、万物复苏、冰雪融化时，它们再也不能睁开眼睛，而是暴尸荒野了。\n不过，大自然不会让它们这样在地上待太久，那些出来觅食的乌鸦、熊、喜鹊、甲虫和蚂蚁，或是其他的森林清洁工都会兢兢业业地把它们收拾走的。", "10": "大树与雁鹅\n朱维丽/编写\n一日，庄子在山林中漫步，看见一棵大树，又高又粗，枝叶繁茂。伐木人停在树旁，却没有砍伐它。\n庄子觉得很奇怪，上前询问原因。\n伐木人说：“这棵树不成材，没什么用处。”\n庄子若有所悟：“这棵树因为材质不好，没有用，才能够自然生长，活得长久哇！”\n出山之后，庄子留宿在友人家中。友人很久没见庄子，特别高兴，就叫童仆杀鹅款待他。\n童仆问主人：“一只能叫，一只不能叫，请问杀哪一只呢？”主人说：“杀那只不能叫的。”\n山中的大树，因为没有用处而能活下来；家鹅，因为不会叫、没用处而被杀。两者都是无用，命运却截然相反。看似矛盾的两件事，因取舍的标准不同，境遇也会不同。把握分寸，找出规律，才能顺应自然。", "11": "露珠·汽水\n荷叶上的露珠，\n小青蛙的汽水，\n喝一瓶，张张嘴，\n捉起害虫不怕累。\n草叶上的露珠，\n小螳螂的汽水，\n尝一口，弹弹腿，\n两把大刀头上挥！\n树叶上的露珠，\n小画眉的汽水，\n吃一颗，唱两声，\n歌声追着白云飞。\n太阳公公做汽水，\n每天都要送一杯。\n懒娃娃，喝不上，\n——问你后悔不后悔。", "12": "蚂蚁与蟋蟀\n[古希腊]伊索/著 韦苇/译\n谁都知道，蟋蟀的小提琴拉得不错，所以它动不动就开歌舞晚会。“来吧，来同我们一起唱歌跳舞吧。”只要天气好，蟋蟀们就请大家来举行舞会。\n天下最悠闲的，就数蟋蟀了。而天下最忙碌的要数蚂蚁。\n最悠闲的蟋蟀劝最忙碌的蚂蚁说：“能快活的时候不快活，这日子也过得太没有意思了。来吧，来参加我们的舞会吧。只有傻瓜蛋，才天天忙个不停地干活。”\n蚂蚁像是没有听见，还干它们的活。\n炎热的夏天到了，蚂蚁还在不停地干活。蟋蟀又来劝蚂蚁：“啊呀，可怜的蚂蚁兄弟，这河边阴凉，快到河边来跳舞吧。”\n蚂蚁像是没有听见，还一门心思干它们的活。\n蟋蟀妹妹看着人家都在干活，只有蟋蟀天天悠闲，就疑惑起来，说：“哥哥，咱们玩得太多了，瞧，蚂蚁它们才了不起。”\n“能不干活，又能过快活日子，了不起的是咱们哪！”蟋蟀哥哥已经养成了懒惰的习惯，他压根儿就不想干活。\n秋天来了。到处有丰盛的果实。大家开始忙着准备过冬，蟋蟀的舞会尽管还天天开，蟋蟀的提琴声尽管还像往日那么快乐，可大家没有这么多工夫来跳舞了。蟋蟀家的客人一天比一天少了。\n蟋蟀妹妹觉得，人家都这么忙碌，只有自己这么悠闲，好像不大对头。尤其是看着蚂蚁把过冬的粮食准备得那么充足，自己的家里还空空的，心里总是不踏实。\n不久，冬天来了。\n寒风阵阵吹来。蟋蟀夏天时漂亮的房屋变成了一堆枯叶，寒风呼一阵吹来，枯叶就都刮跑了。\n“啊呀，冷啊，真冷啊！”\n蟋蟀这么叫着，它们当然再没有心思拉琴跳舞了。它们快活的日子让北风吹得没踪没影了。\n到处是枯草。“冷啊冷啊”的叫声从枯草丛中传来。\n冷还不算，肚子的饥饿更叫蟋蟀们难受呢。它们在枯草丛中走着，寒风送它们去借粮食。\n远处有灯光。\n“那儿准有人家。”蟋蟀哥哥挽扶着妹妹，拼命向灯光走去。\n它们一路摸索着，来到亮着灯光的窗下。它们往里看，看到温暖的炉火正旺旺地冒着火舌，桌子上摆满了各种好吃的菜。这是蚂蚁的家。\n“好了，有救了。咱们就请蚂蚁留下咱们俩，咱们就在蚂蚁家里过冬吧。”蟋蟀哥哥说。\n可蟋蟀妹妹悲伤地说：“哥哥，蚂蚁不会留咱们在它们家过冬的。你想，蚂蚁它们为了能过上这样的日子，夏天多忙啊！而你还讥笑过它们，咱们没有脸面去求蚂蚁帮助哇。”说着，把哥哥从蚂蚁的窗下拉开了。\n蚂蚁做梦也没有想到蟋蟀会在外面，会瑟瑟抖颤在它们的窗下。因为它们怎么也想不到，这样寒冷的日子里，还会有谁在呼啸的北风中行走。", "13": "九方皋相马\n朱维丽/编写\n春秋时期，伯乐是秦国有名的相马能手，秦穆公很器重他。\n有一天，秦穆公召见他，说：“你的年纪大了，在你的子孙中间，有没有谁可以派去寻找好马的呢？”\n伯乐回答：“一般的良马，它的特征很明显，可以从体形、外表、筋骨上观察出来。而天下难得的好马，没有固定标准，是很难捉摸的。它跑起来风驰电掣，尘土不扬，不留足迹。我的子侄们都是些才智低下的人，只能识别一般的良马，不能识别天下难得的好马。\n不过，我有一个朋友叫九方皋，他和我一起担过柴、挑过菜，这个人相马本领绝不在我之下，请您召见他。”秦穆公便召见了九方皋，派他去寻找好马。\n过了三个月，九方皋回来报告：“我已经找到好马了，不过它目前在沙丘那个地方。”\n秦穆公问道：“是匹什么样的马呢？”\n九方皋回答说：“是一匹黄色的母马。”\n秦穆公派人去把那匹马牵来，却是匹纯黑色的公马。\n秦穆公很不高兴，就把伯乐找来，对他说：“真是糟糕哇！你推荐的那个相马人，连马的毛色、公母都搞不清楚，他怎么能认出千里马呢？”\n伯乐长叹了一声，说道：“想不到哇，九方皋相马竟然达到了这样的境界吗？这就是他胜过我千万倍而无人能敌的地方啊！九方皋他所观察的，是马的天赋，而忽略了粗浅的表象；明悉它的内在实质，而忘记了它的外表。九方皋只看见他需要看见的，看不见他不需要看见的；只观察他需要观察的，而遗漏了他不需要观察的。像九方皋这样相马，包含着比相马更高的道理呀！”\n等到把那匹马牵回，大家发现，它果然是一匹千里马。", "14": "（本周没有课文）", "15": "海的思念\n是天外飞落的鸽群\n产卵在这半月形的海湾？\n是海底爱哭的海龟\n把宝宝存放在湿润的沙滩？\n或是人鱼们玩的弹子吧，\n一颗颗遗落在人间？\n不，更像是夜空溅落的星星\n在月光下一闪一闪。\n我拾起一枚枚卵石，\n也拾起圆润光滑的\n海的思念。\n在我的小书桌上，\n它们将代表大海\n把我陪伴……", "16": "兔子为什么成了三瓣嘴\n刘颖\n从前有座大山，山里有只大老虎。老虎个头大，胃口也大，动物们没有不害怕它的。\n有一只胆子大的小兔子特别有点子，竟然想制服这只大老虎。小兔子常常在树林里转悠。有一回，老虎也到树林里闲逛。小兔子远远地看见了，就躲在了一块大石头后面等着它。老虎来到大石头前，趴在地上准备休息一会儿。小兔子就装着好像从树林里冒冒失失冲出来的样子，来到了老虎的面前。\n老虎一看，一只小兔子自投罗网，非常高兴。可还没等老虎去抓这只小兔子，小兔子便开口对它说话了：“大王，请你不要吃我。你看我这小小的身体，连你的牙缝都填不满，你就饶我一命吧！我带你到那边山头去，那里有不少猎物等着你呢！”老虎一听，有点儿动心。\n小兔子又说：“我们一起走的时候，我说什么做什么，你一定要配合我。如果成功了，保管大王你想要多少美食就有多少美食。你的本事比狮子还要大，那些猎物就该属于大王你！”老虎一听，云里雾里地连连点头，就要跟小兔子走一趟。\n小兔子领着老虎，自己在前边走，一路上遇到了各种野兽。不管遇上谁，小兔子总要大声吆喝：“嗨，你们走开！看，老虎都老老实实跟在我后面，你们还不让开！”满山的野兽看见小兔子后面跟着一只大老虎，都吓得逃跑了。\n小兔子领着老虎漫山遍野地逛了整整一天，都感到很累。最后，小兔子领着老虎走到了悬崖上，老虎往地上一倒就睡着了。小兔子一看时机来了，就找来火种在老虎的身后点起了一堆火。火越烧越旺，眼看就要烧到老虎尾巴了。老虎睡得正香，觉得自己的尾巴被烤得滚烫，就问小兔子：“兔子、兔子，我的尾巴怎么这么热？”小兔子装着没睡醒的样子，迷迷糊糊地说：“你往旁边挪一挪就好了。”老虎往旁边挪了挪，谁知道火更近了，大火烧到了它的脊背。老虎喊：“兔子、兔子，这是怎么回事？我的背为什么也烤得慌啊？”小兔子说：“大王，你挪得太小了，挪得远远的就好了！”老虎还没有完全醒过来，就眯着眼睛用力一翻身，结果就从悬崖顶上掉了下去，一命呜呼了。小兔子成功了，高兴得三蹦两跳地走下山去了。\n走着走着，小兔子遇到了一个猎人，猎人身上背着三张狐狸皮，还拿着一杆枪。小兔子害怕猎人抓住它，赶紧走上前对猎人说：“猎人，告诉你一件好事，前面悬崖下有一只摔死的老虎，你赶快去把它背走吧！”猎人一听，忘了小兔子，连他的狐狸皮和猎枪也不要，忙着去找老虎去了。\n小兔子逃过了一劫，又往前走，遇见了一个放猪的人正赶着猪回家。小兔子害怕放猪的人拿棒子打它，就对他说：“猪倌儿，告诉你一件好事，前面坡上有九张狐狸皮和一杆枪，你赶快去拿吧！”猪倌儿一听很高兴，扔下猪群就跑了。\n小兔子又往前走，忽然从狼洞里钻出来一只狼。小兔子一看，连忙对狼说：“好心肠的狼，请你不要吃我吧！我告诉你一件好事，前面有一群肥猪，正没人看呢！”母狼一听，非常高兴，不顾洞里的小狼，就跑去抓猪了。\n小兔子又往前走，来到一片树林，一只鹰从窝里伸出头来盯着它瞧。“完了完了，鹰要来啄我的眼珠了。”小兔子想着就走上前去，大声说：“老鹰、老鹰，请你不要啄我的眼珠。我告诉你一件好事，前面有一个狼洞，洞里边有一群小狼，正好母狼不在家，你可以饱餐一顿了。”老鹰一听，就向狼洞飞去。\n小兔子脱了身继续往前跑。它跑到了一个屯子边，看见一个小伙子正在院子里晾晒渔网。它害怕小伙子用网捕它，就对小伙子说：“小伙子、小伙子，告诉你一件好事，山下林子里，一棵大树上有个鹰窝，现在鹰正巧不在窝里，你去把它的窝拆了拿回家烧火吧！”小伙子听了连忙扔下渔网，乐颠乐颠地跑去拆鹰窝。\n这时刮来一阵风。小兔子对风说：“风啊，你发发善心吧，刮得再大些吧！求你把这些渔网刮跑，那就救了我的命了。”大风“呜”地一吹，就把渔网吹得远远的。\n话说那个猎人扛着老虎发现自己丢了狐狸皮和枪，就急忙回来找，却看见猪倌儿正要拿回自己的东西，连忙去追猪倌儿。猪倌儿回头看见母狼正在咬自己的猪，就急忙去撵母狼。母狼转过头，看见鹰正要啄自己孩子的眼珠，赶紧去撵鹰。鹰飞回去看到小伙子正在树上准备拆自己的窝，扑扇着翅膀去赶小伙子。小伙子跑回家，发现渔网不见了，拔腿去追渔网，没人有空来逮小兔子了。\n小兔子九死一生，心里越想越高兴。乐呀乐呀，一路走一路跳，它乐得停不下来，结果没站稳，扑倒在地上，小嘴儿磕到了一块尖尖的石头上，把它的嘴唇磕成了三瓣。\n从此以后，所有的兔子一生下来，就是三瓣嘴。", "17": "金鱼\n红帽子，像燃烧的火焰，\n墨龙睛，像黝黑的木炭。\n火焰和木炭落进水里，\n变成游动的花瓣。\n金鱼在鱼缸里散步，\n吐着气泡，无比悠闲。\n我请它们挪到纸上，\n它们却摇头摆尾，\n不肯游进我的笔尖！\n我生气地扔掉了蜡笔，\n命令金鱼们“立正”，\n别再惹我心烦！\n金鱼却偏偏“向后转”，\n一点也不听从我的调遣。\n也许，鱼儿在水里，\n就像小鸟在蓝天。\n小朋友们在公园，\n谁也不乐意“立正”站着，\n除非他是傻瓜蛋。\n我又拾起了蜡笔，\n谁叫金鱼那么逗人喜欢。", "18": "猴子屁股为什么是红的\n刘颖\n从前的猴子全身披挂着长毛，屁股也不例外。可是，现在我们看到的猴子，屁股都是光溜溜红彤彤的，这是怎么回事儿呢？\n那是被一个老婆婆教训了。\n很久很久以前，山里住着一只老猴子，嘴巴很馋，树上的野果子、地下的笋子、河里的鱼，连天上的鸟它都想抓来吃吃。总之，只要能采到、摘到、捉到的，它都尝个遍。实在没有什么新鲜玩意儿了，它就打起了人的主意，想尝尝人的吃食。\n有一个老婆婆，常常去山里打柴，被老猴子发现了。老猴子就每天蹲在树上等老婆婆来。只要老婆婆一来，它就问老婆婆讨吃的。一点馒头、一点干饼，虽然老猴子觉得味道还不如树上的香蕉，但总算是有吃的。\n这一天，老婆婆又来打柴，老猴子也照例来了。“老婆婆，给我点吃的吧！”\n老婆婆今天带的干粮是煮熟的红薯。她掏出一个递给猴子。猴子一看，新鲜玩意儿，三口两口吞下肚，还没尝出味道就没了。猴子不过瘾，又问老婆婆要。老婆婆只好又给它一个。这次猴子尝出味道来了，比馒头和干饼强多了。猴子没吃够，还要。老婆婆说：“这是我今天的午饭，再给你，我就没有了，饿着肚子我砍不动柴呀！”\n老猴子生气了，嘴边的毛都被吹得飞了起来，它恶狠狠地说：“老婆子，不给我吃的，就让你瞧瞧我的厉害。今天晚上你在家等着！”老猴子说完，蹿上树，不见了。\n老婆婆担心得没心思打柴了，坐在石头上唉声叹气。想想自己孤苦伶仃一个人，要是老猴子来了，连个帮忙的都没有，老婆婆伤心得哭了起来。\n“不要难过，老婆婆，我来帮助你！”一个尖细的声音从树上传来，一只小黄鸟飞到了老婆婆的面前，“我来告诉你个好法子！”小黄鸟飞到老婆婆肩头，唧唧啾啾耳语了一番。老婆婆听了直点头。“老婆婆，快快准备！”小黄鸟叮嘱完，拍拍翅膀飞走了。\n照小黄鸟说的，老婆婆来到溪边，捉了几只螃蟹带回家。一回到家，她就把螃蟹放进了大水缸。又将一把绣花针扎在了门板上，还到猪圈挑了猪屎抹在门框上。最后在锅里蒸上一锅红薯，把火烧得旺旺的。一切准备停当，老婆婆躲床上，听着外面的动静。\n当天夜里，老猴子真的来了。它气势汹汹地用力将门一推，结果一碰到门就“嗷嗷”地乱叫起来。原来门板上扎满了绣花针，老猴子的两只爪子差点被钉在上面，尖利的绣花针刺得它眼泪直流。老猴子下了狠心，才把爪子拔了下来。这时候它的爪子血珠直冒，指头都弯不了。老猴子不敢再碰门板了，借着星光扶着门框，打算摸索着进屋。谁知，刚一碰到门框，立刻感到黏糊糊的，是什么呢？它正纳闷，便把爪子凑到眼前，一股臭烘烘的气味透过鼻孔直钻脑门。原来，那是老婆婆提前糊在门框上的猪屎。老猴子举着爪子进了屋，在屋里乱转。模模糊糊地，它看到屋子角落里放着只大水缸，赶忙蹦过去，不管三七二十一，一下子将爪子伸到缸底，想好好洗洗。爪子在水里还没搅和两下，突然觉得一阵钻心的疼，原来是被缸里的大螃蟹一下子钳住了爪子。老猴子痛得在房间里又跳又甩，可越甩蟹钳得越紧。螃蟹死死地钳住老猴子，老猴子转到缸边，使劲把爪子往缸边砸，“咚咚咚”砸了好一阵，螃蟹才松了钳子掉下去。\n这时，老猴子已筋疲力尽，又气又恨，不知道这屋子里还有多少陷阱。它不敢乱动，打算喘口气就抽身而退。可幽幽地，它好像闻到了阵阵香味。馋嘴老猴本来就饥肠辘辘，又吃了刚才一番苦，早就觉得倒霉透了，心想能弄点儿好吃的，也不算白白地遭罪了。\n老猴子爬起来，纵身跳上灶台，一屁股坐下去准备大吃一顿。谁知屁股刚坐到灶台上，就被烫得吱吱吱地冒起一股烟，痛得它连忙蹦下去，抱头就逃出了门外。不过，老猴子屁股上的皮毛已经被烫脱在了灶头上。\n此后，猴子的屁股就没了毛，总是红彤彤的。", "19": "棕叶的理想\n我们总是向天空\n伸出绿色的手掌——\n接甜丝丝的春雨\n接暖洋洋的月光\n接白云们的身影\n接鸟儿们的歌唱\n然后，变成一把芭蕉扇\n为人们在夏季里\n扇走湿漉漉的闷热\n招来笑眯眯的清爽\n是的，我们永远伸出的手\n不是为了索取而是为了报偿\n报偿大地妈妈深情的抚养\n我们的手直到今天\n还在向蓝天伸着\n伸向未来的远方", "20": "（本周没有课文）", "21": "摩天轮\n地球用一架秋千，\n把我送上蓝天。\n我摸着了白云的头发，\n我触到了太阳的红脸，\n我揪住风儿的尾巴，\n又轻又软……\n爸爸和妈妈，\n变成布娃娃。\n一只大鹰飞过，\n捎来他们的话。\n噢，让我从月球上，\n采一支七色花。\n\n碰碰车\n在这儿开车最快活，\n谁都不懂交通规则。\n碰碰车，\n碰碰乐。\n我碰歪了你，\n你撞退了我，\n越碰，越有趣，\n越撞，笑越多。\n真盼我们的生活，\n都像开碰碰车。", "22": "猫为什么总是在饭后洗脸\n[爱尔兰]罗斯·多布斯/著\n乔长森、朱云仙、谷翔/译\n从前，有一只猫饿着肚子去找东西吃，可是他不要吃老鼠，不要喝牛奶，也不要吃美味的鱼头，他想要吃与这些不同的东西。突然，他发现在他的前方有一只鸟。\n“啊哈！”猫想，“这正是我要吃的东西，这真是一顿美餐。”于是，猫蹲下身子，贴着地面轻轻地向那只鸟逼近，渐渐地，他挨近了这只鸟。再说鸟呢，他也在寻找食物。他正忙碌着从地里挖小虫吃，因而没有注意到猫已向他逼近。——哎呀，猫吃鸟，鸟吃虫，这本是大自然的规律，不过现在还是让我们继续讲这个故事吧。\n一眨眼的工夫，猫出其不意地向前扑去，用两只爪子牢牢地抓住了鸟，可怜的小鸟吓得简直喘不过气来。猫想到马上就能享用一顿美餐了，乐得眉飞色舞。但是猫并不想马上吞掉这只鸟，他先要戏耍这只鸟一番。你瞧，猫把鸟推来推去，假装放了他，然后又把他抓回来。被捉弄了一番后，这只鸟不再那么惊慌了，头脑也清醒起来，他开始寻找脱身的机会了。\n正当猫张口要吃他时，鸟说话了。\n“你现在就要吃掉我吗？”鸟很有礼貌地问。\n“当然喽！”猫说，“我就要吃了你，你没什么可反对的吧？”\n“我不反对，”鸟说，“我只是太失望了，我竟被一只吃东西不讲究规矩的猫吃掉了，这太使人丢脸了！”\n“不讲究规矩？”猫发怒了，他大叫，“谁说我不讲究规矩？”\n“我在这周围飞了很长时间，”鸟说，“从简陋的民宅到国王的宫殿，我到处都飞遍了，还没有见过一只猫——甚至是刚刚出生的小猫——在开始用餐前不先洗脸的。有教养的人决不会这么干的！”\n猫听完顿时坐了起来。“我和任何一只猫都一样，”他傲慢地说，“知道每次吃饭以前都必须洗脸。现在，你稍等片刻。”猫说完，放下鸟，开始洗起脸来。当然，就在这一瞬间，鸟感到自己自由了，他飞到了附近的一棵树上，安全了。\n猫饿着肚子，眼巴巴望着鸟飞去。“嗨，我真是活该！”他对自己说，“这是我轻信别人的结果。”\n自从这件事情以后，猫总是先吃东西然后再洗脸。", "23": "多多的害怕\n[南斯拉夫]勒奥波尔德·苏和杜尔干/著\n叶君健/译\n有天晚上，多多不愿意睡觉。\n“让我和我的火车玩一阵子吧。”他对妈妈说，“我要到海边去一趟，一定回来。”\n不过当他从海边回来后，他还下不了决心睡觉。\n“让我再画一张画吧。我要把月亮和星星画出来。”\n月亮和星星也都画出来了，但是多多仍然站着不睡。\n“我的肚皮饿了，妈妈。”多多说，“你不希望我空着肚皮睡觉吧？”\n最后，他被送去睡觉了。他在床上叫起来：“妈妈，让门开着！”\n接着他又喊：“妈妈，请过来，我害怕！”\n“你没有任何理由害怕，”他的妈妈回答说，“我就在这儿，在你旁边呀。”\n五分钟以后，多多又开始了：“爸爸，来，我害怕！”\n正好这时丁姆裁缝来了。\n“啊，丁姆，我多么高兴看到你啊！”多多叫出声来，“我非常害怕，我瞧见了许多东西……”\n“你害怕，你瞧见的是些什么东西？”丁姆问。\n“我看到一个人，全身漆黑。”多多低声说。\n“一个全身漆黑的人？你不认识他？这就是今天早晨来的那个扫烟囱的人哪。他打扫了二十七个烟囱，当然全身漆黑啰！你忘记了他，问题就出在这里。”\n多多说起他。但是他的脸色马上又变得严肃了：“我还瞧见一个人，全身发白……”\n“一个全身发白的人？可不要对我说你忘记了我们的邻居——那位面包师啦！头天夜里他揉了整整7车的面包和50个篮子的面包圈，你自己甚至还吃了两个啦。”\n多多承认他记起那个面包师了，但他还有最后一桩事害怕。他解释着说：“我瞧见一个巨人，他有一双铁做的腿。”\n丁姆想了一下，于是他便大笑起来：“有一双铁腿的巨人？一点儿也没有错！这正是在街上修路灯的那位电工。他正站在一架铁梯子上修电灯。你放学回家时看见过他的。”\n多多感到完全放心了，他马上也就睡着了。", "24": "胆小鬼\n[苏联]阿尔丘霍娃/著\n江礼海/译\n瓦尼亚胆子很小，害怕老鼠，害怕青蛙，害怕蜘蛛，甚至连毛毛虫也害怕，大家都叫他“胆小鬼”。\n有一天，孩子们在街头的大沙堆上玩，男孩子们用沙堆成堡垒，玩打仗的游戏，而瓦尼亚，则和自己的小弟弟安德留沙在边上给洋娃娃做饭。为什么不一起玩呢？男孩子们不要他们——瓦尼亚是“胆小鬼”，安德留沙打仗又派不上用场，因为他刚刚才会爬着走。\n突然响起了叫喊声。\n“长毛狗，长毛狗挣脱链子了？长毛狗来了！”\n“长毛狗，长毛狗！大家当心……”\n孩子们扭头一看，撒腿向四处跑去，瓦尼亚跑进旁边的小花园，“嘭”地推上了栅栏的小门。\n沙堆上只剩下小安德留沙一个人，四肢着地能爬多快呀？他跌坐在沙筑成的堡垒上，吓得哇哇大哭，那凶恶的狗正朝他跑来。\n瓦尼亚忘记了一切，飞快地从栅栏门里冲到沙堆上，一只手抓起小铁铲，另一只手抓为洋娃娃做饭的小煎锅，挺身站在堡垒前面，用身子护住安德留沙。\n长毛狗穿过草坪，冲着瓦尼亚凶狠地扑来。它没有吠叫，只是不住地打着响鼻。正当它张嘴龇牙，刚要扑到跟前时，瓦尼亚猛地把煎锅朝它掷去，随即又扔铁铲，并拼尽全力喊叫：\n“滚，滚一边去！”\n“啊呜，啊呜！长毛，快停下！”这当儿，看守人跑过来，一下子冲到瓦尼亚前面，把狗挡开了。听到主人的声音，长毛狗停住脚，摇起尾巴来，看守人给它套上脖链，牵着离去了。\n街头恢复了先前的平静，孩子们从各自躲避的地方钻了出来：这个从栅栏后面，那个从土沟里……慢慢都回到堡垒跟前。小安德留沙已经坐起身，一边笑着，一边用两只脏手抹去脸上的眼泪。\n谁知，瓦尼亚却哽咽着大哭起来。\n“你怎么啦，被狗咬伤了吗？”孩子们关心地问道。\n“不，”瓦尼亚低声回答，“它没有咬我……我只是害怕极了！”", "25": "竹笛和口琴\n分别了。\n你赠我一根竹笛，\n说这是南方的竹林\n留下来的记忆。\n你吹了一支小曲，\n曲未尽，先落下\n无声的泪滴。\n分别了。\n我赠你一只口琴，\n这里有北方的呼吸，\n有阳光、鸟啼、秋雨。\n我想吹点什么，\n不，我把我的话语\n全贮存了进去。\n你看不见这一切，\n你看得见这一切。\n你吹着口琴回到南方，\n留下竹笛，留下你\n七只大睁着的眼睛。\n会唱歌的眼睛\n为我和明眼的孩子们\n祝福——期冀……", "26": "魔奇魔奇树\n[日]齐藤隆介/著\n彭懿/译\n从来没有哪个孩子像豆太那么胆小，都五岁了，半夜里总该可以一个人上茅房了吧？可是，豆太说，茅房在外面，外面站着一棵大大的魔奇魔奇树，它的树枝像乱发一样遮住了天空，晃来晃去，沙沙直响，它还会“哇”地张开两只手。所以呀，半夜里如果没有爷爷跟着，一个人可不敢去尿尿。\n半夜里，爷爷睡得很香，但是，不管豆太用多么小的声音叫一声“爷爷”，爷爷都会立刻睁开眼睛问：“尿尿吗？”这总比把家里唯一的一床被子湿了要好吧！爷爷这么做，还因为他太怜惜、太疼爱豆太了，在山坡上的猎人小屋里，爷爷和豆太相依为命。\n其实，豆太的爸爸是个天不怕地不怕的人，他是在和熊搏斗时，被熊拍中脑袋而死的。至于爷爷，现在都六十四岁了，可一追起羚羊来，照样能从一块岩石跳到另一块岩石，让人看得心惊胆战。为什么只有豆太像个女孩子似的，白白净净，这么胆小呢？\n魔奇魔奇树，是豆太起的名字。它好大好大，就在小屋的门口。\n一到秋天，魔奇魔奇树就会抖落下好多亮闪闪的褐色果实。爷爷用木杵捣、用石臼碾，把果实弄成粉，再捏成年糕蒸了吃，味道好极了。\n“喂！树，魔奇魔奇树，快把果子给我！”白天豆太站在树下，跺着一只脚，神气活现地催人家，到了夜里怎么就不行了呢？豆太说，因为树会发怒，会从上面伸出两只手吓唬他说：“妖怪来啦！”夜里，只要看一眼那棵魔奇魔奇树，就尿不出尿来了。爷爷蹲下来，把豆太抱在腿上：“啊，多美的夜晚哪！星星好像伸手就能够到。后山里的鹿哇、熊啊什么的，全都点着花灯笼睡着了吧！来吧，嘘——”爷爷要是不说“嘘——”，豆太就尿不出来。不尿尿就睡觉，第二天早上，被窝里就会发“洪水”。所以爷爷一定要这么说。都五岁了，还要说“嘘——”，真是羞死人了，可是不说不行啊！\n传说，今天晚上，是魔奇魔奇树亮灯的日子。爷爷说：“农历十一月二十日丑时三刻呀，魔奇魔奇树会像着火一样亮起来。别睡觉了，看着吧，可漂亮了！我小时候看见过。你死去的爸爸说，他也看见过。那是山神在举办庆典，每次只有一个小孩能看见，而且必须是个勇敢的孩子！”\n“那……我……肯定不行……”豆太小声地说，眼泪都快掉下来了。爷爷和爸爸都看见过，自己当然也想看。可是，在这么冷的冬天的夜里，一个人出去看魔奇魔奇树，想起来就哆嗦，这怎么可能呢？虽然说所有的树枝都会亮起来，大树会一下子光芒四射，简直像梦一样美，豆太还是在心里悄悄地说：“要是在白天，我也愿意看……”可是在夜里，光是想想，他就要尿裤子……所以，豆太从一开始就死了心。他钻进被窝，把鼻子贴在爷爷那散发着烟味的怀里，天一黑就睡着了。\n半夜，豆太突然被惊醒了。因为他听到，头顶上传来熊的呻吟声。“爷爷……”豆太拼命地想搂紧爷爷，爷爷却不在。“豆……豆太，别怕别怕，爷爷……爷爷只是肚子疼。”枕头边上，弯曲着身子像熊一样呻吟的，竟是爷爷！\n“爷爷！”豆太又惊又怕，朝爷爷扑了过去。可是爷爷咕咚一声倒在席子上，咬着牙，呻吟得越来越厉害了。\n得赶快去叫医生！豆太像小狗一样，弯着身子，撞开前门，撒腿就跑。\n豆太穿着睡衣，光着脚丫，朝着半里路外的山脚下跑……\n星星挂满了天空，月亮也出来了。路上铺着一层白白的霜，像雪一样。霜扎着脚丫，脚丫流血了。豆太一边跑一边哭，因为他又疼、又冷、又害怕。可是，没有什么比最爱的爷爷死去更可怕！豆太一边哭，一边坚持着朝医生家跑去。\n医生也是一位上了年纪的老爷爷，他听了豆太的话，“噢、噢……”地应着，用棉罩衣裹住药箱，和豆太在深夜中沿着山路，吃力地朝爷爷的小屋爬去。\n半路上，奇妙的事情发生了。月光中，雪花一片一片飘落下来。这是今年冬天的第一场雪。豆太在棉罩衣里看着这场雪，用脚丫咚咚地踢起了医生的腰。不知为什么，他觉得爷爷就要死了。\n到了小屋门口，豆太又看到了另一幅不可思议的景象：魔奇魔奇树亮起来啦！\n这时，医生说：“啊？哦，可不是嘛，真像点灯一样。不过，那是因为月亮正好爬到了七叶树背后，树枝之间还有闪闪发亮的星星。再加上雪，看上去就像点了灯一样。”医生说完，就走进了小屋。后来外面发生的事情，豆太就不知道了。因为他一直在帮医生往炉子里添柴、烧开水，忙得不得了。\n第二天早上，爷爷的肚子不疼了。\n医生走了以后，爷爷说：“你看到魔奇魔奇树亮灯了。你敢一个人走夜路去叫医生，已经是个勇敢的孩子，以后不要再把自己当胆小鬼了！人哪，只要有一颗善良的心，就没有干不了的事，连别人看了，都会大吃一惊的。哈哈哈！”\n话是这么说，可爷爷病好的那天夜里……“爷爷呀——”豆太去尿尿时还是要叫醒爷爷。", "27": "夜泳\n星星在天空絮语，\n蟋蟀在草丛弹曲。\n夜的大海在呼唤，\n我们跳了进去。\n晒了一天的海水，\n温暖中又沾点儿凉意，\n谁啄我的脚丫？\n一条顽皮的小鱼。\n海水里充满莹光，\n游一下就闪动着涟漪。\n每当我划动手臂，\n就搅起珠光宝气。\n真像在水晶宫里，\n和仙女们一起游戏，\n更像在美丽的梦境，\n奇幻中带几分神秘。\n哪怕到了爷爷的年纪，\n我也不忘夜泳的奇趣……", "28": "贪玩的雾姑娘\n张秋生\n白雾也有贪玩的时候。\n她们从夜晚跑了出去，一直玩到清晨还不想回去。\n她们笼罩着森林；\n她们笼罩着小路；\n她们笼罩着一座座灰色、红色的小屋子。\n这些调皮的小丫头，她们拖着长长的白纱裙，到处奔跑着。\n于是，飞出森林的小鸟再也找不到森林，找不到自己的家；\n于是，上学去的小孩看不清小路；\n于是，老奶奶打开灰色、红色小砖房的窗户，只见白茫茫的一片。\n小鸟说：“雾姑娘，快回去吧，我要找着森林回窝了。”\n小孩说：“雾姑娘，快回去吧，我要沿着小路上学去了。”\n老奶奶说：“雾姑娘，快回去吧，我要在窗口望着老爷爷在溪边钓鱼呢……”\n调皮的雾姑娘说：“我不回去！”\n雾姑娘的姐姐白云生气了。\n她告诉了太阳公公，太阳公公披着满身的金光来了。\n他慈祥地看着、笑着。\n雾姑娘们被强烈的太阳光照射着，都睁不开眼睛了，她们东绊西撞着。\n哈哈，调皮的雾姑娘拖着长长的白纱裙子逃走了，逃得没影儿了。\n小鸟、小孩子、老奶奶都笑了，齐说：\n“谢谢你，好心的太阳公公！”", "29": "雪人之歌\n[美]霍桑\n这儿是美国的一座小镇。一直在盼望暴风雨停歇的贝奥莱特和弟弟皮奥尼欢快、兴奋地跑到外面。\n“皮奥尼，用白雪堆个我们的妹妹怎么样？”\n“好哇，我们堆吧！”\n他俩立即扫起雪花，开始塑造女孩形象。经过他俩的塑造，雪堆渐渐地呈现出人的轮廓。“最后用冰块来点缀眼睛吧。”贝奥莱特和皮奥尼将冰块镶嵌在女孩的眼眶里，雪花堆积的女孩立刻像真的一样。火红的晚霞染红了女孩的头发。\n“姐姐，这女孩的头发应该是金色的！”\n“她的脸蛋好像火红的晚霞！”\n他俩觉得奇怪：晚霞躲进云彩，她的脸色依然通红不褪。\n“可嘴唇还是雪白的。”\n“亲一下怎么样？”\n皮奥尼把脸颊贴着女孩的嘴唇，于是那女孩的嘴唇微微启动，染成了淡红色。\n“哎呀，她是谁呀？”一直担心两个孩子的妈妈探出头来，见到个陌生的女孩，便心里嘀咕着。\n“妈妈，这女孩是我们的妹妹呀！”\n“是我们用雪花塑造的！”\n他俩和女孩一起欢快地跳起舞来。“肯定是附近的女孩子。”妈妈见了心里这么想。\n正巧父亲干活回来，他瞧见那个女孩便说：“寒风凛冽，怎么能让孩子穿单薄的衣服跑出来呢？那孩子的父母也太无情了！”父亲气愤地握着女孩的手硬拖她进屋。\n“爸爸，这个孩子是用雪花堆的。”\n“穿得太单薄可要冻死的哟！”姐弟俩拼命拉住父亲，而他们的父亲却根本不信他俩说的。\n“我们的妹妹会死的呀！”皮奥尼哭喊着。妈妈见了心里便犹豫起来：说不定孩子说的是真话。\n“难道会有那种蠢事！”父亲有点儿担心，于是跑到装有火炉的房间瞧瞧女孩的模样。\n那女孩究竟怎么样了呢？坐在椅子上的女孩的身影消失了，只剩下融化的冰块。父亲惊呆了——那孩子肯定回自己家里了，所以才变成这样的。父亲暗自思忖着：那椅子上留下的融化的冰块是什么呢？\n“爸爸真傻！我们的妹妹不是成了冰块嘛！”父亲看见皮奥尼抽抽搭搭地哭泣，也感到困惑了。\n从那以后，贝奥莱特和皮奥尼再也没有堆过雪人。", "30": "（本周没有课文）"}, "after": {"1": "童诗写作七十五\n放假了没有考试，没有试卷，没有握手，没有拥抱，我们就在屏幕对面挥手说“再见”了！我们只做了大半年的这一班同学，只教了我们大半年的这一班老师，只面对面玩了大半年的这一班朋友，就要说再见了！心里面不知道是愉快，还是不舍，或许还有一些难过，脸上的泪珠怎么就不听话地滑落了下来？我的三年级就这样没有了，我的四年级就这样消失了，我已经小学毕业了！明年一定给你们每个人一个大大的拥抱！\n干将莫邪剑\n春秋时期，有一位有名的工匠，他的名字叫干将。楚王听说他很会铸剑，就要他给自己造一把天下最锋利的宝剑。\n干将和妻子莫邪去五座大山里采来了最好的矿石，然后他们支起了炉子，开始铸剑。但是三个月过去了，干将仍然没有把剑造好。妻子莫邪就问丈夫，“为什么会这样呢？”干将说，“我也不知道呢！”莫邪问，“铸剑是不是还需要别的东西呢？”干将说，“我记得以前师父铸剑碰到问题的时候，师父和师母就跳进了炉子，把自己的身体和矿石一起铸成了最好的宝剑。”\n听丈夫这样讲，聪明的莫邪就说，“我想到了一个主意，不需要杀死自己，也能完成铸剑的任务”。她于是剪断了自己的头发和指甲，把它们扔进了炉子，没想到宝剑真的铸成了。铸出的宝剑一共有两把，雄剑叫做干将，雌剑就叫莫邪。\n在宝剑铸成之后，干将告诉妻子，“我们一共用了三年的时间才把宝剑铸成，楚王一定觉得太慢。他如果一不高兴，就会把我杀死。现在你已经有了我们的孩子，我现在就把雄剑藏起来，如果孩子生下来是一个男孩儿，等他长大过后，你就告诉他藏剑的地方，让他拿这把剑为我报仇。”\n干将于是把雄剑藏起来，只把雌剑背去献给了楚王。楚王看到宝剑后非常高兴，可是一试就知道干将献来的不过是把雌剑，一怒之下就把干将杀死了。\n莫邪知道自己的丈夫被杀死了，非常伤心。几个月后，她果然生了一个儿子，名字叫做赤。赤长得非常可爱，就是一对眉毛分得特别开，两道眉毛之间有一尺那么宽。莫邪就给他起了个小名叫“眉间尺”。\n赤长大过后，就问他的母亲：“我的爸爸去哪里了？”妈妈莫邪就说，“你的爸爸为楚王铸剑，用了三年的时间，楚王不高兴，就把他杀死了。你爸爸去世的时候藏了一把宝剑，他要你用这把宝剑为他报仇。”赤在一块大石头下果然找到了那把雄剑，他每天都想着报仇的事情。\n有一天楚王做了一个梦，梦中看见一个眉毛分得特别开的少年，提着一把剑向他冲来，大声喊道，“我要替我的爸爸报仇。”\n楚王惊醒过后，就想捉住这个梦中的男孩儿。他让人画出这个少年的样子，在全国到处张贴，赤只好躲到了山里。在山里的时候，他想到自己没办法给自己的爸爸报仇，心里面非常难过，于是就放声唱起歌来，歌声里充满了悲伤。\n这个时候，一位义士正好听到了赤的歌声，就问：“小朋友，你年纪这么小，为什么唱出来的歌却这样悲伤呢？”赤回答说，“这位义士，你可能不知道，我是干将和莫邪的儿子，楚王把我的爸爸杀了，我想要报仇呢！”义士说，“我已经听说这件事情了，楚王正在四处找你，他说谁要是提着你的人头去找他，就给那个人很多的奖赏。你一个小孩子是无论如何也报不了这个仇的。我可以帮你，但是你要把你的人头和宝剑交给我呢！”\n赤说，“宝剑就在这里，你现在就可以拿去。可是除非我死了，要不然你怎么能得到我的人头呢？”义士就说，“如果你相信我，请把宝剑和人头给我，我会帮你报仇的！”\n听到义士这样说，赤说，“这样太好了！”话音刚落，他就举起宝剑，割下了自己的头，趁着身子还没有倒下去的时候，双手将头与剑捧到了义士面前。\n义士说，“放心吧，我是不会辜负你的！”义士于是拿着赤的头来见楚王。楚王一见仇人的儿子已经死了，非常高兴。义士说，“这可是勇士的头呢。让我们烧热水来煮烂它。”楚王就答应了义士的要求。\n可是煮了三天三夜，头都没有煮烂，赤的头还从水里面跳了出来，用眼睛狠狠地盯着楚王。\n义士看到这样的情形，便高声对楚王说，“楚王，这小儿的头老是煮不烂，你如果亲自来看一眼的话，小儿的头就一定会烂了！”楚王真的走到锅边，伸长脖子往里看。哪知道，就在这个时候，义士拔出了宝剑，把楚王的头砍了下来，这一下，楚王的头也掉进了大锅里。\n这时赤的头一下子猛扑过来，咬住了楚王的耳朵，两个头开始在锅里咬了起来。突然，楚王的头一下子咬住了赤的头，赤眼看就要被打败了。看到这样的情形，义士举起宝剑把自己的头也砍了下来，让自己的头也加入到这一场人头大战中。\n义士的头一掉进去，马上咬住了楚王的脖子，楚王很痛，松开了嘴巴。赤回过头来，也一口咬住了楚王的喉咙，两个人一起，终于把楚王的头咬死了！就这样，赤报了自己的杀父之仇。", "2": "", "3": "草船借箭\n在三国时期，有一位非常聪明的人，他的名字叫诸葛亮，大家都叫他孔明先生。当时，北方的曹操派出一百万大军，想要消灭南方的东吴。东吴的将军叫周瑜，他带领东吴的大军，准备在长江上和曹操的大军决一死战。诸葛亮这时也来到了东吴，一起帮助东吴对抗曹操。虽然周瑜现在需要诸葛亮一起对抗曹操，但是他却总想找机会为难诸葛亮，因为他觉得诸葛亮比自己聪明，心里很不服气。一天，周瑜问诸葛亮，“诸葛先生，曹操的一百万大军就在眼前，我们马上就要和他们在长江上进行决战。水上作战，您认为最重要的武器是什么？”诸葛亮说，“大江上作战，最重要的武器当然是弓箭！”周瑜马上说：“您说的跟我想的一样，只是我们现在最缺的就是弓箭，能不能请您造十万支箭出来。这件重要的事情，我想您一定可以办到！”诸葛亮当然知道周瑜没安好心，不紧不慢地说道：“当然可以，不知道这么多弓箭什么时候要呢？”周瑜一看诸葛亮答应了，连忙说，“十天就要，您可以办到吗？”十天造出十万支箭是根本不可能的事，可是没想到诸葛亮却回答说，“不用十天，我只要三天就可以了！”周瑜大吃一惊，说：“啊？开这样的玩笑，在军中可是要杀头的！”诸葛亮回答说，“如果三天交不出十万支箭，任由您处罚！”周瑜心中暗自高兴，心想，“就算诸葛亮是神仙，三天也交不出这么多箭，这下有理由杀掉他了！”诸葛亮回去后，周瑜就让自己的手下鲁肃每天去看诸葛亮在干什么，谁知道一天、两天过去了，诸葛亮什么也没干。诸葛亮心里知道鲁肃是个好人，就对他说：“您知道周瑜想要杀我，我三天怎么可能造得出十万支箭呢？请您一定要救我！”鲁肃说：“这都是您自己答应的，我怎么能救得了你呢？”诸葛亮说：“先生如果真的想救我，就请借我二\n十条船，每条船上要士兵三十人，船的两边插上一千个草人，到了第三天晚上，您就知道我要干什么了！”鲁肃点点头，答应了诸葛亮的请求。到了第三天的夜里，江上突然起了大雾。江面上白茫茫的一片，什么也看不清。诸葛亮请鲁肃上了船。鲁肃说：“孔明先生，我们这是要去哪里啊？”诸葛亮回答说，“我们正向曹操大军的方向前进！”听诸葛亮这样说，鲁肃吓坏了，“要是敌军杀过来，我们不就是去白白送死吗？”诸葛亮笑着说，“不用担心，江上雾气这么大，曹操的军队可不敢冲杀过来，我们只管喝酒就是了！”这时，诸葛亮命令士兵敲响战鼓，大声叫喊。鲁肃更害怕了，着急地说，“先生，您这样不就会吵醒曹操的军队吗？”诸葛亮说，“是呀！我正想吵醒他们呢！”曹操的士兵听到鼓声和叫喊声，看见雾气中的战船，连忙报告曹操。曹操一看船上站满了士兵，耳边听见“咚咚”的战鼓声，马上下令，“这么大的雾，敌人大军突然来攻打我们，一定有埋伏，大家赶快放箭把敌人射退！”嗖嗖嗖，千万支箭像雨点一样射了过去，全都射在了草人的身上。才一会儿，船上一边的草人身上都插满了箭。诸葛亮让人又把船头掉转了一个方向，让船的另一边对着曹操的军队。没过多久，二十条船的草人身上都插满了箭。这时候，雾气慢慢散开，诸葛亮命令士兵一齐大喊：“多谢曹丞相送箭！多谢曹丞相送箭！”等曹操看清雾气中不过是二十来条船时，再追已经来不及了。回到岸边，从二十条船上取下的箭堆得像一座小山，远远不止十万支。鲁肃睁大眼睛，惊奇地说，“孔明先生真是太厉害啦！”周瑜听说后，也只能叹气说：“诸葛亮的学问和智慧，我真的是比不上啊！", "4": "苦肉计\n诸葛亮草船借箭后去见周瑜，周瑜对他说，“孔明先生真是神人呀！让人佩服！” 诸葛亮说，“我只不过用了一个小计谋，算不了什么！”周瑜请孔明坐下喝酒。周瑜问，“虽然我们已经有了足够多的弓箭，但是要打败长江北面曹操的百万大军，可不是一件容易的事情。先生您有什么好的办法吗？” 诸葛亮笑着说：“都督肯定已经有了主意，我也正好有一个办法。我们都先别说出来，把心里想的写在手心里，看看我们想的是不是一样？” 周瑜高兴地说：“好！”两人拿来笔墨，先暗自写在手掌心中，然后同时打开手掌。两人一看，周瑜的手中写的是一个“火”字，孔明的手中，写的也是一个“火”字。周瑜小声说，“就这么办，先生可千万不要声张出去！”周瑜的手下有一员大将，名叫黄盖。黄盖这天夜里来见周瑜说：“敌军人多，我们人少，我们坚持不了太久，为什么不用火攻呢？”周瑜一听，吃了一惊，问道：“这是谁想到的办法？”黄盖说，“全是我自己的主意，没有其他人知道。” 周瑜说，“我正想这么干！但是我们还要有一个人向曹操假装投降，火攻才能成功！老将军愿不愿意去向曹操假装投降？”黄盖说：“只要能打败曹操，我一定依照您的命令去做！”周瑜于是把他的计谋小声告诉了黄盖。\n这天早上，东吴军队中的将领全部到齐了，诸葛亮也来了。周瑜对大家说：“曹操的军营连起来有三百里那么长，他的百万大军已经准备好了。请大家准备三个月的粮草，让我们和曹军决一死战！”周瑜的话还没说完，一个白胡子将军黄盖却站出来大声说：“曹操人多，我们人少，如果这个月我们不能取胜，这个仗也没什么好打的，我看我们干脆投降算了！”周瑜一听，把桌子一拍，生气地说：“还没有开战，就有\n人想投降！来人！把黄盖给我绑起来，推出去斩了！”黄盖大声叫道；“周瑜小儿，你算老几，我跟随主公作战的时候，你还没有生下来呢！”周瑜一听，更加生气了，大喝一声：“今天不把你斩了，手下的将军就再也不会听从我的命令！”下面站着的众人都吓傻了，一齐跪在地下说，“都督别生气！黄盖确实该杀，但是大战之前，先杀掉自己的将军，对我们没有什么好处！请都督收回您的命令！”周瑜说：“如果不是看在大家的面子上，今天我一定要杀了黄盖。来人呀！给我把黄盖拖下去狠狠地打一百军棍。”大家又苦苦求饶。这次周瑜再也不听，命令士兵将黄盖按翻在地，用力地打了起来。只听“啪！啪！啪！”打到第五十棍的时候，黄盖的皮肉都已经裂开，痛得晕了过去。大家又来求情，“都督请住手！再打，就要把黄将军打死了！”周瑜这才说：“让他敢在军中小看我，后面的五十棍，先记下来，以后再打！”大家扶起黄盖，只见黄盖已经被打得皮开肉绽，鲜血长流。扶他起来的时候，黄盖又昏死过去好几次。旁边的人看见了，心中都难过极了。\n鲁肃晚上去看望黄盖，回来了去见孔明，对孔明说：“先生，您可真是一个狠心的人呀！”孔明一听，笑着说，“您为什么这么说？狠心的是你们的都督才对！”鲁肃说：“今天都督打黄盖的时候，大家都着急得不得了，只有先生在那里就像没事儿一样，您为什么不向都督求情呢？”孔明哈哈大笑，“先生是真的不知道，还是假的不知道？”鲁肃说：“我从来没有说过假话，什么叫‘真的不知道’，什么又叫‘假的不知道’？”孔明说：“您真的不知道，今天都督打黄将军，是一个愿打，一个愿挨，不过是他们演的一出苦肉计吗？”鲁肃这才明白过来，原来周瑜把黄盖打得这么狠，是为了要曹操相信，黄盖是真心向他投降的。", "5": "火烧连环船\n黄盖被周瑜打了过后，写好了一封投降信，让人送给曹操。黄盖在信里说，“等我伤好了，就带着士兵来投降，丞相只要远远看见船上插着青色旗子的，就是我来投降的船。”这个时候，曹操的士兵因为大多从北方来，不习惯在水上作战，晕船的人越来越多，很多人生病，还有病重死去的。曹操每天都在为这件事情发愁。这一天，曹操听说来了一位名叫庞统的人想见他，曹操知道庞统非常聪明，马上请他进来。曹操先领着庞统参观了水军，就问他打败东吴的办法。庞统笑着说，“丞相的水军果然十分强大，但是我知道丞相您一直担心一件事，北方的士兵不习惯水上作战，很多人现在都生病了。我有一个办法，不知道丞相想不想知道？”曹操一听，高兴极了，大声说：“先生请快讲！”庞统说：“其实很简单，只要把大小船只分成三十艘或者五十艘一排，然后用铁链锁起来，船和船的中间再放上宽大的木板，人和马都可以在上面行走，这样就算再大的风浪，士兵们也不会晕船了！”曹操听了拍掌说：“有了这样的好办法，我们一定可以打败东吴的军队了！”谁知道，这又是周瑜用的一个计。庞统原来是周瑜派来的，他给曹操出了一个连环计，就是要曹操把所有的船连在一起，只要一只船烧起来，被铁链连在一起的船全都会烧起来。曹操不是没想到敌人会用火攻，但是现在是冬天，曹操的军队在长江的北边，而东吴的军队在长江的南面。也就是说，只有吹东南风，火才会烧到北边的船。可是冬天的长江上，只有西北和北风，哪里会有东南风呢？\n一切都准备好了，现在周瑜只差东南风了，这就是我们常说的一句话：“万事俱备，只欠东风”。没有东南风，周瑜急得生了病，躺在床上，饭也吃不下，觉也睡不香。诸葛亮这时候来见周瑜，对他说，“我知道都督为什么生病。请都督派人在山上建一座法坛，让我在上面做法，我就能给都督借来三天三夜的东南风！”周瑜一听，马上从床上跳下来说，“哪需要三天三夜，只要一晚上的东南风，就足够打败曹操了！”其实诸葛亮并不会什么法术，只是观察最近长江天气的变化，知道风向在几天之后就会有变化。周瑜心里一直不相信诸葛亮能借来东南风，每天让人仔细观察风向的变化，可是江上一直吹的都是西北风。但是这天夜里，士兵突然向他报告：“都督，风向已经变成了东南风！”周瑜马上让黄盖向曹操送信说，明天夜里，就来投降，只要看到船头插着青色的小旗子，就是投降的船只。第二天夜里，黄盖一切都准备好了。他的船里装满了干草和油，还有引火的燃料，而不是他在信里说的粮草。曹操站在大船上，远远看到从南边来了二十条小船，船头都插着青色的旗子。小船离曹操越来越近，这时，旁边的人突然说，“丞相，我们中计了！您看，今天夜里刮的是东南风，小船为什么看上去这么轻，里面装的不是粮草，而是引火的干草！”曹操大叫一声：“不好！”可是小船这时候已经离大船越来越近了，只见黄盖一招手，二十条装满了干草和油的小船突然着了火，朝着曹操的大船冲了过来。曹操的大船一下子着了火，一整排用铁链连在一起的船想逃也逃不掉，全都烧了起来。很快，曹操所有的船都着了火，整个天都被烧火了，把江面照得和白天一样。船上的士兵有的被烧死，就算跳了水的，也被冰冷的江水给淹死了。这时，东吴的船只全部出动，向曹操的水军杀了过来。曹操只好带着一小队人马，赶紧逃命去了。", "6": "逃命的曹操大笑了三次\n曹操的船被烧了过后，带着一小队人马向北逃走，一路上火光冲天，再加上后面追兵的喊声，吓得曹操胆战心惊。曹操的人马不敢睡觉，逃了整整一晚上，后面的火光和人声才越来越远。\n到了天快亮的时候，曹操的军马逃到了一片树林前。只见前面的树丛很密，两边的山又高又险，曹操问手下的人：“这是什么地方？”手下的人回答说：“ 丞相，这是乌林的西边。”曹操坐在马上，突然“哈哈哈”地大笑了起来。大家觉得奇怪，问道：“ 丞相为什么大笑呢？”曹操说：“我笑的不是别人，我笑周瑜和诸葛亮不够聪明，如果他们在树林中埋伏一路兵马，我们就一个也逃不掉了！”曹操的话还没说完，树林中突然响起一阵鼓声，一队人马从里面冲了出来，带头的是大将赵子龙。他叫道：“曹操，我在这里等你好久了，看你往哪儿逃？”曹操哪里敢上前应战，吓得赶紧逃跑。赵子龙也没有追赶，让曹操的军队逃走了。这时候天已经亮了，忽然下起了大雨，士兵的衣服都淋湿了，大家又冷又饿，就去旁边的村子里抢来一些食物，准备找一个地方生火做饭。走着走着，来到了一个山口，曹操问手下，“前面是什么地方？”手下的人说，“前面是葫芦口，山口就像葫芦一样窄。”曹操说，“我们到葫芦口前休息一下。”大家走到葫芦口前，下了马，开始生火煮饭，士兵们把湿了的衣服脱下来，放在火上烤干。曹操仔细看了看葫芦口，又“哈哈哈”地大笑了起来。手下的人问道：“ 丞相刚才一笑，笑出了赵子龙。现在为什么又笑呢？”曹操说：“我还是笑周瑜和诸葛亮不够聪明，如果他们在葫芦口里埋伏一路兵马，把出口堵死，我们就一个也逃不掉啦！”曹操的话音还没落，只听一阵大喊，两边的树林着起火来，从中间冲出来一个黑脸的将军，他大声叫道：“曹操，看你往哪里逃！”原来是\n张飞的军队杀过来了，他奉了诸葛亮的命令，已经在这里等了很久了。曹操的军队刚被火烧了，看见树林起火了，害怕极了，衣服也不要了，跳上马就逃。张飞的军队倒是没有堵死葫芦口，只是冲杀了一阵，就把曹操的军队放走了。等追兵远了，曹操一看大家，真是狼狈极了，不仅又累又饿，还有不少人受了伤。正走着，前面的人说，“报告丞相，前面有两条路，请问走哪一条？”曹操问：“哪条路近？”士兵说：“通往华容道的那条路近，但是路窄，又刚下过雨，军马很难走。另外一条路更平，但是路更远。”这时大家突然看到，在华容道的方向有烽烟升起，大家心想，华容道上一定有敌人。谁知道这个时候曹操大声说：“我们走华容道！”大家都觉得奇怪，有人问：“华容道那里一定有敌人，我们为什么还走华容道呢？”曹操得意地说，“诸葛亮让人在华容道放火，他想我们肯定不敢走华容道了，他的大军现在正在大路上等着我们呢！我偏偏不中他的计！”下面的人都说：“ 丞相真是太聪明了！”天刚刚下了雨，又是冬天，华容道上又窄又滑，大家又累又饿又冷，马蹄陷在泥地里动不了，士兵们都累得倒在地上。曹操气得大叫：“谁要是再不快走，全部砍头！”士兵们只好继续往前走，生怕走得慢了被曹操杀头。眼看就要走到华容道的出口了，大家都停下来休息，曹操抬头看了看两边的高山，又看了看前面狭窄的出口，突然又在马上大笑了起来，“诸葛亮啊，你还是不够聪明，如果在这儿埋伏一支军马，我们可不就是死定了吗？”曹操的话音刚落，突然从华容道口冲出一队人马，领头的将军大声说：“曹操，诸葛亮军师派我到这里来活捉你，我已经在这里等你很久了！”这一次诸葛亮又派了哪位将军来活捉曹操呢？", "7": "曹操和关羽\n大家抬头一看，华容道上领头的将军，可是天下最厉害的关羽呀！只见红脸长须的关羽拿着青龙偃月刀，骑着高大的赤兔马，带着一队军马挡在了华容道的出口。就在大家没了主意的时候，曹操手下的一个人对他说：“ 丞相，关羽是个英雄，丞相过去对他有恩，我们今天落了难，只要丞相亲自去向关羽求情，他一定会放过我们的！”曹操没有别的办法，只好打马上前，大声说：“关将军，上次一别之后，还好吗？”关羽回答：“谢谢丞相关心，这次我是奉了诸葛军师的命令来捉拿你的！”曹操说，“关将军，过去我对你有恩，今天我带着一些残兵败将，你真的忍心捉住我吗？”\n原来关羽过去被曹操捉住过一回，当时关羽被围在一座土山上，身边还带着他大哥刘备的夫人。为了保住刘备夫人的性命，关羽只能投降，但是他要曹操答应他，一有刘备的下落，就会立刻离开曹操，去找刘备。曹操心想，“只要关羽愿意投降，我好好对他，他以后就不会去找他的大哥了！”曹操于是答应了关羽的要求。关羽投降过后，曹操经常给他送去金银珠宝，关羽什么也不要，都交给了刘备的夫人收起来。每过三天，曹操就要请关羽参加一次小宴会。每过五天，曹操就要请关羽参加一次大宴会。\n有一天，曹操看见关羽穿在身上的绿色战袍已经旧了，就让人马上送来一件五彩织锦做成的新战袍。关羽把新衣服穿在了身上，可是却还把那件又破又旧的袍子穿在外面。曹操觉得奇怪，问他这是为什么？关羽说，“旧的袍子是大哥送我的，穿着就像看见了大哥，我可不能有了新衣服，就忘记了大哥！”\n又有一次，曹操看见关羽骑的战马又小又瘦，就让人牵来一匹全身黑红色的战马。曹操说：“关将军，这可是天下最好的战马，可以日行千里，你看它浑身红色，名叫赤兔马。”关羽一看，真是高兴极了，大声说：“真是太好了，一有了大哥的消息，我就可以骑上它，就算大哥在千里之外，也可以一天之内就回到他的身边了！”曹操一听，心里真是又生气又后悔。\n不久后，关羽果然知道了大哥的下落，他马上骑上赤兔马就去找刘备了，曹操给他的礼物他却一点儿都没带。听说关羽要走，曹操也没有派人追赶，他对手下的人说：“关羽真是一个非常重义气的人啊，你们都应该向他学习！”在路上，关羽杀死了曹操六个将军，通过了五座关口，才最后回到了刘备身边。\n这次在华容道上，却是关羽抓住了曹操。听曹操提起以前的事，关羽大声说：“我以前帮你杀过两个敌军的大将，已经报答过您的恩德了！”曹操又说，“将军，你可别忘记了，你过五关杀死了我六员大将，如果我那时派军追杀你，你早就见不到你的大哥啦，这份情，你还没有还呢！”\n关羽一听，也不知道该怎么回答。就在这时，曹操那边的人都跪在了地上，大声哭着说：“关将军饶命！关将军饶命！”看见这些受了伤，在寒风中大声呼喊的逃兵，关羽真的是下不了手啊！\n可是放走了曹操，回去又怎么向军师交待呢？关羽想了半天，长长地叹了一口气，坚定地挥了挥手说：“你们走吧！”曹操一听，高兴地说：“关将军真是一个有情有义的人，谢谢关将军！”\n放走了曹操的关羽，回去之后并没有被杀头。他有情有义的做法，被人们永远记在了心里。", "8": "有勇有谋的关羽\n这一次，关羽带领着军队进攻樊城，樊城的守军是曹操的将军曹仁。曹仁派了七支军队驻扎在樊城城外，准备与关羽决一死战。\n关羽这一天来到了城外的一个高地，向樊城的方向望去，只见城外的山谷里到处都是曹仁的军队。离樊城不远的地方流过的是襄江，这时正好是秋天，刚刚下过几天的大雨，襄江里的水又急又猛。\n看到这里，关羽有了一个主意，他对手下的人说，“马上准备好船只，准备和曹军交战！”大家不明白，有人问：“关将军，陆地作战，怎么用得上船只？”关羽回答说：“曹操的军队守在山谷中险要的地方，那里地势很低，现在正是大雨的时候，襄江的水大，只要我们挖开襄江，就可以水淹七军。那时候我们坐在船上，就可以杀光曹军了。”\n这天夜里，风雨大作，曹操的军队忽然听见四处响起了战鼓声，大家正在慌忙准备应战的时候，突然看见四面八方的大水一下子淹了过来。曹操的士兵吓得乱跑，被水冲走的人，更是数也数不清。为了不被水淹死，士兵们丢掉武器和盔甲，都逃到了不远处的高地上。\n这时，关羽的士兵在水里划着大船，大声喊叫着，冲了过来。几条大船把站在高处的士兵围了起来，关羽的士兵一齐放箭，把曹操的军队射死了一大半，其他的人也只好投降了。大水淹了好几天，才慢慢退去。\n打败了城外的军队，关羽领着军队向樊城的北门进攻，关羽骑着赤兔马，在城门外面大声叫道：“曹操的军队都听好了，想要命的就赶快\n投降！”关羽正在说话的时候，曹仁看见穿着绿色袍子的关羽就在城楼下面，急忙让五百个弓箭手一齐放箭，一支箭射中了关羽的右胳膊，关羽一下子从马上掉了下来，关羽的士兵赶紧把关羽救了回去。\n回去把箭拔下来一看，原来是一支毒箭，毒已经进入了骨头。关羽的右胳膊又青又肿，已经不能动了。有人说，“听说有一个叫华佗的医生，是一个神医，可以找他来治病。”这一天，关羽正在和手下的人下棋，有人报告说，华佗来了。华佗进来看了看关羽的伤口，说道：“这是一支毒箭，毒已经进入了骨头里，如果再不治的话，这条胳膊就怕没用了。”关羽问：“请问先生，该用什么药治呢？”华佗说：“我有治的办法，但是就怕您害怕不敢治！”关羽说：“我早就视死如归，有什么好怕的，快快说给我听，该怎么治！”华佗说，“我在地上立一个大柱子，上面钉上一个大铁环，把您的胳膊穿在里面，再用绳子绑紧，最后用布把你的脸盖住，这样你就不会害怕了。我再用刀割开皮肉，用刀刮去上面的毒，这样就可以了！”关羽笑着说，“这太容易了，也不用什么柱子和铁环了，来吧！”\n关羽把胳膊伸出来，还和手下下着棋，一点儿没有害怕的样子。华佗拿着尖刀，让人拿着一个盆子在关羽的胳膊下接血。只见他用刀割开皮肉，一直割到骨头，中了毒的骨头已经变成了青色。华佗拿着刀刮骨头，旁边的人都不敢看，只是还能听到刀刮骨头的声音。关羽一边喝酒一边吃肉，一点儿也不说疼。只一会儿，血已经装满了盆子。刮好了，华佗给伤口上了药，再用线缝起来。关羽大笑着说：“先生您真是天下第一神医啊！这么快就把我的毒治好了！”华佗说：“我当了一辈子的医生，将军是我见过最勇敢的人啊！”", "9": "刘备三顾茅庐\n刘备是汉朝王室的后代，他的爸爸是中山靖王刘胜。刘备少年的时候，家里非常穷，父亲很早就死了，他的妈妈靠织席子卖草鞋为生。刘备家旁边有一棵很高的桑树，远远看上去就好像车盖一样，来来往往的人都觉得这棵树不平常，这家一定会出贵人。刘备小时候玩耍的时候，还指着桑树说：“等我当了皇帝，我就坐着这样有盖子的车出行。”听到这些，家里人都吓得让他别乱说话。汉朝末年，黄巾军起义，刘备也建立了一支军队，加入了镇压黄巾军的战斗。这一年刘备正在荆州，听人说隆中住着一位大贤人，名叫诸葛亮，字孔明，人称卧龙先生。他决定和他的两个兄弟关羽和张飞一起去隆中请孔明出山来帮助他。到了隆中，问到了孔明的住处，刘备三人来到孔明的屋子前。敲门后，出来了一个童子。童子问：“请问这位是谁？”刘备说，“你只管说刘备前来拜见孔明先生就行了！”童子说：“我家先生正好不在家，早上就出门了。”刘备问：“你家先生去哪里了呢？”童子说，“我也不知道。”刘备又问：“那先生什么时候回来？”童子说：“有时候出去三五天，有时候十几天，我也不清楚！”没有找到孔明，刘备有点儿失望。旁边的张飞却有点儿着急了，大声说：“既然先生不在家，我们就回去了吧！”刘备三人只好骑着马回去了。过了几天，刘备让人去孔明家打探一下，看看孔明是不是已经回来了。回报说，卧龙先生已经回家了。刘备听说孔明回来了，赶紧让人准备马匹。张飞说：“不过就是一个乡下隐居的村夫，大哥您不用亲自去，叫个人把他请来就得了。”刘备听了生气地说：“孔明是当今天下的大贤人，怎么能随便说叫就叫来呢？”于是骑上马亲自去见孔明。这个时候正是冬天，刚走了不久，天上突然下起雪来，寒风吹得人脸都疼。张飞抱怨说：“这么冷的天，连仗都不能打，还要去见这个没\n什么用处的人，还不如回家躲躲风雪！”刘备说，“这样的天气去见孔明先生，才能让他知道我们的诚意。三弟要是怕冷的话，就先回去吧！”张飞听了，大声说：“我死都不怕，别说怕冷了。我只是替大哥担心，怕您白费功夫！”来到了孔明屋子前，刘备上前敲门，问童子说：“先生今天在家吗？”童子说：“先生正在堂上读书呢！”刘备开心极了，跟着童子进了屋。只见一个少年，正在堂上吟咏着诗歌。等他读完了，刘备行礼说：“刘备早就听说先生的大名，今天特地冒着风雪来拜见您！能见到您，真是太荣幸了！”那个少年慌忙回礼说：“将军是不是刘备？是要见我的哥哥吗？”刘备惊讶地问：“难道先生不是孔明吗？”那少年回答说：“我们家兄弟三人，孔明是我的二哥。昨天他和朋友相约，出去游玩了！”刘备说：“你知道先生去哪里了吗？”少年说：“有时候去江上划船，有时候去朋友家喝酒，有时候找友人下棋，我也不知道呢！”刘备一听，失望地说：“唉，可惜两次都没见到孔明先生！”张飞在旁边着急地说：“孔明反正也不在，风雪这么大，我们赶紧回家去吧！”刘备对那个少年说：“过几天我们再来拜见孔明先生，这一封信，请您一定亲手交给先生！”说完就离开了。过了些时候，刘备又想去见孔明。关羽说，“是不是孔明没什么学问，故意躲起来，不敢见我们？去了几次都见不到。”张飞说：“这次大哥干脆别去了，找条绳子，把他绑了来！”刘备生气地说，“你真是太无礼了！我们要见的可是世上的大贤人，你们要是去的话，可不能无礼！”于是三个人骑着马又朝隆中去了。离孔明的房子还有半里路，刘备便下马步行。三人来到房门前敲门，只见童子开门，刘备忙说：“请你告诉先生，刘备专门来拜见先生。”童子说：“先生今天在家，但是这会儿正在堂上睡觉呢！”刘备说，“这样的话，我们在堂前站着等一会儿，等先生睡醒了，再请你通报！”三人在堂下等了好久，也不见什么动静。张飞大怒道：“这个孔明，让我们在这儿等着，只管自己睡觉，看我去后面放一把火，看他起不起来？”", "10": "隆中对\n正当张飞大声叫喊的时候，只见堂上的孔明翻了一个身，只是还没起来，又朝里睡着了。童子这个时候想去通报，刘备说：“别惊动了孔明先生，让先生再睡一会儿！”结果刘备、关羽和张飞三个人在堂前又站了一个时辰，这个时候孔明才醒，口中念着一首诗道：“大梦谁先觉？平生我自知，草堂春睡足，窗外日迟迟。”看到孔明醒了，童子连忙上前说，“刘皇叔在外面站着等候先生多时了！”孔明赶紧起身，上前迎接刘备。刘备一看，眼前的诸葛亮，高高的个子，头戴方巾，身上穿着一身长袍，飘飘然有神仙的样子。\n两人坐下后，刘备说，“早就听说先生的大名，只可惜两次都没能见到您，上次还给您留下一封信，不知道先生您看到了吗？”孔明回答说：“我不过是一个在南阳隐居的读书人，哪里值得将军这么多次来看望我。那封信我已经看过了，从信里就可以看出，将军您是一位替国家和人民着想的人！”\n刘备说：“先生是天下的大贤人，我今天就是专门来向您请教的！”孔明说：“将军过奖了，我不过是在田间耕种的一个闲人，哪里敢指教将军您啊？”刘备说：“自古那些有才华的人，他们的志向是救国救民，而不是在山间隐居，请先生替天下的百姓着想，给刘备讲一讲您的想法！”\n孔明笑着说：“请问将军的志向是什么呢？”刘备说：“当今天下大乱，是因为奸臣当道，作为汉室的后裔，刘备想要复兴汉室，伸张天下大义！”\n孔明说：“将军请想一想，现在天下的英雄都有谁。最强的是北方的曹操，他有百万大军，连天子都要听他的命令，这样强大的敌人，我\n们只能躲避他的锋芒。再看看江东的孙权，因为有长江的天险，已经经历了三代君主，他们可以成为我们的朋友。\n将军现在应该先得到荆州，这里是南北的交通要冲，把荆州作为您的立足之地，之后再向西边用兵，夺取益州，这是上天给您的安排！您想一想，益州易守难攻，沃野千里，那里被称为天府之国。如果您能立足荆州，再得到益州，就可以成就大业，复兴汉室了！请将军仔细想一想我刚才说的话。”说完，孔明让童子取出一幅地图，挂在房间中间。诸葛亮指着地图说：“将军请看，这是益州的地图，将军想要成就大业，应该先取荆州为家，然后再取益州，这样就成了曹、吴、刘三家瓜分天下，三足鼎立的形势。到了那一天，将军您再进攻中原，就可以复兴汉室了！”\n刘备看了看地图，高兴地说：“先生的一番话，解答了我所有的疑问，就像拨开云雾重新看见了青天！在这个小小的草屋里，先生为我计划好了三分天下的大事，您真是天下难得的人才啊！先生一定要出山帮助我！”\n孔明说：“乡间耕地读书的生活十分悠闲，亮实在不愿意出山做官！”听孔明这样说，刘备含着眼泪说：“先生要是不出山，那天下的百姓该怎么办呀？”说完，眼中流下了眼泪。看到刘备的诚意，再想想他三次来到茅庐都是为了找自己，孔明于是说：“谢谢将军的厚爱，亮愿效犬马之劳！”\n在隆中的草庐里，年轻的诸葛亮为刘备制定了三分天下的大计，诸葛亮的这些对答被后人称为“隆中对”，刘备也按照诸葛亮的计划，夺取了益州，还在成都称帝，建立了蜀汉王朝，成就了大业！", "11": "失街亭\n诸葛亮当上了蜀汉的丞相之后，开始了第一次北伐，带领着大军向北进攻曹魏。出发时，诸葛亮意识到,有一个地方对这场战争的成败非常重要，这就是街亭。如果街亭被敌人占领了，那么敌军很可能会从后面包围蜀军，从而切断蜀军的粮草。没有了粮草，蜀军的士兵就会被饿死，连诸葛亮自己也可能被敌人活捉。大军出发前，诸葛亮就派了将军马谡带领人马去守街亭，还让另一个将军王平去协助他。诸葛亮对王平说：“我派你去协助马将军，是因为我知道你一向小心谨慎。大军到了街亭过后，一定要在道路的中间安扎营寨，这样敌人就不能通过。安好营寨过后，马上画一张地图派人送给我。如果你们守住了街亭，我会给你们记上一大功！”马谡和王平带兵到了街亭过后，查看了地势。马谡笑着说：“这么小一个地方，魏国的大军怎么会来这里呢？”王平说：“将军别小看这个地方，不管魏军会不会来，我们先让士兵砍倒树木，把道路拦起来，这样敌人就没有办法通过了。”没想到马谡却说：“我看路边有一座小山，山上树木很多，如果我们把军队驻扎在山上，我们就可以凭借险要的地势来抵挡敌人了。”王平说：“将军说的不对！如果我们在路中间扎起营寨，就算有十万士兵也无法通过，但是在山上驻军，如果魏军很多，就可以把我们包围起来，这该怎么办？”马谡大笑着说：“要是魏军真的敢来，我们就从山上冲下去，杀他个片甲不留！”王平又说：“我发现山上没有水源，如果魏军切断了我们的水源，我们没有水喝，仗还没有打，士兵们就会先乱起来。”马谡又说：“如果我们真的被围困在山上，那个时候每一个士兵都会死战，就\n能以一当百，那还怕什么？”王平说：“如果将军一定要在山上驻兵的话，请给我五千兵马，让我在山下安营扎寨。”马谡没有办法，只好同意了。王平当天就把街亭安营扎寨的地方画成了地图,让人赶快送给了诸葛亮。没想到第二天魏军的将领司马懿就带领着魏军的主力来到了街亭。当他们知道街亭已经被蜀军占领了时，不禁感叹道：“诸葛亮真是太会用兵了！”可是又一看，只见蜀军的主力驻扎在山上，而只有一小队人马在山下。司马懿笑着说：“诸葛亮居然用马谡这个没用的人，怎么能不失败呢？”司马懿于是命令魏军一队人马去挡住王平山下的军队，然后让主力把山团团围了起来，还切断了山上的水源，等待蜀兵自己先乱起来。这个时候，马谡发布了向山下进攻的命令，但是蜀兵在山上看见魏兵漫山遍野，每个人心里都很害怕，哪敢向山下进攻。马谡非常生气，杀了两名大将，士兵这才向山下冲去，但很快就被人数更多的魏兵打退了回来。魏军把小山整整围了一天，山上没水，蜀军没办法升火做饭，一些士兵先乱起来，打开山寨门下山投降去了。这个时候，司马懿又让人在山上放起火来，蜀兵更加混乱了。马谡没有办法，只好带着剩下的军队逃跑了。孔明这一天也正好收到了王平送来的地图，打开一看，他大吃一惊：“马谡会把我们给害死的！”大家急忙问怎么回事。孔明说：“如果魏军一来，围住山头，断了水源，不到两天，蜀军就会自己先乱起来。如果丢了街亭，我们怎么能活着回家呢？”正在说话间，忽然有人来报：“街亭已经失了！”孔明大声说：“这该怎么办？这都是我的过错，我真的不该派马谡去守街亭啊！”", "12": "空城计\n诸葛亮知道失了街亭过后，连忙派几个将军去接应马谡。出发前，诸葛亮嘱咐他们：“如果遇到了魏军，不可以进攻，只是大声叫喊，吓退了敌军过后，赶紧回来。”诸葛亮最担心的是蜀军没有粮草，就自己带着五千士兵，往西城去运粮草了。\n诸葛亮刚到西城，忽然有人来报：“司马懿带着大军十五万，要夺取蜀军的粮草，往西城冲杀过来了。”这个时候，诸葛亮带的五千士兵已经一半去搬运粮草了，在城里的只有二千五百人。大家听到这个消息，都害怕极了。孔明亲自登上西城的城楼，往远处看去，只见远方尘土满天，魏军的大军已经朝西城冲杀过来了。\n情况紧急，诸葛亮马上传令：城中的军队都把旗子藏起来，士兵都躲进街边的店铺中，没有命令不能出来。谁也不能大声说话，违抗命令的人，一律杀头！同时，打开四座城门，每一个城门口选二十个士兵装扮成普通的老百姓，假装在清扫街道。诸葛亮自己带着两个童子，拿着一把古琴，坐在城楼上，开始弹起琴来。\n司马懿的大军这个时候已经来到了城楼下，看到城门大开，都不敢杀进去，急忙报告给司马懿。司马懿不信，打马往前，远远看见孔明真的坐在城楼上，正在悠闲的弹琴，诸葛亮的脸上还带着微笑，就像没有看见魏军一样。诸葛亮的身边也没有士兵，只站着两个童子。再一看，只见城门大开，城门内外，只有二十几个百姓，正在低头清扫街道，也像没有看见魏军一样。\n看到这些，司马懿心里觉得很可疑。他想了一会儿，命令大军把后军当作前军，前军当作后军，马上退兵。司马懿的儿子不知道是怎么回\n事，问道：“是不是诸葛亮在城里没有军队，所以故意装成这样？父亲为什么要退兵呢？”司马懿说：“根据我对诸葛亮的了解，他一生小心谨慎，从来不会把自己放置在这样危险的处境中。现在城门大开，一定是城里有埋伏，我们如果冲杀进去，一定会中他的计，我们赶快退兵！”只一会儿的功夫，魏军就全部退走了。\n大家看见魏军退走，心里的一块石头才算落了地。有人问诸葛亮：“司马懿带着十五万大军，见了丞相就赶紧退兵，究竟是什么原因呢？”孔明笑着说：“当时情况紧急，我们只有二千五百个士兵，就算马上逃跑，也逃不远，肯定会被司马懿的大军抓住。司马懿很了解我，他知道我是一个小心谨慎的人，但是他万万没有想到，我今天之所以这样做，也是因为没有其他办法了。司马懿担心城里有埋伏，所以只是暂时退兵，他不久就会回来，趁着这个机会，我们赶紧撤退。”\n司马懿带着大军往后退，路上正好碰到诸葛亮派去接应马谡的军队，蜀兵看到魏兵人多，不敢进攻，只是躲在山林中大声叫喊，司马懿不知道山里到底有多少军队，心里想：“幸好我们退得快，要不然肯定会中诸葛亮的埋伏。”\n过了几天，有人来报告司马懿，蜀军全都不见了。司马懿又带着军队来到了西城，向城里的老百姓打听当时的情况。城里的人说，当时孔明只有两千五百人，山里的军队人也很少，他们只敢叫喊，不敢真的出来交战。听到这些，司马懿叹口气说：“我是真的不如孔明啊！”", "13": "童诗写作八十一我只能是一个小孩子吗妈妈，我只能是一个小孩子吗？我要是一只小鸟，就从江面上飞到雪山，捧一朵浪花送给你，捧一片雪花送给你。我要是一棵苹果树，就呼啦啦地长到天上，摘一缕彩霞递给你，摘一篮星星送给你。我要是一朵金盏菊，就一年四季开在你的书桌，留一束阳光送给你，留一个春天送给你。可是，我只能是一个小孩子呀，我只能每天对你说：妈妈我爱你。\n荆轲刺秦王\n在东周的战国年代，越来越强大的秦王赢政想要消灭其他六个主要的国家，统一中国。秦军一路攻下赵国，抓住了赵王，大军一直打到了燕国的南方。燕国的首领太子丹看到燕国不久就要灭亡，心中十分害怕，就决定请天下最好的一位刺客去刺杀秦王，这位刺客的名字叫荆柯。\n荆柯可不是一名普通的刺客，他喜欢读书，平常最爱做的一件事情就是与朋友们一起喝酒。喝到高兴的时候，嘴里就唱起歌，舞起剑来，是一个十足的好汉。\n荆柯一点儿也不害怕凶猛的秦军，看到燕国危险的处境，下决心要帮助弱小的燕国！荆柯对太子丹说：“让我去会会这位秦王吧！不过我需要两样东西，才可以接近秦王！”\n太子丹忙问：“请问您要哪两样东西？我一定尽全力帮您找来！”\n荆柯说：“第一是燕国督亢这个地方的地图，秦王早就想要消灭燕国，得到督亢这块肥沃的土地了。第二，我想要樊於期的人头。樊於期原先是秦国的一名将军，他的父母都被秦王杀死了，他就逃到了燕国，是您收留了他。秦王想用一千两黄金和一万户的土地得到樊於期的的头。如果我可以把这两个东西献给秦王，秦王一定会很高兴地接见我，到时候，我就有机会刺杀他！”\n听到荆柯这样说，太子丹非常为难。他说，“地图尽管拿去，可是这位樊将军是在没有办法的时候来找我的，我怎么能杀死他呢？这样的事情我怎么能做得出来呢？”\n荆柯知道太子丹一定不肯杀死樊於期，就自己去找他。他对樊於期说：“樊将军，听说秦王杀死了你的全家，你想不想要我去杀死秦王，帮你报仇？”樊将军咬着牙说：“秦王杀死了我的父母，想到要为父母报仇，我晚上都睡不着觉！请告诉我该怎么做？”荆柯说：“那你愿意把你的人头给我吗？如果秦王看到你的头，一定让我接近他。这个时候，我只要左手抓住他的袖子，右手刺向他的胸口，就可以为你报仇了，燕国也就可以得救了！”\n樊於期解开衣服，上前一步说：“这正是我日夜想要做的事情，请把我的头拿去！”他于是割破自己的脖子自杀了。太子丹听到樊於期死去的消息，立刻跑去伏在樊於期死去的身体上大哭起来。可是事情已经到了这个地步，也没有其它的办法了。\n太子丹于是找来了一把锋利的匕首，匕首上浸了毒，只要碰上一丁点儿人血，人没有不死的。荆柯又找到一位叫做秦舞阳的勇士来帮忙。秦舞阳长得非常的可怕，力大无穷，像老虎一样勇猛。\n出发的这天，大家都知道荆柯再也回不来了，于是穿上白色的衣服、戴上白色的帽子给他送行。队伍经过易水的时候停下来，正好是冬天，天地万物没有一丝生机，旁边站着送行的白衣人。正在这个时候，悲痛的乐声响起来，送行的人们都流下了眼泪。荆柯向前一步，高声唱到：“风萧萧兮易水寒，壮士一去兮不复还！”这两句话的意思是说，那萧萧作响的风啊，把易水吹得这样寒冷; 那勇敢的壮士啊，去了就再也不能回来！”\n荆柯的歌声让送行的人悲伤不已，头发都竖了起来！唱完这两句歌，荆柯跳上了车子，头也不回地走了。\n在秦国的都城里，那里一派喜气洋洋！燕国的使臣要向秦王献上人头和地图，秦国不用一兵一卒，就得到了燕国最好的土地。秦王于是命人准备一场盛大的仪式，来接受燕国的投降。秦王穿上礼服，等待两位燕国使节的到来。\n你可以想一想，这两位燕国的使臣，拿着浸了毒的匕首，一步一步走近秦国的宫殿，要深入重围，一个人去刺杀秦王，完成这样一件事情该需要多大的勇气啊！捧着地图走在后面的秦舞阳，来到大殿前面的时候，已经害怕得发起抖来。站在殿前的大臣们，看见秦舞阳浑身发抖，不敢向前走了，都非常奇怪，眼看刺杀行动就要败露了！\n在这个紧张的时刻，荆柯居然还能笑出声来。他大声笑着说道：“他是个乡下人，以前没有见过天子。今天见识了大王的威严，早就吓破了胆，请大王允许他献上地图来！”秦王说，“把地图献上来！”\n荆柯不慌不乱地向秦王献上地图。地图在他的手中一点点向前展开。秦王哪里知道，地图的最里面藏了一把浸了毒的匕首！“图穷匕首见”，这句话的意思是说，在地图展到尽头的时候，匕首一下子露了出来。荆柯左手一把抓住秦王的袖子，右手拿起匕首向秦王的胸前刺了过去！\n只可惜，这一刺没有刺中！秦王吓得一下子向后倒去，居然一下子拉断了自己的袖子。秦王慌乱中想要拔剑来刺荆柯，可是剑太长，一下子又拔不出来。荆柯冲了过去，把匕首刺向秦王。秦王吓得只能绕着柱子奔跑。殿上虽然人多，却没有一个人带了武器，殿下的士兵又离得远，大家被这突然的情况吓得没有了办法，竟然没有一个人敢上前帮助秦王。\n正在大家慌乱的时候，眼看荆柯马上就要追上秦王了！就在这个时候，站在人群中的一位医生把一个药包向荆柯头上扔了过去，荆柯偏头躲闪，就在这个时候，秦王向前跑开了几步。有人在旁边大声喊：“大王拔剑哪！大王拔剑哪！”秦王这才回过神来，把剑从背后拔出来，一剑向荆柯刺去。荆柯的左腿一阵刺痛，倒了下去。就在这个时候，荆柯又奋力地将手中的匕首扔向秦王。\n只可惜匕首没有命中，当地一声击中了柱子。秦王转身拿剑向荆柯刺来，荆柯身上一共被刺了八剑。荆柯知道大事已去，靠在柱子上，大声笑了起来，直到死去！\n易水边的冷风依然呼呼地吹着，冰冷的河水依然不停地流着，只有伟大的荆柯一去永不回了。荆轲的伟大是因为他明明知道敌人比自己强大很多，却仍然要做最后的一击，不到最后一刻，绝不放弃！他虽然失败了，却可以称得上是一位真正的英雄！", "14": "", "15": "晋文公火烧绵山\n在清明节前一两天，中国有一个传统节日叫寒食节。这一天，家家户户都不能烧火做饭，只能吃冷的食物。这个节日的起源，跟两千多年前春秋时代晋国的一位国君有关。晋国的这位国君，名字叫重耳。当时晋国发生了叛乱，他只能带着一些臣子离开晋国，逃亡到了国外，这一逃就是十九年。等他回到晋国的时候，已经是一位白发苍苍的老人。重耳和自己的臣子逃到过很多国家，每天一处，都受到人们的轻视，有的时候连饭都吃不上，真是吃尽了各种的苦头。有一回，他们逃到了卫国，可是卫国人不想收留他们，连城门都不给他们开，他们只好绕过城，在荒野里行走。走了好几天，都没有找到食物，大家都饿得快要昏倒了，只好坐在路旁的一棵大树前休息。就在这个时候，一个名叫介之推的仆人，端来了一碗热气腾腾的肉汤，他对重耳说：“公子，这碗肉汤您先喝一点儿，就没那么饿了。”看到香喷喷的肉汤，重耳立刻接过来，三口两口，便喝得干干净净，他对介之推说：“这真是我喝过最美味的肉汤啊！你是从哪里找来的？”介之推先开始不说话，过了一会儿才轻声回答：“这是我大腿上的肉，我割下来给您做成了肉汤！”重耳大吃一惊，眼泪都快流下来了。他紧紧抓住介之推的手说：“你对我这样忠心，将来只要我能回到晋国，一定不会忘记你！”介之推低下头，对重耳说：“我不求您的报答，只愿我们有一天能平安回到晋国。”在外流亡了很多年以后，重耳在秦国的帮助下，终于回到晋国，成为了国君，他就是历史上有名的“晋文公”。\n晋文公当上国君过后，非常感激当年跟他一起流亡的人，就赏赐给他们金银和官职。可是，介之推却没有进宫领赏，他并不想做官，而是悄悄地回了家，带着年老的母亲，离开了城里，住进了偏远的绵山。在山里，介之推每天砍柴种菜，照顾母亲，过着清静的生活。他不想要名和利，只想安心地陪着自己的母亲。不久，有人向晋文公报告：“当年救过您一命的介之推，到现在都还没有得到赏赐。”晋文公这才想起了介之推，大声责怪自己：“我怎么能把救过我命的介之推忘了呢？他现在在什么地方？”有人回答：“他现在和母亲住在绵山上。”晋文公立刻派人进绵山寻找介之推，可是山林茂密，怎么找也找不到。有人出了一个主意：“介之推非常孝顺母亲，如果放火烧山，他一定会背着母亲逃下山。下山的路只有一条，我们就在路口等着他。”晋文公一时心急，也没有仔细思考，居然答应了这个办法。很快，大火在绵山烧了起来，火光冲天，浓烟滚滚。很多野兽和飞鸟都被吓得逃下了山。晋文公站在山下，等待着介之推的出现。可是，一天过去了，没有人出来。两天过去了，还是没有人出来。三天过后，大火终于熄灭了，山林也变成了一片焦黑。晋文公派人上山去找，却在一棵老柳树下，发现了被烧死的介之推和他的母亲。原来介之推不想下山，背着母亲来到了山顶，没想到却被烧死在了柳树之下。看到眼前的这一幕，晋文公悲痛万分，跪在地上，痛哭不已。他后悔地说：“我本来是想报答忠臣，没想到却害死了他！”为了纪念介之推，晋文公下令每年介之推去世的这一天，百姓不能生火做饭，只吃冷食，这一天就被称为寒食节。他还把绵山改名叫“介山”，来永远纪念介之推。", "16": "黄石公三难张良\n张良原来是韩国的一名贵族，他的祖父和父亲都当过韩国的丞相。后来秦国灭了韩国，张良用了全部的财产，想找一位勇士去刺杀秦王，为韩国报仇。张良后来找到了一个名叫仓海君的大力士，这个大力士会使一对百二十斤的铁锤。他们知道秦始皇正在出巡，要路过博浪沙这个地方。张良就和这个大力士躲在路边高地的一个大石头后面，等着秦始皇的车队出现。不久，秦始皇的车队果然来了，仓海君认准最前面的一辆车，把手中的大铁锤朝那里扔了过去。只听“轰隆”一声巨响，铁锤一下子就把这辆车砸了个粉碎。可惜的是，秦始皇不在车里，里面坐的只有他的随从。还好张良逃得快，没有被秦始皇的士兵抓到。但是秦始皇向全国下令，一定要捉住张良。张良只好改了名字，逃到乡下的一个地方躲了起来。这一天，张良想去外面走一走，来到了一座白石桥上。桥上站着一个老头，穿着褐色的衣服，看见张良上了桥，就朝张良走了过去。刚走到张良站着的地方，老头突然一抬腿，腿上的一只鞋子就掉到了桥下。老头转头对张良说：“小子，下去把我的鞋捡上来！”听到这样无礼的要求，张良很吃惊，真想上去揍他一顿。可是看他满头的白发，只好忍住心中的怒火，走到桥下去帮老人把鞋捡了起来。老头儿看见张良捡来了鞋子，连谢谢都没有说一声，就把脚伸出来，对张良说：“小子，快把鞋给我穿上！”张良心想，鞋都已经帮他捡来了，干脆就帮他穿上吧。为了表示对老人的尊敬，张良于是长跪着，帮老人穿上了鞋。老头儿穿好了鞋，笑着就要离开。张良很吃惊，眼睛目送着老头一路走远。可是没想到，老头儿走了一里路，又回来了。他对张良说：\n“你这个小子，看来是块教导的材料，过五天天亮的时候，到桥上来见我！”张良心里觉得奇怪，可是嘴上却说：“好的！”老人转身就走远了。过了五天，天刚刚亮的时候，张良就往桥上去，没想到，远远就看见那个老头已经站在了桥头。看到张良来晚了，老头生气地说：“和老人家约了见面，却到得这么晚，这是为什么？过五天再来。”老人说完就走了。又过了五天，张良心想这次一定要早一些到，等到鸡一叫，张良就出发往白石桥走去。没想到，老远又看到老人已经站在桥头了。看到张良又来晚了，老人更生气，“年青人，你怎么又迟到了，这次还有什么话说？去去去，过五天再来见我！”这回张良可下定了决心，一定要比老人到得早。过了五天，张良刚过了半夜就来到了桥上。过了好一阵，老人才到。他看到张良已经到了，高兴地说：“年青人，这样才对嘛！”说着，老人拿出一卷书，对张良说，“读了这本书，你就可以成为帝王的老师。十年过后，你就可以成就大事业了！”这时候，张良才知道老头不是普通人，于是跪下来接过了这本书。老头儿接着说：“十三年后，你和我会再次见面，谷城山下的黄石就是我！”张良打开书一看，原来是一部兵书，心里面也记下了老人说的十三年后再见面的话。张良后来靠着这部兵书，帮助刘邦推翻了秦朝，又打败了项羽，建立了汉朝，果真成为了帝王的老师。十三年后，张良按照和老人的约定，来到了谷城山，在山下找到了一棵老松树，又在树下找到了一块黄色的石头，只见石头上面刻着“黄石公”三个字。张良这才知道，原来十三年前是碰到了神仙。", "17": "周处除三害\n很久以前，有一个叫周处的少年。他很小的时候父母就去世了，没有人管教他。周处天生力气就大得惊人，成天就喜欢跟人打架闹事，乡亲们都害怕他。\n周处每天不干活，只是在外面游荡。只要看见他来了，不要说人，就连狗都要远远地躲着他。周处饿了，就去饭店里吃白食，要是不给的话，他就闹事，打烂饭店里的桌子椅子，都是常有的事。日子久了，他就成为了当地一个有名的大恶人。\n这一天，周处像往常一样在外面闲逛，一路打打小孩，踢踢野狗。走着走着，他就看见一群人围在一起正在议论着什么。他走近一听，原来大家在讲当地可怕的三害。\n周处听大家说，第一害是南山上的一只大老虎，经常下山吃人。第二害是水里的蛟龙，常常弄翻来往的渔船，也害死了不少人。正在这时，周处居然听到了自己的名字。大家说，“这第三害，就是周处，他做的坏事，真是数也数不清，老百姓别说多恨他了！”听到这里，周处气得恨不得马上把这些人打一顿，可是冷静下来一想，难道这么多年，自己一直都做错了吗？\n周处于是大喊一声：“你们说的三害里面，真的有我吗？”大家一看是周处，吓得一下子全跑了，只剩下了一个乡里的老人。周处对老人说：“老人家，乡里的人们每天担心的真的是这三害吗？”老人回答说：“一点儿没错啊！”周处说：“那我能够去除这三害！”老人说：“你要是真的能去除这三害，大家一定会拍着手出来庆祝的。老虎和蛟龙可以杀死，但是这第三害就是你，你怎么去除呢？”周处回答说：“您等着瞧吧！”\n周处说干就干，他带上了弓箭，来到了南山上，在老虎经常出没的地方，爬上了一棵大树，等着老虎的出现。不一会儿，树丛中果然跳出了一只金色大老虎。周处看准了，一箭就射中了老虎的眼睛，老虎痛得在地下打滚。周处马上从树上跳下来，按住老虎的头，拳头像雨点一样，落在老虎的头上，活生生把老虎打死了。\n这一下，周处该去对付水里的蛟龙了。这次周处带上了一把大刀，来到了水边的长桥上。他大叫一声，拿着大刀，纵身跳进了水里。住在水里的蛟龙听到动静，翻出水面，尾马一扫，就把周处扫了老远。周处一点儿也不害怕，在蛟龙身边游来游去，想找准时机，用刀把它砍死。\n这一斗，就斗了三天三夜，大家站在水边，也看不清到底是蛟龙被周处杀死了，还是周处被蛟龙吞下了肚子。有人小声说：“周处要是死了，三害同归于尽，那倒也是一件不错的事情！”\n就在这时，周处从水中冒了出来，手上提着蛟龙一颗血淋淋的头。人们欢呼了起来：“周处真是了不起啊！除掉了两害！”又有人说：“除掉两害的周处，成了我们的大英雄，这第三害，是不是也就去除了呢？”听到大家这样说，周处惭愧地说：“以前周处是一个大坏蛋，但是大家请相信我，从今天开始，周处一定要重新做人！”\n从此，周处每天用功读书，学习为人的道理，有空的时候，就用自己的力气帮助乡里邻居干活。周处因为有文有武，后来还当了官，成为了一名大将军。周处改过自新，从一个大恶人变成一个大好人的经历，就成了有名的“周处除三害”的故事。", "18": "训练女兵的孙武\n两千多年前的春秋时期，有一位很会打仗的将军，名叫孙武。历史上流传着一个他训练女兵的故事。当时，吴王想请孙武来训练吴国的军队。为了试一试孙武的能力，吴王故意给他出了一个难题。吴王对孙武说：“听说将军写了一部兵书，里面讲了很多打仗的道理。可是写书和上战场打仗是两回事，不知道将军能不能替我训练一支军队呢？”孙武回答说：“当然，这正是我想要为大王做的事情！”吴王接着说：“训练普通的军队不难，不知道将军能不能把宫中的宫女训练成可以作战的女兵呢？”因为当时还没有人训练过女兵，孙武一听，就知道这是吴王故意要考验自己。他不慌不忙地回答：“只要大王答应我的一个请求，不论是男兵还是女兵，都可以训练成听从命令的士兵。”吴王说：“先生请讲，您有什么要求？”孙武说：“既然大王让我训练女兵，那么如果有人不听命令，请允许我按军法来处置！”吴王说：“那是自然！”吴王于是从宫中挑选了一百八十名宫女，交给孙武来训练。孙武把她们分成两队，又让吴王的两位爱妃担任队长。他严肃地告诉宫女们，必须听从命令，要不然就会受到军法的处罚。从来没有受过军事训练的宫女们在队伍中嘻嘻哈哈，闹成一团，谁也没有把孙武的话当真。孙武问宫女们，“你们知道前、后、左和右分别是哪里吗？”宫女们一听，笑得更大声了，一边笑一边回答：“孙将军，我们当然知道！”孙武严肃地说：“我下令‘左’，大家就一起向左转；我下令‘右’，大家就一起向右转。大家都听清楚了吗？”宫女们笑着说：“听清楚了！”\n孙武挥动手中的宝剑，战鼓“咚咚咚”地敲了起来。孙武下令：“左！”这些从来没受过训练的女兵，有的往右转，有的往左转，队伍一片混乱。看到这乱七八糟的样子，每个人都忍不住笑了起来。这个时候，孙武冷静地说：“士兵不听命令，是因为将军讲得不够明白。我再说一次，如果还有人不听命令，就要按军法处罚！大家听清楚了吗？”宫女们不知道孙武是认真的，还是嘻嘻哈哈地回答：“孙将军，我们知道了！”孙武再次挥动宝剑，战鼓又响了起来。这次孙武下令“右！”可是宫女们还是你看我，我看你，笑得团团转，一点儿也不把孙武的命令放在心上。这一次，孙武真的生气了。他大声说：“我已经把命令讲得清清楚楚，可是士兵仍然不听命令，那就是队长的过错，按照军法，应当把两个队长斩首！”两个女队长吓得大叫：“大王，大王救命呀！”吴王看到孙武真的要砍两位爱妃的头，连忙说：“将军请等一等，请您饶了她们吧！”孙武说：“大王刚才答应过我，不听命令者，由我来处置。大王难道忘记了吗？”孙武一挥宝剑，吴王的两个爱妃就被士兵拖了下去。其他的宫女看见吴王的爱妃被斩了，吓得连大气都不敢出一口。战鼓再次响起，孙武下令：“右！”这一次，宫女们立刻整齐地向右转，没有一个人落后的。经过几轮训练，看到宫女们安静而又迅速的动作，孙武才对吴王点点头说：“女兵已经训练好了，请大王检阅！”吴王虽然失去了两位爱妃，却因此得到了一位有才能的大将军。后来，孙武带领军队，打败了越国，让吴王成为了春秋时期的霸主。这位有名的孙将军，还给我们留下了一部兵书——《孙子兵法》。这本书至今仍被视为世界军事著作中的重要经典。", "19": "月下老人牵红线\n唐朝的时候，有一个叫韦固的书生，小的时候父母就死了，自己老想着早点儿成婚有个家。可是到处去求亲，总是不成功。这一天，有个朋友给他介绍了一桩婚事，说好了第二天早上去一个寺庙里见面。第二天早上，天刚亮，韦固就出发了。来到庙前，只见台阶上坐了一个穿红衣裳的胖老公公，背上还背了一个袋子，手里拿着一本书，正眯着眼睛在月光底下看书。韦固上前一看，这书上的字自己怎么一个也不认识，他便好奇地问老公公：“老人家，您看的是什么书呀？我读过这么多书，就只有你这本书上的字从来没见过，这是怎么回事呢？”红衣裳老公公笑眯眯地抬起头说：“我看的可不是人间的书，是天书！”“你会看天书，那你是谁呢？”韦固更觉得奇怪了。老公公说：“你今天出门太早，所以遇上我了。我专门掌管人间的婚姻大事，这本书里把谁和谁结婚，都记在里头呢！”老人一边说话，一边又从背上的袋子里拿出几个泥娃娃，这些娃娃有男有女，每一个都长得不一样，就像是真人一样。老人又从袋子里拿出一条红绳子，看了看手里的书，就把红线一头系在男娃娃的脚上，另一头系在女娃娃的脚上。老公公拿着拴了红线的一对娃娃，笑着对韦固说：“你看，我这红线给他们一牵，将来他们就会结成夫妻，谁也逃不了。不过，谁也不知道自己脚上有这么一条红线，因为人的眼睛是看不到的。”韦固觉得神奇极了，赶忙问老公公，“今天我是来相亲的，请问今天能成功吗？”老公公说：“你的妻子才刚刚三岁，要十五年后才进你的家门！”韦固说：“那我的妻子在哪里呢？我能去看看吗？”老公公说：“她是菜场上卖菜的陈婆子的女儿。你可以自己去看看。”天一亮，韦固就来到了城里的菜场。只见菜场里有一个瞎眼的老婆婆，正带着一个两三岁的小女孩在卖菜。韦固走近一看，这个小女孩的\n脸脏兮兮的，头发乱蓬蓬的。小女孩正在地上玩水，一双手“啪啪”地打着地上的脏水，真是难看极了。韦固生气极了，叫来他的仆人，对他说：“你赶快去把那个女孩子给我杀了！”仆人于是在身上藏了一把小刀，偷偷走进女孩子，猛地朝她的眉心刺了一刀，市场上的人都大叫了起来。韦固也趁乱逃走了，他以为女孩子肯定死了。这之后，有不少人上门来给韦固说亲，可是总是不成功。十五年后，一位刺史看上了韦固，决定把自己的女儿嫁给韦固。新婚当天，韦韦固看到新娘子很美，乌黑的头发，雪白的脸蛋，眉间还贴着一块花钿，韦固非常喜欢。可是，过了一段时间，韦固发现，新娘子从来不把眉间的花钿拿下来。有一次，韦固在妻子洗脸的时候，过去偷偷一看，发现她的额头上有一道小小的伤疤。韦固问这是怎么回事？夫人伤心地流着眼泪说：“我小的时候是奶妈把我带大的，她经常带我去菜场卖菜。有一天，有一个恶人拿刀刺中了我的眉心，幸好我命大，没有被刺死，只是就留下了这么一道疤痕。”韦固连忙问，“你的奶奶是不是姓陈，她是不是有一只眼睛是瞎的？”夫人吃惊地说：“是呀，你怎么知道？”韦固抓着夫人的手说：“夫人啊！这么多年真是让你受苦了，是我叫那个人去刺伤你的呀！”韦固这才把当年碰到月下老人的事情告诉了夫人。第二天，韦固带着夫人出了城，找到了那座小庙。庙里供奉的神仙，正是那个穿了一身红衣裳的月下老人。看到他，韦固好像想起了他说的那句话，“我给你牵上了红线，你们就会结为夫妻，谁也逃不了！”", "20": "烽火戏诸侯\n周朝传到幽王的时候，幽王整天不问政事，只知道吃喝玩乐。幽王当上王位的第二年，都城还发生了地震。国家的问题越来越多，人民的生活也变得越来越苦。这个时候，幽王的手下为了让他高兴，送给了他一位名叫褒姒的妃子。褒姒长得很漂亮，幽王一看见她，就为她着了迷，整天什么事情都不管了。只是褒姒虽然长得美丽，却是一个冷美人。自从她进宫以后，从来没有笑过一次。幽王想，如果能让褒姒笑一笑，那她该不知道有多美啊！幽王于是告诉大家，谁能想出办法来让褒姒笑一笑，就给他一千两金子。一个名叫虢石父的人知道了过后，就给幽王出了一个主意。他对幽王说：“大王，我们可以在都城外的烽火台上点起烽火，看到烽火，诸侯一定会带兵前来，褒姒看到他们白跑一趟，一定会发笑。”在周朝的时候，为了防备北方的犬戎，在都城外的山上，每隔几里就建了一座烽火台。一旦犬戎来进攻，士兵就会在台上点起烽火。诸侯们如果看到烽火台上的烽火点燃了，就知道天子有难，马上就会派兵来救周王。幽王一听，居然觉得这个主意很好，就带着褒姒一起来到了城门上，让守城的士兵点起城外的烽火台。一位将军说：“大王，现在没有敌人来进攻，为什么要点燃烽火呢？这样做，以后诸侯就不会再相信这个救命的信号了！”幽王只想着让褒姒开心，根本听不进去，仍然命令士兵点燃烽火。只要一个烽火台点燃了，其他烽火台看见了，就会一个接一个的点起火。只见一道道白烟冲上天空，从远处看过去，真是壮观极了。\n烽火刚点了没多久，站在城门上的幽王和褒姒就看见诸侯们带着兵马冲了过来。到了城门口，救兵大声喊：“大王，我们来救您了！”可是大家四下里一看，连一个犬戎兵也没看到。大家慌乱中摸不着头脑，不知道到底是怎么回事。这时候，幽王才告诉大家，这儿没什么事，放火只是为了取乐。诸侯们这才知道原来自己被戏弄了。城门上的褒姒看到千军万马慌乱的样子，觉得好玩极了，果真笑了。幽王开心极了，还赏了虢石父一千两金子。接下来，为了让褒姒开心，幽王废掉了原来的王后和太子，让褒姒当了王后，还让褒姒生的儿子当了太子。原先的太子害怕，跑回了原来王后父亲申侯的家里躲了起来。幽王听见了很生气，准备出兵去攻打他。得到这个消息，申侯决定先下手为强，于是联合犬戎，向幽王的都城打了过来。这次犬戎的军队真正来了，幽王命人点起了烽火。可是刚刚上过当的诸侯们，却没有人来救他了。幽王带着褒姒和她的儿子，一跑逃出了城，犬戎的军队在后面紧紧追赶。犬戎的军队追上过后，看到幽王穿着天子的衣服，就当场把他砍死了，又从褒姒手中抢过她的小儿子，也一刀把他杀了。幽王为了得到美人一笑，戏弄诸侯，没想到却因为这样亡了国。", "21": "哪吒闹海（上）\n哪吒的父亲是陈塘关总兵李靖，哪吒妈妈怀他的时候，一直怀了三年又六个月，一直生不下来。这天晚上，一个下人慌慌张张地跑来，对李靖说：“不好了，大人，夫人刚刚生下来一个妖怪！”李靖抽出宝剑，急忙来到房里，只见房里一团红气，里面有一个肉球，正在房间里滴溜溜地打转。李靖大吃一惊，照着肉球一剑砍去，肉球被分成了两半，从里面跳出来一个可爱的小孩儿。只见他的肚皮上围着一块红绫，手上还套着一只金光闪闪的金钢圈，他的眼睛发着金光，刚一下地就能满屋子乱跑。有个叫太乙真人的神仙，知道了这件事儿，就给这个小孩儿取名叫“哪吒”。一转眼，哪吒已经七岁了，他在当地是出了名的淘气，爬树下河，没有人敢惹他。再加上哪吒的师父太乙真人还教了他一身本事，这下他就更是天不怕地不怕了。有一天，哪吒来到东海边，他解下那条七尺长的红绫，扑通跳进海里就玩了起来。他一边玩水，一边把那条红绫挥舞起来，把海水搅得翻腾不止。他哪里知道这条红绫是件宝贝，名叫混天绫，他这一闹，已经把水底的龙宫震得摇晃了起来，还惊动了东海龙王。龙王叫来了巡海夜叉，对他说：“你赶紧去看看，是什么东西在上头作怪。”夜叉来到海边，见是一个顽皮的小孩拿着一块红绫正在海里洗澡，大声骂道：“哪里来的野孩子，在这里胡闹！”哪吒一看，海里钻出来一个红头发的妖怪，拿着一杆大铁叉，样子还凶巴巴的，就骂了回去：“你这个妖怪，你胡说什么，我玩我的水，关你什么事？”夜叉二话不说，拿起铁叉就要来抓哪吒。哪吒一下把手臂上的金钢圈拿在了手里，朝着夜叉的头上就扔了过去。这金钢圈也是一个宝贝，名叫乾坤圈。只这一下，只听“当”的一声，就把夜叉给打死了。\n哪吒拿起金钢圈说：“打死了个妖怪不说，还把我这的金钢圈给弄脏了。”于是就把金钢圈放在海里洗了起来，这一摇晃，又把海底的龙宫震得摇来晃去。虾兵们看见巡海夜叉死了，赶紧回去报告龙王，“不好了！不好了！一个小孩子把巡海夜叉给打死了！”龙王一听，气得拍着桌子大叫，“这是哪家的孩子，竟敢在这里闹事？来人，跟我一起去捉拿他！”龙王三太子一听，大声说：“父王别急，不用您亲自去，让我替您去把他给抓来！”三太子骑上一只大乌龟，拿起一杆银枪，就往岸上去了。哪吒一看，这回从海里来了一只大乌龟，上面站着一个青衣少年，只见他身穿银甲，手拿一杆银枪，好不威风！一见到哪吒，龙王三太子就开口大骂：“你这个小屁孩儿，到底叫什么名字？居然打死了龙王的巡海夜叉，你这是找死呢！”哪吒一点儿不服气，说：“我的名字叫哪吒！我的父亲就是有名的陈塘关总兵李靖。我正在这儿玩水呢，谁叫那个红头妖怪来骂我，还这么不经打，只打了一下，就死了！”龙王三太子说：“杀人就要偿命，拿命来！”说着端起手中的银枪，就朝哪吒刺了过去。只见哪吒舞起混天绫，一下子就把三太子给团团裹住。他举起金钢圈，也是朝他的头上只一下，就又把三太子给打死了。哪吒看见三太子变成了一条小青龙，就说：“原来你跟那个红头的妖怪一样不中打，看你的筋还有点儿用，让我把你的筋抽了，还可以给父亲系盔甲。”虾兵看见龙王三太子也被哪吒打死了，连忙又去报告龙王，“不好了！不好了！龙王三太子也被打死了，他的筋还被抽了！”龙王一听，真是生气极了，连忙问，“知不知道这个该死的小孩子到底是谁？”虾兵连忙回答，“听他说叫哪吒，父亲是陈塘关总兵李靖！”龙王一听，大声说：“好小子，你等着，让我去找你的父亲算帐！”于是驾起云头，直奔陈塘关而去。", "22": "哪吒闹海（下）\n东海龙王本想着去陈塘关找哪吒的父亲告状，可是想了想，估计哪吒的父亲也管不住这个小鬼，于是掉转云头，直往天宫去了。哪吒听龙王说要去父亲那儿告状，吓了一跳，紧紧地跟着龙王，看见龙王掉转头又向天宫去了，心里想，“这要是让玉皇大帝知道了，可不是要治我父亲的罪吗？”于是赶紧追了过去。龙王刚到南天门，就被眼前的哪吒挡住了去路。哪吒大叫一声：“站住，你这个死老头，你这是要去哪儿？”龙王恶狠狠地说：“你这个小鬼，是谁给了你天大的胆子，不光打死了巡海的夜叉，还杀了我的儿子，抽了他的筋，我这就去天宫，让玉皇大帝知道你干的好事，好让你的父母来偿命！”哪吒一听，一把上去抓去龙王的胡须，拿出金钢圈，套住了龙王的脖子，骑在龙王身上，就往他身上一阵乱打，边打边骂：“看你还敢不敢去告状，你要是敢碰我爹娘一下，我就饶不了你！”龙王气极了，可是又打不过哪吒。这个时候哪吒又把龙王身上的龙鳞给揭了几片下来，疼得龙王直求饶。哪吒这才松了手，龙王于是变成一条小青蛇逃走了。龙王回到龙宫，把西海、南海和北海三个龙王一起叫来，直往陈塘关找李靖去了。李靖在家里，看到四大龙王都来了，不知道发生了什么事。龙王就把哪吒怎么打死夜叉，怎么杀死龙王三太子，又怎么打服龙王的事都讲给李靖听了。李靖一听，知道哪吒闯下了大祸，可是又不相信一个七岁的小孩儿，能干出这样的事来。李靖答应龙王，等哪吒回家，问清楚是不是他干的，如果真是他干的，一定把哪吒交出来偿命。\n正在这个时候，哪吒也回到了陈塘关，只见他一边走，一边手里还拿着三太子的龙筋在玩儿呢！李靖一看，大声问道：“你这个逆子，你手里拿的是什么？”哪吒像个没事人一样，回答说：“这是那个小龙的筋，我正准备送给爹爹绑盔甲用呢！”四个龙王一听，一齐说：“看吧，这下你相信是你家小鬼干的了吧？现在就跟我们一起去天宫说个明白！”龙王一边说一边就要来抓李靖。哪吒这时才知道闯下了大祸，他挡在父亲身前，大声说：“死老头儿，我一人做事一人当！我做了错事，打死了夜叉和龙王三太子，我偿命就是，跟我爹爹没有半分关系！”说完，哪吒又转头对李靖说：“爹爹，你的骨肉我还给你，我绝不连累爹娘。”话音刚落，哪吒就举起宝剑，一剑自刎而死。看到哪吒自杀死了，哪吒的父母吓坏了，不知道有多么难过！哪吒自杀的消息很快就传到了太乙真人那里。太乙真人想到了一个好办法，他从水池中摘下一片绿色的莲叶，放在地上，又从水池中摘下一朵莲花，放在莲叶的正中间。接着，他又挖出一节一节莲藕，放在了莲花的下面。最后，太乙真人小心地从葫芦中倒出一颗莲子，轻轻一弹，把莲子弹进了莲花的中心。只听“叮”的一声，莲花的中心居然慢慢地站起来一个小人，那不正是哪吒吗？原来莲花变成了哪吒的头，莲藕变成了哪吒的身体。看到哪吒活过来了，太乙真人说：“好孩子，你以后可不能再这样调皮闹事了，我给你两件兵器，拿去斩妖除魔吧！”哪吒点头谢过太乙真人，接过了两个风火轮和一把火尖枪。有了这两件兵器，哪吒就成为了一个小英雄，就连日后孙悟空碰见了，都打了个难解难分。", "23": "桃花源记\n在晋朝太元年间，有一位渔夫，每天以打鱼为生。他每天划着小船，在河水之间来来往往，生活简单而平静。这一天，他沿着一条小溪划着船顺流而上。眼前溪水清清，渔夫就一直往前划，不知不觉竟然忘记了自己划了多远。忽然，他眼前一亮，只见前方出现了一片桃花林。桃花林长在溪水两岸，有好几百步那么长。林中没有其他的树，这时桃花开了，满眼都是粉红的桃花。岸边的地上长满了绿绿的青草，空气中弥漫着淡淡的花香。微风吹过，花瓣随着风飘落，好像下了一场花瓣雨。渔夫从来没有见过这样的美景，心中十分惊奇。他忍不住向前继续划去，想看看这片桃花林的尽头究竟是哪里。划着划着，桃花林渐渐到了尽头，原来这里就是溪水的源头。只见前方有一座小山，渔夫向前望去，只见山上有一个不大的洞口，从洞口中还透出一点儿微光。渔夫感到好奇，于是把船停在岸边，走进了洞口。刚走进洞口时，洞里面非常狭小，只有一个人能勉强通过。渔夫小心地向前走了几十步，眼前一亮，空间一下子开阔起来。出现在他眼前的是一个完全不同的世界。这里土地平坦开阔，房屋整整齐齐地排列着。房屋周围有肥沃的田地、清清的池塘，池塘边还种着桑树和竹林。田间的小路四通八达，远处还可以听到村子里鸡鸣狗叫的声音。渔夫往前走去，只见人们在田里种地，来来往往的人们，穿着打扮和外面的世界没有什么不同。老人和孩子们神情安详，脸上带着满足的笑容，这里的人们看上去过着幸福快乐的生活。\n当村里的人突然看到渔夫这个陌生人时，都十分吃惊。他们围上来问他是从哪里来的。渔夫就把自己怎么找到这里的经过一一告诉了他们。村民们听后，就请他到家中做客。他们给渔夫准备了酒菜，还杀鸡做饭。很快，大家都知道了这个消息，不停地有人前来询问外面的情况。村里人告诉渔夫，他们的祖先是在秦朝战乱的时候，带着家人和乡亲们逃到了这个地方，从此就再也没有出去过。他们一直在这里生活着，与外面的世界完全没有了联系。他们好奇地问渔夫：“现在外面是什么朝代了？”渔夫告诉他们，现在都已经是晋朝了。可是他们竟然连汉朝都不知道，更不用说魏、晋了。渔夫把他知道的情况都一五一十地讲给村民们听，村民们听后，都为世界的变化而感到叹息。在接下来的几天里，村民们轮流邀请渔夫到自己家中做客。他们的生活简单而安宁，这里没有战争，也没有外面世界的烦恼。几天后，渔夫准备要离开。临走前，村里的人叮嘱他说：“这里的事情，千万不能对外面的人讲。”渔夫点头答应，他从原路返回，找到了自己的船，还在回家的路上做了记号，希望以后还能再回来。回到武陵后，他立刻去见当地的太守，把自己的经历详细地讲给太守听。太守听了过后，就派人和渔夫一起去寻找那个地方。不过，不让奇怪的是，当他们按照记号前进时，却迷失了方向，再也找不到那片桃花林。从那以后，也再也没有人能够找到那个地方了。", "24": "金角银角的红葫芦\n话说这一天孙悟空一行人正在赶路，忽然看见一个伤了腿的道士坐在地上，他看见唐僧来了，忙说：“一只老虎咬伤了我的腿，请师父救救我吧！”唐僧对孙悟空说：“悟空， 这个老人家受了伤，你就背着他走吧！”孙悟空早就看出这个道士是妖怪变的，他想看看这个妖怪有什么本事，就把他背在了身上。原来这个道士是山上的银角大王变的，他念起了咒语，一下子招来了三座大山，把孙悟空给压在下面，动也动不了了。接着，他刮起一阵黑风，把唐僧抓进了山洞里。孙悟空叫来了山神，移开了三座大山。他接着变成了一只虫子，偷偷飞进了洞里。只听银角大王说：“别人都说孙猴子厉害，还不是被我压在了三座大山下面。”旁边的金角大王说：“如果我去捉他，他也逃不过我的红葫芦。”说着，他就从怀里拿出一个大红葫芦：“我把葫芦的盖子打开，叫声名字，只要他一答应，就会被吸进葫芦里，化成一摊水。”听到这里，孙悟空显出原形，大声叫道：“金角，银角，孙悟空在此，快放了我师父！”银角大王说：“孙悟空明明被我压在了三座大山底下，你是谁？”孙悟空说：“告诉你吧，我是孙悟空的弟弟空悟孙！”金角大王在旁边高高举起红葫芦，叫道：“空悟孙！”孙悟空一想，这是我的假名字，答应一声没事，就应了一声：“老孙在此！”哪知道，孙悟空还是给吸进了红葫芦。他假装急得在里面大叫：“不得了啦！救命呀！我的猴腿变成水啦！我的肚子也变成水啦！”金角大王一听，打开盖子想看一看，没想到孙悟空变成一个小虫子从葫芦里飞走了。\n就在这个时候，只听见山洞外面有人在打门。“开门开门，空悟孙的弟弟悟空孙来了！”金角大王奇怪地说：“孙悟空到底有几个兄弟，怎么又来了一个？”银角大王拿起桌子上的红葫芦，大声说：“管他有几个兄弟，等我一起去把他装了来！”银角大王不知道，孙悟空已经把真的红葫芦偷走了，放在桌子上的是一个假葫芦。一出门，银角大王看见眼前的孙悟空也拿着一个红葫芦，就说：“悟空孙，我叫你名字，你敢不敢答应？”孙悟空说：“我当然敢，可是如果我叫你名字，你敢不敢答应？”银角大王说：“当然敢！不过我先喊，喂，悟空孙！”孙悟空回答道：“喊你孙爷爷干啥？”银角大王看见孙悟空没被引进去，正奇怪呢，孙悟空哈哈大笑说：“银角！”银角大王说：“干什么？”结果银角大王一下子化成一缕白烟，给吸进红葫芦里了。金角大王一看，转身就逃。只听孙悟空在后面大声叫：“金角，你往哪里逃？”金角大王头也不回地说：“我才不答应你呢！”哪知道，这也算是答应了，一下子就被吸进了红葫芦里。这时，门口来了一位白胡子老头，孙悟空仔细一看，原来是天上的太上老君。太上老君说：“大圣啊，这葫芦是我装仙丹用的，这金角银角是帮我炼丹的仙童，请你放过他们吧！”孙悟空打开盖子，让金角和银角大王出来。他们变成了两个童子，跟着太上老君回天上去了！", "25": "牛郎织女的故事\n每年的农历七月七日，是中国的七夕节。这一天，牛郎和织女会在天桥上相见。在晴朗的夜里，我们抬头望去，就可以看到银河边两颗最亮的星星，它们就是传说中的牛郎星和织女星。在很久以前，天宫里住着一位织女，她是王母娘娘最疼爱的小孙女。织女温柔又美丽，还有一双灵巧的手，能织出天上五彩的云儿。织女有六个姐妹，她们每天一起在天上不停地织着云彩，把天空装点得特别漂亮。在地上，有一位叫牛郎的年轻人。他的父母很早就死了，他的哥哥和嫂嫂对他很不好，只给了他一头老牛，就把他赶走了，这就是为什么人们都把他叫做牛郎。牛郎每天都带着老牛到河边吃草，没有人说话，他就把心里的话儿跟老牛说。这一天，他对老牛说：“要是有个人和我做伴，那该有多好啊！”“那也没有什么好难的！”老牛居然开口说话了，“明天会有七位美丽的仙女来河边洗澡，她们会把好看的衣裳放在河岸上。你去河边，偷偷藏起那件红色的衣裳，那位找不着衣裳的仙女就会留下来做你的妻子！”牛郎听老牛这样说，就决定明天一早去河边看看。第二天，果然河里来了七位美丽的仙女，她们把衣裳放在岸边，就在河里玩起水来。她们就是天上的七位织女。牛郎偷偷地来到仙女的衣裳前，里面果然有一件红色的，他拿起这件衣裳，转身就跑。仙女们忽然看见了牛郎，惊叫着拿起自己的衣裳，就飞上了天，只留下织女一个人在河里，不知道该怎么办。\n等其他织女都走了，牛郎走上前去说：“亲爱的姑娘，你愿不愿意做我的妻子？如果你愿意，我就把衣服还给你！”织女想了想，就点点头答应了。牛郎于是和织女结成了夫妻。每天牛郎出门耕地，织女就在家里织布。过了几年，他们还生下了一对儿子和女儿，过着幸福的生活。一天，老牛又说话了：“主人，我老了，不能再陪伴你们了。我死了过后，请把我的皮留下来，带在身边。如果有什么危难，只要披上我的皮，就可以帮你渡过难关。”自从天上少了一个织女，天空从此就没有了颜色。过了不久，织女出走的事情就被王母娘娘发现了。她非常生气，带着天兵天将就要去把织女抓回来。“不要抓我的妈妈呀！妈妈不要走啊！”一对小儿女看见妈妈被天兵天将抓住了，一面哭喊着，一面急忙跑去告诉地里的牛郎。这个时候，牛郎想起了老牛的话，就把一对儿女放在箩筐里，挑在肩上，然后披上老牛的皮，他们一下子就飞了起来。牛郎在后面越追越近，眼看就要追上了。王母娘娘看见了，立刻拔下头上的金簪，在天上一划，天上一下子就出现了一条银河，把牛郎和织女远远地隔开了。从此以后，他们只能隔着河相望，每天伤心极了。牛郎的身边是哭着的一对小儿女，不停地喊着妈妈。他们的真情最终感动了王母娘娘，王母娘娘答应他们每年的七月七日这一天，能够渡河相会。为了帮助牛郎和织女渡河，银河边飞来了很多喜鹊，它们一只一只地紧紧排在一起，搭成了一座长长的鹊桥。现在，七月七日已经成为了中国的情人节。这一天，大家晚上会一起看天上的星河，找一找河边的牛郎星和织女星，一起许下美好的心愿。", "26": "白蛇传很久以前，有两条修炼了千年的蛇精。姐姐是一条白蛇，名叫白素贞。妹妹是一条青蛇，名叫小青。有一天，白蛇告诉小青说：“当年我在山中修炼的时候，差点儿被一只老鹰杀死，是一位姓许的人救了我。现在我已经修成了人形，我想去人间，报答许家当年的恩情。”小青一听，高兴极了：“我也正想去人间看一看呢，正好陪姐姐一起。”她们于是变化成两个美丽的女子，来到热闹的人间。她们一路游玩，这一天来到了西湖的断桥边。那时正值春天，湖边柳树青青，桃花盛开，真是风景宜人。就在这时，天空中忽然下起了小雨。白蛇和小青没有带伞，湖边也没有躲雨的地方。正巧一位书生撑着伞经过，他看到两位姑娘无处躲雨，就上前说：“两位姑娘，如果不嫌弃，就用这把伞躲一躲雨吧！”白蛇抬头一看，只见眼前的书生眉清目秀，举止温和，心中顿时有了好感，便答应了。不一会儿，雨停了，三个人还一起坐船游湖。原来这位书生名叫许仙，是一位大夫。更巧的是，他就是当年救过白蛇的许家的后人。从此以后，许仙和白蛇常常来往。没过多久，两个人互相爱慕，就结成了夫妻，还在杭州开了一家有名的药店。这一天，许仙出门碰到了一个名叫法海的和尚。法海对许仙说：“我看你眉眼中有一股妖气，家中一定是藏着什么妖怪！”许仙说：“家里没有别人，只有我和妻子两人。”法海说：“你的妻子是蛇妖变的。你如果不信，过几天就是端午节了，只要给她喝下一些雄黄酒，她马上就会显出原形！”\n端午节那天，许仙照着法海和尚说的，给白蛇喝下了一些雄黄酒。白蛇喝了酒，立刻头晕眼花，倒在了床上，现出了原形。许仙看见床上盘着的竟然是一条巨大的白蛇，吓得大叫一声，当场被吓死了过去。白蛇酒醒了过后，看见身边昏死过去的丈夫，决定去昆仑山上寻找救命的仙草。许仙吃下仙草，终于活了过来。白蛇于是把自己的身世全都告诉了他。许仙知道了过后，也不再害怕，两人又和好如初。可是法海并没有放过白蛇，他趁着白蛇不在，就把许仙骗到了金山寺，不让他回家。白蛇知道了过后，带着小青赶到金山寺，要法海放人。为了打败法海，白蛇施展法术，引来了滚滚江水，只见水越来越大，差一点儿就要漫过了金山寺。这时法海脱下身上的袈裟，变成了一道长堤，水涨一寸，堤就高一寸。身子有孕的白蛇，渐渐法力不支，败下阵来。逃回家中的白蛇，生下了许仙的儿子。就在这时，法海又找上门来。他趁着白蛇刚刚生了孩子体力不支，用一个紫金钵把白蛇牢牢罩住，还让人在紫金钵上修了一座七层的雷峰塔，把白蛇压在了雷峰塔下。法海还说：“除非雷峰塔倒掉，要不白蛇就别再想回到人间。”为了救出姐姐，逃走的小青一直修炼法力。几年以后，她又回到了雷峰塔，要帮姐姐报仇，于是和法海展开了一场大战。这一次，武力高强的小青终于打败了法海。法海一路逃命，最后逃进了一只螃蟹的肚子里躲了起来。所以你看，今天我们打开螃蟹的肚子，是不是里面就像一个坐着的和尚？小青打败了法海，雷峰塔也因此倒掉，救出了姐姐白蛇。许仙和白蛇从此幸福地生活在一起。", "27": "梁山伯与祝英台\n在中国东晋时期，有一个聪明善良的女孩，名叫祝英台。她出生在一个富贵人家，从小喜欢读书写字。可那时候，女子不能像男子一样去学堂读书。祝英台心里很不服气，她常常想：“为什么男子能读书，女子却不能呢？”有一天，祝英台鼓起勇气，对父亲说：“爹爹，我想到外面求学，增长见识。”父亲一开始不同意，可祝英台再三请求，还说自己会女扮男装，不让别人发现。父亲见她态度坚定，只好答应了。于是，祝英台换上男装，背起书箱，离开家乡，前往杭州求学。一路上，她心里既紧张又兴奋。在途中，她遇见了一位年轻书生。那书生眉清目秀，说话温和，名叫梁山伯。两人一见如故，谈起诗文和理想，更是十分投缘。梁山伯觉得眼前这个“少年”聪明善良，祝英台也觉得梁山伯忠厚老实。于是，他们便结伴同行。走到一座小桥边时，祝英台提议：“我们如此有缘，不如结为兄弟吧！”梁山伯高兴地答应了。两人在桥边对天发誓，从此以兄弟相称。到了书院后，他们一起读书，一起写字，一起讨论文章。同窗三年，感情越来越深。梁山伯一直不知道祝英台其实是女子，还把她当成最好的兄弟。祝英台心里却渐渐喜欢上了梁山伯。她觉得梁山伯善良、正直，又很关心自己。可是，她始终没有勇气说出真相。有一次，两人一起出游。路边有一对鸳鸯在水中嬉戏，祝英台故意问：“梁兄，你看这鸳鸯总是成双成对，多好啊！”梁山伯却笑着说：“是啊，它们真像好朋友一样。”祝英台听了，又好气又好笑，心想：“他怎么一点也不明白我的心意呢？”\n后来，祝家来信，说父亲生病，让祝英台立刻回家。其实，这是家里催她回去成亲。分别时，祝英台依依不舍。她不能直接说自己是女子，只好暗暗提醒梁山伯。她对梁山伯说：“我家中有个妹妹，长得和我很像。如果梁兄愿意，我愿为你做媒。”梁山伯听了十分高兴，只是没想到那“妹妹”其实就是祝英台自己。分别后，梁山伯十分想念祝英台。过了几个月，他决定去祝家拜访。可当到了祝家，看见穿着女装的祝英台时，梁山伯才明白，自己喜爱的“兄弟”竟然是一位女子。两人终于表明了心意。梁山伯立刻回家，请媒人去祝家提亲。他满心欢喜地以为，很快就能迎娶祝英台。可是，事情并没有那么顺利。原来，祝英台的父亲早已把她许配给当地有钱人家的儿子马文才。祝英台坚决不同意，可父母认为婚姻大事必须听从家长安排，不许她违抗。梁山伯得知消息后，伤心极了。他本来身体就不好，再加上思念和悲痛，没过多久便病倒了。不久，梁山伯便去世了，临终前，他还一直念着祝英台的名字。祝英台听到消息，痛哭不止。到了出嫁那天，祝英台穿着红色嫁衣，被迎亲队伍抬着前往马家。谁知半路上，忽然狂风大作，乌云密布。花轿怎么也走不动了。有人说，前面正是梁山伯的墓地。祝英台听后，立刻下轿，跑到梁山伯墓前大哭。她含着眼泪说道：“梁兄，我们生不能在一起，死后也愿永不分离！”就在这时，忽然一声巨响，梁山伯的坟墓竟然裂开了一道缝。祝英台毫不犹豫地跳了进去。紧接着，天空放晴了，风也停了。人们惊讶地看见，两只美丽的蝴蝶从墓中飞了出来。它们在空中翩翩起舞，久久不愿离去。人们都说，那正是梁山伯和祝英台化成的蝴蝶。直到今天，每当人们看到成双成对的蝴蝶时，依然会想起梁山伯与祝英台那段感人至深的爱情故事。", "28": "武松打虎\n好汉武松这一天来到了阳谷县，只觉得又饿又渴。忽然看见前方一个酒家，门口挂着一面酒旗，上面写着五个大字：“三碗不过冈。”武松进了店，一坐下，便大声喊道：“店家，拿酒来！”店家连忙端上一碗酒。武松一口就喝了个精光，只觉得这酒又香又烈，大声说：“好酒！好酒！再来一碗！再切两斤熟牛肉来！”武松一边大口吃肉，一边大口喝酒，一会儿就喝了三碗酒。可是三碗过后，店家却不肯再上酒了。武松敲着桌子，大声叫道：“怎么不拿酒来？难道怕我不给钱不成？”店家连忙出来解释：“客官，你看我门前旗子上写着‘三碗不过冈’，只要喝了三碗一定会醉，就过不得前面的山冈了。”武松哈哈大笑，“就这点儿酒，怎么能醉倒我武松？”店家见他坚持，只好一碗又一碗的往上端，这一会儿工夫，武松就喝了十五碗酒。喝完了，武松站起身来，就要往门外走。店家连忙劝住：“客官，天快黑了，千万别独自过景阳冈，最近山上有只吊睛白额大虎，已经吃了不少人！”武松哪里肯信，冷笑道：“你就想骗我住店，就算是真有老虎，我也不怕！”说完，提起哨棒，大步朝景阳冈走去！走了半里地，来到一个山神庙前。只见庙前贴着一张榜文，上面写着：“景阳冈上，新有一条大虫，伤害人命，过冈需结伴同行。”武松这才相信，这山里真的有老虎！武松本想回去，可转念一想，“我如果回去，肯定被店家笑话。怕什么鸟！只管上去看怎地！”这时太阳已经慢慢落山，武松的酒劲也上来了，他越走越困，便来到一块大青石旁，把哨棒靠在一边，自己躺下就要去睡。忽然，一阵风吹过，只听得树丛后面哗地一声响，跳出一只吊睛白额大老虎来。那老虎张着血盆大口，两眼闪着凶光，朝着武松就扑了过来。武松见了，大叫一声：“哎呀！”从青石上翻了下来，把哨棒拿在手里，只一闪，就闪在了老虎身后。老虎看不见背后的人，把前爪\n趴在地上，回头又一扑。武松又一躲，躲在了一边，这时已经吓得酒都成冷汗出了。老虎一看，又没扑着，大声一吼，那吼声把山都震得动了起来，又把尾巴像一根铁棒一样竖起来，又朝武松扑了过来。说时迟，那时快，武松又闪在了一边。眼看老虎又要转身扑来，武松抡起哨棒，用尽全身力气，从半空中朝虎头猛地打了下去。只听得一声响，只见棒子没打着老虎，却打在了树枝上，哨棒折成了两断，只有一半还拿在手里。老虎一扑，正好扑在武松身上，把两只前爪搭在武松胸前。武松把断的棒子丢在一边，两只手把老虎一把按住。老虎着急正要挣扎，武松只管把两只脚朝老虎脸上、眼睛里，使劲乱踢。老虎吃痛，大声叫起来，把身底爬出一个泥坑来。武松用左手把老虎的嘴一直按到泥坑里去，右手提起铁锤大小的拳头，用尽平生的力气，朝老虎头上猛打。一下、两下、十几下……打到五十七拳，那老虎的眼里、口里、鼻子里、耳朵里，都流出鲜血来，终于趴在地上一动不动了。这时，武松已经累得浑身发软，坐在石头上休息。忽然又听见树林里响，里面又钻出两个虎头来。武松心想，“刚打死一只，现在又来了两只，今天一定是死定了。”忽然老虎的黑影直立了起来，原来是两个猎户，把虎皮缝的衣服，紧紧穿在身上。猎户看见武松独自一人，大惊道：“你怎么敢一个人过冈？没碰见老虎吗？”武松说：“那只老虎已经被我打死了！”两人不信，武松便领他们去看躺在草里的死老虎。看见老虎死了，猎户把老虎绑起来抬下山，大家听说武松打死了害人的老虎，都纷纷来看老虎和打虎的英雄武松。", "29": "真假李逵\n梁山泊有一位人称黑旋风的好汉名叫李逵，这一天他要下山去接他母亲。他的哥哥宋江对他说，“下山千万别吃酒，接了母亲赶紧回来！”李逵答应着，身上带了把朴刀，就出发了。这一天正走着，只见前面是一片树林，树木很高，李逵听说这地方有老虎，心里小心起来，脚步也慢了下来。刚走了几步，突然从树林里跳出一条大汉，大声喝道：“此路是我开，此树是我栽，想从此路过，留下买路钱！”李逵一看，前面这个人戴一顶红色的头巾，穿一身粗布衣服，手里拿着两把板斧，脸上用黑墨擦得一脸黑。李逵见了，大喝一声：“你是什么鸟人？敢在这里来抢人？”那个汉子答道：“要是说出我的名头来，只怕会吓破了你的胆，你爷爷名叫黑旋风。想活命的，赶紧留下买路钱！”李逵一听，大笑道：“你这鸟人哪里来的，也敢学你爷爷的名号！”李逵拿起朴刀，朝那个汉子冲了过去。那个汉子哪是李逵的对手，转身想跑，被李逵腿上刺了一刀。李逵一脚踏在他的胸脯上，大声喝道：“认得你爷爷是谁吗？”那汉子在地下使劲喊：“好汉饶命！好汉饶命！”李逵道：“我才是那黑旋风李逵，你到底是个什么鸟人，在这里骗人？”那汉子道：“小人也姓李，名叫李鬼。爷爷的名号是真响亮，只要一提起您的名字，过路的客人扔下行李就逃了。我只是得了些小钱，从来没害过人命！请爷爷饶命啊！”李逵一听，气不打一处来，提起板斧就要往下砍。只听李鬼道：“爷爷杀我一个，便是杀了我两个。小人家里有一个九十岁的母亲，没人养活，所以才用了爷爷的大名，抢一些过路人的包裹，真的从来没有害过人命啊！要是爷爷今天杀了我，家中的老母亲，就一定会饿死的！”\n李逵听他这样说，就放了李鬼，还给了他十两银子，让他以后不要再抢人。李鬼拿了银子，拜谢去了。李逵接着往前走，路上也没有看到一个酒店，只看见远远的山谷里有两间草屋。李逵走到草屋前，见里面走出一个妇人来。李逵上前说：“嫂子，我是过路的客人，肚子饿了，没有吃的，我给你些钱，能给我做些酒饭吃吗？”那妇人道：“酒没有，米饭倒有。”说完便走到后面的厨房烧起火来。趁着做饭的工夫，李逵走到屋子后面小解。只见一个汉子从山后进了屋，他于是站在屋后面听。那妇人看见汉子回来，便说：“大哥，你的腿怎么了？这是闪了腿吗？”那汉子道：“今天差点儿就没命了，没想到碰到了真的黑旋风。幸好我骗他家里面有老娘，才把我放了，还给了我十两银子。”只听那妇人道：“小声点儿，刚有一个黑大汉到家里来，难道就是他？你赶紧去前面看一看，是不是他，如果真是他，我去找些麻药来，放在菜里，让他吃了，把他麻翻在地，要了他的命，得了他的银子,我们就不用在这里过穷日子了。”李逵在屋子后面听得明明白白，心里想，“我饶了他的命，还给了他银子，他倒又要来害我！”李逵气得从门后面冲了进去，一把抓住李鬼，从身边抽出朴刀，一刀就把李鬼的头割了下来。那个妇人慌忙跑了。杀了李鬼，李逵拿着刀，出前门去找那妇人，却不知道她走到哪里去了。李逵回转来，把锅里的饭吃了，在屋里又搜得一些碎银两，一起装了。又把李鬼的尸体拖到屋下，放了把火，把房子一起烧了。", "30": "曹冲称象曹操有一个很聪明的小儿子，名字叫曹冲。有一天，一位远方的使节从海外给曹操送来了一只漂亮的山鸡。这只山鸡身上长着五彩的羽毛，大家都想看看山鸡跳舞的样子，可是这只山鸡就像生了病一样，躺在笼子里一动也不动。有人给它拿来了水，还有人拿来了小米，可是美丽的山鸡还是躺在笼子里睡大觉，没有一点儿动一动的意思。就在大家觉得这只山鸡一定是生病了的时候，曹冲却站出来说，“爹爹，我有一个好办法，可以让山鸡跳舞！”曹操一听很高兴，就答应让小儿子曹冲试一试。曹冲让人搬来了一面大铜镜，放在了山鸡面前。山鸡一看眼前有一只一模一样的大山鸡，就从笼子里走了出来。山鸡抖了抖身上的羽毛，来到了镜子前，对着镜子中的山鸡伸了伸脖子，又用嘴啄了啄。镜子里的山鸡好像在跟它打招呼，也抖了抖羽毛，还伸了伸长长的脖子，也用嘴啄了啄。镜子前的山鸡一下子来了劲，它抖动起红色的鸡冠，还打开五彩的翅膀，一张一合，在镜子面前跳起了舞，想和镜子里的那只山鸡比赛谁更漂亮呢！大家一看山鸡跳起了舞，都哈哈地大笑了起来，曹操也高兴地说：“我这个儿子还真有办法！”\n就在这时，使节又说：“我不光给曹丞相带来了美丽的山鸡，还给您运来了一头大象，请丞相过目！”大家一听都瞪大了眼睛，因为当时只有遥远的南方才有大象，没有人看过真正的大象。使节牵着大象，一步一步走到了大家的面前。大家一看，这大象可真是大呀！长长的鼻子，大大的耳朵，嘴里还有两根白白的象牙。\n曹操喜欢极了，问使节说：“这个大象有多重？你是怎么运来的？”使节回答说：“我们一路上经过千山万水，坐了船，还乘了车。只是这大象到底有多重，我是真的不知道啊！”\n曹操一听，转头问身边的人说：“有谁可以称出这头大象到底有多重？”一个人说，“可以专门为这头大象造一座大秤。秤的一边放石头，一边称大象，这样就可以称出大象的重量了！”曹操说：“这个办法听上去可行，但是费时费力！谁还有什么更好的办法？”下面又有人说：“实在不行，就把大象切成几块，一块一块地称不就行了吗？”大家都笑了，为了知道大象的重量，就把大象杀死，这可真是一个笨办法。小曹冲站在身旁，笑嘻嘻地说：“爹爹，我有一个好办法，不用造大秤，也不用杀大象，就能称出大象的重量！”曹操一听，称赞地说：“哦？那我们倒要看看你要怎么称？”曹冲说，“只要把大象带到湖边，准备一只船就可以啦！”使节于是把大象牵上了船。大象一上船，船就不停地晃，过了一会儿，等船不再摇晃了，曹冲让人拿出小刀，沿着水面在船边上刻了一条线。曹冲说：“来人啊！现在把大象牵下船，再去找一些大石头搬到船上去。”士兵们听命，一个接一个地把大石头运上了船。每次士兵下船的时候，曹冲都要等船不再摇晃了，看一看船旁边的那条线。运了好几轮石头，曹冲终于说：“停！现在，你们再把石头给搬下来！”旁边有人问：“这不刚把石头搬上去，为什么又要把石头搬下来啊？”曹冲说：“刚才大象在船上的时候，我们不是在船边刻了一条跟水一样齐的线吗？现在装满了石头，水正好跟那条线一样齐了。这就是说，船上的石头跟大象的重量也是一样的了，我们只要把船上的石头称一称，不就是大象的重量了吗？”曹操一听，拍了拍曹冲的头说：“我这个儿子，可真是聪明啊！”"}};            // {zika:[{cls,cards}], eka:[...]}
const N = DATA.zika.length;       // 12 classes
let cls = 1, tab = 'eka', idx = 0;
let seq = [], pos = 0, seqKey = '', shuffled = false;
let sw = false;   // true briefly after a swipe, to suppress the tap-to-pronounce
let autoSpeak = false;   // toggle: auto-pronounce when switching characters
function resetSeq(){ seqKey=''; shuffled=false; }

// ---- speech (iOS unlock) ----
let unlocked=false;
function unlock(){ if(unlocked)return; unlocked=true; try{const u=new SpeechSynthesisUtterance(' ');u.volume=0;speechSynthesis.speak(u);}catch(e){} }
document.addEventListener('touchstart',unlock); document.addEventListener('click',unlock);
let zhVoice=null;
function pickVoice(){
  const vs=speechSynthesis.getVoices();
  const zh=vs.filter(v=>/zh|Chinese|中文/i.test(v.lang+'|'+v.name));
  const score=v=>{ let s=0;
    if(/zh[-_]CN|zh_Hans|Chinese \(China|Mandarin/i.test(v.lang+v.name)) s+=4;
    if(/premium|enhanced|siri/i.test(v.name)) s+=3;
    if(/Ting-?Ting|Mei-?Jia|Yu-?shu|Li-?mu|Han/i.test(v.name)) s+=1;
    if(v.localService) s+=1; return s; };
  zhVoice = zh.sort((a,b)=>score(b)-score(a))[0]||null;
}
pickVoice(); if(typeof speechSynthesis!=='undefined') speechSynthesis.onvoiceschanged=pickVoice;
let readToken=0;
function speak(t,rate){ try{ readToken++; speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(t); u.lang='zh-CN'; u.rate=rate||.7; if(zhVoice)u.voice=zhVoice; speechSynthesis.speak(u);}catch(e){} }

// ---- sidebar ----
const side=document.getElementById('side');
const LABELS=DATA.labels||[];
for(let i=1;i<=N;i++){ const b=document.createElement('button'); b.textContent='第'+(LABELS[i-1]||i)+'周'; b.dataset.cls=i; b.onclick=()=>{cls=i; resetSeq(); syncSide(); render();}; side.appendChild(b); }
function syncSide(){ [...side.children].forEach(b=>b.classList.toggle('on',+b.dataset.cls===cls)); }

// ---- tabs ----
const tabsEl=document.getElementById('tabs');
[...tabsEl.children].forEach(b=>b.onclick=()=>{ tab=b.dataset.tab; resetSeq(); render(); });
function syncTabs(){ [...tabsEl.children].forEach(b=>b.classList.toggle('on',b.dataset.tab===tab)); }

// ---- views ----
const deckV=document.getElementById('deckView'), testV=document.getElementById('testView'), keV=document.getElementById('keView');
function deck(){ return DATA[tab][cls-1].cards; }

function render(){
  syncSide(); syncTabs();
  testV.classList.add('hidden');
  if(tab==='ke' || tab==='after'){ deckV.classList.add('hidden'); keV.classList.remove('hidden'); renderKe(); return; }
  keV.classList.add('hidden'); deckV.classList.remove('hidden');
  ensureSeq(); idx=seq[pos];
  document.getElementById('shuffle').classList.toggle('on',shuffled);
  const c=deck()[idx];
  const ck=tab+'|'+cls+'|'+idx; if(ck!==zuciKey){ zuciKey=ck; zuciShown=false; }
  document.getElementById('zuciBtn').classList.toggle('hidden', tab!=='zika');
  const zHide = zuci && tab==='zika' && c.hi!=null && !zuciShown;
  document.getElementById('pinyin').textContent = zHide ? (c.p.split(' ')[c.hi]||'') : c.p;
  const h=document.getElementById('hanzi');
  if(zHide){
    h.textContent=c.c[c.hi];   // 组词: show only the new character until tapped
  } else if(tab==='zika' && c.hi!=null){
    h.innerHTML='';
    [...c.c].forEach((ch,i)=>{
      const s=document.createElement('span');
      s.textContent=ch;
      s.style.color=(i===c.hi?'#222':'#9a9a9a');
      s.style.cursor='pointer';
      s.onclick=(e)=>{ e.stopPropagation(); if(sw)return; speak(ch); };   // tap a single character to pronounce it
      h.appendChild(s);
    });
  } else {
    h.textContent=c.c;
  }
  fitHanzi();
  document.getElementById('counter').textContent=(pos+1)+' / '+seq.length+(shuffled?'　🔀':'');
  if(autoSpeak) speak(zHide ? c.c[c.hi] : c.c);   // auto-pronounce only when the toggle is on
}
function ensureSeq(){ const k=tab+'|'+cls; if(k!==seqKey){ seqKey=k; seq=deck().map((_,i)=>i); pos=0; shuffled=false; } }
// keep multi-char words on one line: shrink font until it fits the card width
function fitHanzi(){
  const h=document.getElementById('hanzi'); if(!h.textContent) return;
  h.style.fontSize='';
  const avail=h.parentElement.clientWidth-36;
  if(h.scrollWidth>avail){
    const cur=parseFloat(getComputedStyle(h).fontSize);
    h.style.fontSize=(cur*avail/h.scrollWidth)+'px';
  }
}
window.addEventListener('resize',()=>{ if(!deckV.classList.contains('hidden')) fitHanzi(); });
document.getElementById('prev').onclick=()=>{ pos=(pos-1+seq.length)%seq.length; render(); };
document.getElementById('next').onclick=()=>{ pos=(pos+1)%seq.length; render(); };
document.getElementById('shuffle').onclick=()=>{
  ensureSeq(); shuffled=!shuffled;
  seq=deck().map((_,i)=>i);
  if(shuffled){ seed=(Date.now()%233280)||7; shuffle(seq); }
  pos=0; render();
};
// 组词 mode (两联字卡): show only the new character; tap the card to reveal the full word
let zuci=false, zuciShown=false, zuciKey='';
const zuciBtn=document.getElementById('zuciBtn');
zuciBtn.onclick=()=>{ zuci=!zuci; zuciKey=''; zuciBtn.classList.toggle('on',zuci); render(); };
function zuciHidden(){ const c=deck()[idx]; return zuci && tab==='zika' && c.hi!=null && !zuciShown; }
document.getElementById('speak').onclick=()=>{ const c=deck()[idx]; speak(zuciHidden()? c.c[c.hi] : c.c); };
document.getElementById('hanzi').onclick=()=>{ if(sw)return; const c=deck()[idx];
  if(zuciHidden()){ zuciShown=true; render(); speak(c.c); return; }
  speak(c.c);
};
// swipe left/right on the card to navigate
(function(){
  const st=document.querySelector('#deckView .stage'); let x0=null,y0=null;
  st.addEventListener('touchstart',e=>{ const t=e.changedTouches[0]; x0=t.clientX; y0=t.clientY; sw=false; },{passive:true});
  st.addEventListener('touchend',e=>{
    if(x0==null) return;
    const t=e.changedTouches[0], dx=t.clientX-x0, dy=t.clientY-y0;
    if(Math.abs(dx)>40 && Math.abs(dx)>Math.abs(dy)){
      sw=true; setTimeout(()=>{ sw=false; },400);
      document.getElementById(dx<0?'next':'prev').click();
    }
    x0=null;
  },{passive:true});
})();

// ---- test (over current deck) ----
let order=[],qi=0,correct=0,seed=1,wrongList=[];
function rnd(){ seed=(seed*9301+49297)%233280; return seed/233280; }
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(rnd()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
let actx=null;
function errSound(){ try{ actx=actx||new (window.AudioContext||window.webkitAudioContext)(); if(actx.state==='suspended')actx.resume();
  const o=actx.createOscillator(),g=actx.createGain(); o.type='square'; o.frequency.setValueAtTime(180,actx.currentTime);
  o.frequency.exponentialRampToValueAtTime(90,actx.currentTime+.2); g.gain.setValueAtTime(.18,actx.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+.25); o.connect(g); g.connect(actx.destination); o.start(); o.stop(actx.currentTime+.26);
}catch(e){} }
function startTest(){
  seed=(idx+1)*(cls+7)*(tab.length+3)+deck().length;
  order=shuffle(deck().map((_,i)=>i)); qi=0; correct=0; wrongList=[];
  deckV.classList.add('hidden'); testV.classList.remove('hidden'); showQ();
}
function showQ(){
  if(qi>=order.length){ finish(); return; }
  document.getElementById('tprompt').textContent='读拼音，选对应的'+(tab==='zika'?'词':'字');
  const q=deck()[order[qi]];
  document.getElementById('score').textContent='第'+(qi+1)+'/'+order.length+'题　得分 '+correct;
  document.getElementById('qpinyin').textContent=q.p;
  speak(q.c);
  const pool=deck().map((c,i)=>i).filter(i=>i!==order[qi]); shuffle(pool);
  const choices=shuffle([order[qi],pool[0],pool[1],pool[2]].filter(x=>x!==undefined));
  const box=document.getElementById('opts'); box.innerHTML='';
  let wrongThisQ=false;
  choices.forEach(i=>{ const b=document.createElement('button'); b.textContent=deck()[i].c;
    b.onclick=()=>{
      if(i===order[qi]){
        b.className='right'; if(!wrongThisQ) correct++; speak(q.c);
        setTimeout(()=>{ qi++; showQ(); },700);
      } else {
        b.className='wrong'; b.disabled=true; errSound();
        if(!wrongThisQ){ wrongThisQ=true; wrongList.push(q.c); }
        document.getElementById('tprompt').textContent='再试一次 🔄';
      }
    }; box.appendChild(b);
  });
}
function finish(){
  const box=document.getElementById('opts'); box.innerHTML='';
  document.getElementById('qpinyin').textContent=correct+' / '+order.length;
  document.getElementById('tprompt').textContent=(correct===order.length?'全对！太棒了 🎉':'完成！再来一次吧');
  document.getElementById('score').textContent='';
  if(wrongList.length){
    const w=document.createElement('div'); w.style.cssText='grid-column:1/-1;text-align:center;margin:4px 0 8px;';
    w.innerHTML='<div style="color:#e74c3c;font-size:16px;margin-bottom:4px;">错的字（点一下听发音）：</div>';
    wrongList.forEach(c=>{ const s=document.createElement('span'); s.textContent=c; s.style.cssText='display:inline-block;font-size:30px;margin:4px 10px;cursor:pointer;color:#c0392b;'; s.onclick=()=>speak(c); w.appendChild(s); });
    box.appendChild(w);
  }
  const r=document.createElement('button'); r.textContent='重新测验'; r.style.gridColumn='1/-1'; r.onclick=startTest; box.appendChild(r);
}
document.getElementById('startTest').onclick=startTest;
document.getElementById('qspeak').onclick=()=>speak(deck()[order[qi]].c);
document.getElementById('backToCards').onclick=()=>{ testV.classList.add('hidden'); deckV.classList.remove('hidden'); render(); };

// ---- 课文 / 整本书 reader (tappable chars + read + pause/resume) ----
const KEWEN = DATA.kewen || {}, AFTER = DATA.after || {};
const READ_RATE=.55, TAP_RATE=.7;
const keText=document.getElementById('keText');
let curRead='';
function fillChars(text, parent){
  const out=[];
  for(const ch of text){
    if(/[一-鿿]/.test(ch)){ const s=document.createElement('span'); s.className='kc'; s.textContent=ch; s.onclick=()=>speak(ch,TAP_RATE); parent.appendChild(s); out.push(s); }
    else parent.appendChild(document.createTextNode(ch));
  }
  return out;
}
// karaoke highlight: map spoken-text char index -> its .kc span
let hlSpans=[], hlMap=[];
function setHl(text, spans){
  hlSpans=spans||[]; hlMap=[]; let k=0;
  for(let i=0;i<text.length;i++) hlMap[i]=/[一-鿿]/.test(text[i])?k++:-1;
}
function clearHl(){ keText.querySelectorAll('.kc.khl,.kc.kseg').forEach(s=>s.classList.remove('khl','kseg')); }
function hlRange(start,len,cls){ for(let i=start;i<start+len;i++){ const o=hlMap[i]; if(o>=0&&hlSpans[o]) hlSpans[o].classList.add(cls); } }
function hlWord(start,len){
  keText.querySelectorAll('.kc.khl').forEach(s=>s.classList.remove('khl'));
  hlRange(start,len,'khl');
  const o=hlMap[start]; if(o>=0&&hlSpans[o]) hlSpans[o].scrollIntoView({block:'nearest'});
}
function renderKe(){
  const txt=(tab==='after'?AFTER:KEWEN)[cls]||'（暂无内容）';
  curRead=txt; storyList=[]; storyIdx=0; paused=false;   // reset reader for new content
  keText.innerHTML=''; keSpans=fillChars(txt, keText); keText.scrollTop=0;
  syncPause();
}
// resumable story player (segment-based; iOS pause()/resume() is unreliable)
let storyList=[], storyIdx=0, storyRate=READ_RATE, paused=false, keSpans=[];
function buildSegs(text){
  const LONG=/[。！？!?]/, SHORT=/[，、；：,;:]/; const segs=[]; let off=0;
  text.split('\n').forEach((line,li)=>{
    let cur='', cs=off;
    for(const ch of line){ cur+=ch;
      if(LONG.test(ch)){ segs.push({t:cur,p:480,s:cs}); cs+=cur.length; cur=''; }
      else if(SHORT.test(ch)){ segs.push({t:cur,p:280,s:cs}); cs+=cur.length; cur=''; } }
    if(cur.trim()) segs.push({t:cur,p:0,s:cs});
    if(segs.length) segs[segs.length-1].p=Math.max(segs[segs.length-1].p, li===0?600:420);
    off+=line.length+1;
  });
  return segs.filter(s=>s.t.trim());
}
function playStory(){
  const my=++readToken;
  (function next(){
    if(my!==readToken || paused || storyIdx>=storyList.length){ if(storyIdx>=storyList.length){ syncPause(); clearHl(); } return; }
    const seg=storyList[storyIdx];
    const u=new SpeechSynthesisUtterance(seg.t.trim());
    const base=seg.s+(seg.t.length-seg.t.trimStart().length);
    u.lang='zh-CN'; u.rate=storyRate; if(zhVoice)u.voice=zhVoice;
    // sentence highlight up front (fallback when no boundary events, e.g. some iOS voices)
    u.onstart=()=>{ if(my!==readToken) return; clearHl(); hlRange(seg.s,seg.t.length,'kseg'); const o=hlMap[base]; if(o>=0&&hlSpans[o]) hlSpans[o].scrollIntoView({block:'nearest'}); };
    u.onboundary=e=>{ if(my===readToken) hlWord(base+e.charIndex, e.charLength||1); };
    u.onend=()=>{ if(my===readToken && !paused){ storyIdx++; setTimeout(next, seg.p); } };
    speechSynthesis.speak(u);
  })();
}
function speakStory(text){ storyList=buildSegs(text); setHl(text, keSpans); storyIdx=0; paused=false; readToken++; try{speechSynthesis.cancel();}catch(e){} syncPause(); playStory(); }
function togglePause(){
  if(!storyList.length || storyIdx>=storyList.length) return;
  if(paused){ paused=false; playStory(); }
  else { paused=true; readToken++; try{speechSynthesis.cancel();}catch(e){} }
  syncPause();
}
function syncPause(){ const b=document.getElementById('stop'); if(!b) return;
  const playing=storyList.length && storyIdx<storyList.length && !paused;
  b.innerHTML = playing ? '&#9208; 暂停' : '&#9654; 继续'; }
document.getElementById('read').onclick=()=>{ if(curRead) speakStory(curRead); };
document.getElementById('stop').onclick=togglePause;

// auto-pronounce toggle
const asBtn=document.getElementById('autospk');
try{ autoSpeak = localStorage.getItem('autoSpeak')==='1'; }catch(e){}
function syncAs(){ asBtn.textContent=(autoSpeak?'🔊 自动读：开':'🔇 自动读：关'); asBtn.classList.toggle('on',autoSpeak); }
asBtn.onclick=()=>{ autoSpeak=!autoSpeak; try{localStorage.setItem('autoSpeak',autoSpeak?'1':'0');}catch(e){} syncAs(); if(autoSpeak) speak(deck()[idx].c); };
syncAs();

syncSide(); render();
</script>
