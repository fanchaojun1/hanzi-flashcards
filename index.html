<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>字卡复习</title>
<style>
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body{ margin:0; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:22px; font-family:-apple-system,"PingFang SC",sans-serif; background:#f4f1ea; color:#222; }
  h1{ font-size:28px; margin:0 0 6px; }
  a{ display:block; width:280px; text-align:center; text-decoration:none; font-size:26px;
    padding:24px; border-radius:18px; background:#1abc9c; color:#fff; box-shadow:0 4px 14px rgba(0,0,0,.15); }
  a.g3{ background:#c0392b; }
  a.g6{ background:#8e44ad; }
  a.xz{ background:#e67e22; }
  a.xz6{ background:#d35400; }

  /* ---- lock screen (phone dial pad) ---- */
  #lock{ position:fixed; inset:0; background:#111; color:#fff; z-index:99;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:22px; }
  #lock .title{ font-size:20px; color:#bbb; letter-spacing:2px; }
  #dots{ display:flex; gap:16px; height:20px; }
  #dots span{ width:16px; height:16px; border-radius:50%; border:2px solid #888; }
  #dots span.on{ background:#fff; border-color:#fff; }
  #pad{ display:grid; grid-template-columns:repeat(3,86px); gap:18px; }
  .key{ width:86px; height:86px; border-radius:50%; background:#333; color:#fff; border:none;
    display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; }
  .key:active{ background:#555; }
  .key .n{ font-size:34px; line-height:1; }
  .key .l{ font-size:10px; letter-spacing:2px; color:#aaa; height:12px; }
  .key.fn{ background:transparent; font-size:16px; color:#ccc; }
  #lock.bad #dots{ animation:shake .35s; }
  @keyframes shake{ 0%,100%{transform:translateX(0)} 25%{transform:translateX(-10px)} 75%{transform:translateX(10px)} }
</style>
</head>
<body>
  <div id="lock">
    <div class="title">请输入密码</div>
    <div id="dots"><span></span><span></span><span></span><span></span></div>
    <div id="pad"></div>
  </div>

  <h1>字卡复习</h1>
  <a class="g1" href="一年级复习.html">一年级</a>
  <a class="g3" href="3年纪复习.html">三年级</a>
  <a class="g6" href="6年级复习.html">六年级</a>
  <a class="xz" href="写字总表.html">三年级写字表-笔顺</a>
  <a class="xz6" href="6年级写字表.html">六年级写字表-笔顺</a>

<script>
const PASS='6404';
const lock=document.getElementById('lock'), dots=[...document.getElementById('dots').children], pad=document.getElementById('pad');
let entry='';
const keys=[['1',''],['2','ABC'],['3','DEF'],['4','GHI'],['5','JKL'],['6','MNO'],['7','PQRS'],['8','TUV'],['9','WXYZ'],['','⌫'],['0','+'],['','']];
keys.forEach(([n,l])=>{
  const b=document.createElement('button');
  if(n===''&&l==='⌫'){ b.className='key fn'; b.textContent='⌫'; b.onclick=back; }
  else if(n===''){ b.style.visibility='hidden'; b.className='key'; }
  else { b.className='key'; b.innerHTML='<span class="n">'+n+'</span><span class="l">'+l+'</span>'; b.onclick=()=>press(n); }
  pad.appendChild(b);
});
function draw(){ dots.forEach((d,i)=>d.classList.toggle('on', i<entry.length)); }
function press(n){
  if(entry.length>=4) return;
  entry+=n; draw();
  if(entry.length===4){
    if(entry===PASS){ try{localStorage.setItem('fiapp_ok','1');}catch(e){} lock.style.display='none'; }
    else { lock.classList.add('bad'); setTimeout(()=>{ entry=''; draw(); lock.classList.remove('bad'); },400); }
  }
}
function back(){ entry=entry.slice(0,-1); draw(); }
try{ if(localStorage.getItem('fiapp_ok')==='1') lock.style.display='none'; }catch(e){}
</script>
</body>
</html>
