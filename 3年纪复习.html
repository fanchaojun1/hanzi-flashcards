<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>3年级上 字卡</title>
<style>
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; height:100%; font-family:-apple-system,"PingFang SC","Heiti SC",sans-serif; background:#f4f1ea; color:#222; overflow:hidden; }
  #app{ display:flex; height:100%; }

  /* sidebar: 12 classes */
  #side{ width:96px; flex:none; background:#2c3e50; overflow-y:auto; -webkit-overflow-scrolling:touch; }
  #side button{ display:block; width:100%; border:none; background:none; color:#cdd6df;
    font-size:16px; padding:16px 4px; cursor:pointer; border-bottom:1px solid rgba(255,255,255,.06); }
  #side button.on{ background:#1abc9c; color:#fff; font-weight:600; }

  #main{ flex:1; display:flex; flex-direction:column; min-width:0; }
  #tabs{ display:flex; flex:none; }
  #tabs button{ flex:1; border:none; background:#e7e2d6; color:#555; font-size:17px; padding:12px 4px; cursor:pointer; }
  #tabs button.on{ background:#f4f1ea; color:#c0392b; font-weight:700; box-shadow:inset 0 -3px 0 #c0392b; }

  #deckView,#testView{ flex:1; display:flex; flex-direction:column; min-height:0; }
  .counter{ text-align:center; color:#888; font-size:14px; padding:4px; flex:none; }
  .autospk{ display:block; margin:0 auto 4px; font-size:13px; padding:4px 14px; border:1px solid #ccc;
    border-radius:14px; background:#fff; color:#888; cursor:pointer; flex:none; }
  .autospk.on{ background:#27ae60; color:#fff; border-color:#27ae60; }
  .stage{ flex:1; display:flex; align-items:center; justify-content:center; padding:8px; min-height:0; }
  .card{ background:#fff; border-radius:22px; box-shadow:0 6px 20px rgba(0,0,0,.12);
    width:100%; max-width:760px; aspect-ratio:3/2; max-height:100%; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:14px; padding:18px; }
  .pinyin{ font-size:clamp(28px,5.5vh,60px); color:#c0392b; letter-spacing:1px; min-height:1.2em; text-align:center; }
  #pinyin{ display:none; }   /* hide pinyin on flashcard decks (still shown in 测验 via #qpinyin) */
  .hanzi{ font-size:min(34vh,40vw); line-height:1; text-align:center; white-space:nowrap; }
  .speak{ font-size:28px; background:#3498db; color:#fff; border:none; border-radius:50%; width:60px; height:60px; cursor:pointer; flex:none; }
  .speak:active{ transform:scale(.92); }
  .nav{ display:flex; gap:10px; padding:10px 14px 6px; flex:none; }
  .nav button{ flex:1; font-size:20px; padding:14px; border:none; border-radius:12px; background:#2c3e50; color:#fff; cursor:pointer; }
  .nav button:active{ opacity:.7; }
  .nav button.on{ background:#e67e22; }
  .test{ flex:none; display:block; width:calc(100% - 28px); margin:0 14px 16px; font-size:20px;
    padding:14px; border:none; border-radius:12px; background:#27ae60; color:#fff; cursor:pointer; }

  .opts{ display:grid; grid-template-columns:1fr 1fr; gap:10px; width:100%; max-width:560px; padding-top:8px; }
  .opts button{ font-size:28px; padding:14px; border:1px solid #ccc; border-radius:12px; background:#fff; cursor:pointer; }
  .opts button.right{ background:#27ae60; color:#fff; }
  .opts button.wrong{ background:#e74c3c; color:#fff; }
  .prompt{ font-size:22px; color:#c0392b; text-align:center; }
  .score{ text-align:center; font-size:18px; padding:6px; }

  /* 课文 / 整本书 reader */
  #keView{ flex:1; display:flex; flex-direction:column; padding:14px; gap:10px; min-height:0; }
  #keText{ flex:1; overflow:auto; -webkit-overflow-scrolling:touch; white-space:pre-wrap;
    font-size:24px; line-height:2; padding:14px; border:1px solid #ccc; border-radius:12px;
    background:#fff; min-height:0; text-align:left; }
  #keText .kc{ cursor:pointer; padding:0 1px; border-radius:4px; }
  #keText .kc:active{ background:#ffe08a; }
  #keText .kc.kseg{ background:#fdf0c2; }
  #keText .kc.khl{ background:#ffb347; }
  .keBtns{ display:flex; gap:10px; }
  .keBtns button{ flex:1; font-size:18px; padding:14px; border:none; border-radius:12px; color:#fff; cursor:pointer; }
  #read{ background:#27ae60; } #stop{ background:#e67e22; }

  .hidden{ display:none !important; }

  /* iPad / large landscape */
  @media (min-width:768px) and (orientation:landscape){
    #side{ width:120px; } #side button{ font-size:19px; padding:20px 4px; }
    #tabs button{ font-size:20px; padding:14px; }
    .card{ max-width:1000px; aspect-ratio:16/9; }
    .hanzi{ font-size:34vh; } .pinyin{ font-size:6vh; }
    .opts{ grid-template-columns:repeat(4,1fr); } .opts button{ font-size:36px; }
    #keText{ font-size:26px; }
  }
</style>
</head>
<body>
<div id="app">
  <nav id="side"></nav>
  <div id="main">
    <div id="tabs">
      <button data-tab="eka">字卡</button>
      <button data-tab="zika">两联字卡</button>
      <button data-tab="ke">课文</button>
      <button data-tab="book">整本书</button>
    </div>

    <!-- flashcard deck (字卡 / E字卡) -->
    <div id="deckView">
      <div class="counter" id="counter"></div>
      <button id="autospk" class="autospk"></button>
      <div class="stage"><div class="card">
        <div class="pinyin" id="pinyin"></div>
        <div class="hanzi" id="hanzi"></div>
        <button class="speak" id="speak">&#128264;</button>
      </div></div>
      <div class="nav">
        <button id="prev">&#8592;</button>
        <button id="shuffle" title="打乱顺序">&#128256;</button>
        <button id="next">&#8594;</button>
      </div>
      <button class="test" id="startTest">测验</button>
    </div>

    <!-- test -->
    <div id="testView" class="hidden">
      <div class="score" id="score"></div>
      <div class="stage"><div class="card">
        <div class="prompt" id="tprompt">读拼音，选对应的字</div>
        <div class="pinyin" id="qpinyin"></div>
        <button class="speak" id="qspeak">&#128264;</button>
        <div class="opts" id="opts"></div>
      </div></div>
      <div class="nav"><button id="backToCards">返回</button></div>
    </div>

    <!-- 课文 / 整本书 reader -->
    <div id="keView" class="hidden">
      <div id="keText"></div>
      <div class="keBtns">
        <button id="read">&#128266; 朗读</button>
        <button id="stop">&#9208; 暂停</button>
      </div>
    </div>
  </div>
</div>

 {"c": "兔", "p": "tù"}, {"c": "菜", "p": "cài"}, {"c": "请", "p": "qǐng"}, {"c": "取", "p": "qǔ"}, {"c": "吧", "p": "ba"}]}, {"cls": 27, "cards": [{"c": "碰", "p": "pèng"}, {"c": "狸", "p": "lí"}, {"c": "两", "p": "liǎng"}, {"c": "极", "p": "jí"}, {"c": "烟", "p": "yān"}, {"c": "硬", "p": "yìng"}, {"c": "常", "p": "cháng"}, {"c": "合", "p": "hé"}, {"c": "急", "p": "jí"}, {"c": "水", "p": "shuǐ"}]}, {"cls": 28, "cards": [{"c": "被", "p": "bèi"}, {"c": "救", "p": "jiù"}, {"c": "并", "p": "bìng"}, {"c": "且", "p": "qiě"}, {"c": "鼠", "p": "shǔ"}, {"c": "象", "p": "xiàng"}, {"c": "细", "p": "xì"}, {"c": "关", "p": "guān"}, {"c": "从", "p": "cóng"}]}, {"cls": 29, "cards": [{"c": "蓝", "p": "lán"}, {"c": "毛", "p": "máo"}, {"c": "歪", "p": "wāi"}, {"c": "爷", "p": "yé"}, {"c": "乖", "p": "guāi"}, {"c": "户", "p": "hù"}, {"c": "公", "p": "gōng"}, {"c": "挺", "p": "tǐng"}, {"c": "胖", "p": "pàng"}, {"c": "喜", "p": "xǐ"}]}, {"cls": 30, "cards": [{"c": "吵", "p": "chǎo"}, {"c": "步", "p": "bù"}, {"c": "饭", "p": "fàn"}, {"c": "桌", "p": "zhuō"}, {"c": "镜", "p": "jìng"}, {"c": "睡", "p": "shuì"}, {"c": "候", "p": "hòu"}, {"c": "南", "p": "nán"}, {"c": "瓜", "p": "guā"}]}], "kewen": {"1": "1. 读书郎\n小嘛小儿郎，背着那书包上学堂，不怕太阳晒，也不怕那风雨狂，只怕先生骂我懒哪，没有学问啰，无颜见爹娘。 \n2. 九月一日前夜\n墙上挂着我的新书包，我悄悄对床头的闹钟说：“别忘了明早叫我哦，第一天可不能迟到，我要第一个走进学校！”", "2": "3. 我举手\n我举手，小手举得笔笔直。 难道就没一个人看见我举手了？ 这道题我早知道该怎么做了，老师，老师，快看看我，叫我上去，我一定不慌不忙，我的回答一定会让你表扬！ \n4. 自己会念书多好\n自己认得书里的字多好！ 不用天天去找妈妈，不用去叫奶奶念一念：“讲个故事给我听，好吗？” 更不用拉着姐姐不放：“再读一会儿，就一会儿，好不好？” 书桌上的书，只要捧起来，目不转睛地念下去就好！", "3": "5. 小象上学\n小象要上学啦！ 他问妈妈：“先上几年级？” 妈妈说：“先上一年级。” \n第二天早上，小象穿上背带裤，背上新书包，咚咚咚地出门了。 \n班上有许多小朋友，小兔子个子矮，坐在了前排；长颈鹿个子高，坐在了后排；大熊猫不高也不矮，坐在了中间。 \n可是门太窄，小象怎么也进不了教室，幸好山羊老师来了。 山羊老师说：“哎呀，小象别着急，这可不是你的问题，后门刚刚好，转弯就到了！” \n第一节课是语文课，山羊老师教大家认“棒”字。 小象一看，开心得不得了，“象鼻像棒！象鼻像棒！我昨天还用鼻子卷着跑呢！” \n第二节课上数学课，老师问：“谁知道5+4=？” 小兔子立刻开始数他带的胡萝卜，大熊猫赶快低头，专心地数着竹叶。 小象举起了鼻子，用力想。 没想到小羊老师看到了，开心地说：“同学们看，小象回答对了！5+4就是等于9呀！” 小象想不通，心里纳闷地想：“我可什么也没有说呀！”", "4": "下课啦，小象想去操场跑一跑。 他迈开四条大胖腿，“咚咚咚”的声音吓得小动物们满地乱跑。 \n中午吃饭，小象看到小兔子在吃胡萝卜，长颈鹿在吃树枝，熊猫在吃竹子。 他一抬鼻子，呼地一下，把自己的蔬菜和邻座的肉丸汤都卷跑了！ \n“别抢我的肉汤！”邻座的小熊大叫，还说小象不懂礼貌。 小象赶紧说：“对不起，我真的不是故意的，我的鼻子太长，不是想抢你的肉丸汤！” \n最后一节是音乐课，老师教大家唱歌，小象唱得太响，把窗子震得咣咣响。 山羊老师只好请他到教室门外唱，“你从这里唱，从远处听起来刚刚好！” \n放学回家，小象摇摇鼻子，笑眯眯地说：“有趣，我明天还要去！不过我得先学会怎么轻点儿走路，小声说话，不然小朋友们都要被我吓跑啦！”", "5": "写字的故事\n1. 圈儿圈儿\n李大明爱听故事，可就是不爱写字。 妈妈让他写字，他总是写两行就画起了圈儿，想赶快写完了就去院子里玩儿。 妈妈提醒他说：“李大明，写字要认真，不能马虎哦！” 李大明点点头，转头又开始画起了圈儿。 \n第二天，上语文课，老师要大家听写。 李大明一听，着了慌，他拿着笔，手心冒汗，只听老师念道：“小老鼠，上灯台，偷油吃，下不来。” \n李大明有好几个字写不出来，只好在纸上写着：“○老○，上○○，○○吃，○不来。” 李大明写完，就交给了老师。 \n第二天，老师让他把自己写的在全班同学面前念一念。 他念道：“圈儿老圈儿，上圈儿圈儿，圈儿圈儿吃，圈儿不来。” \n同学们笑成了一团，李大明脸都红了。 老师说：“李大明，你自己写的字，自己都念不出来，别人怎么看得懂呢？下次写字的时候，可别再胡乱画圈儿了！” \n李大明心里对自己说：“我以后一定要好好学习写字，让所有的圈圈儿消失不见。”", "6": "2. 笔画出门了\n本子上住着一群汉字笔画，一个叫横，一个叫竖，还有一个叫点，最后两个叫撇和捺。 他们每天在本子上排队，变成好看的字。 \n可是有一天，横突然说：“我每天都得躺着，好想出去走一走呀！” \n竖叹气说：“我每天都得站着，真是太累了！” 撇和捺抬抬眉毛说：“你们俩还能靠着对方，我们每次都要向外飞出去，真是太危险了！”", "7": "点最小，跳着脚说：“我最小，却经常跳来跳去，好想休息一天啊！” \n大家吵吵嚷嚷，最后决定：休假一天，不写字了！ \n他们蹦下本子，打开门逃走了。 结果，老师那天要大家写“水”、“家”和“树”这几个字，就怎么也写不出来。 \n“怎么我的‘水’不会流了？” \n“‘家’没了屋顶，猪住在哪里呀？” \n“还有‘树’呢，没有了木头，风一吹就倒啦！” \n本子上的汉字一个个流着眼泪，哭着说：“我们没有笔画，就写不出原来的样子了，更别说写出一句话来了！” \n听到汉字这样说，横说：“我们虽然辛苦，原来是最重要的一部分呀！” \n竖点点头：“是啊，没有我们，大家都写不出字啦！” \n撇和捺也跳出来说：“我们回去吧，一起变成漂亮的汉字！” \n于是他们又回到了本子上，“水”又开始流了，“家”又有了屋顶和小猪，树木也站得笔直了！ \n他们发现，自己虽然小，却能组成美丽的汉字，做最有用的事！", "8": "3. 写不完的“万”字\n从前有个地主，家里金银堆成山，只是不识字。 这一年，地主下定决心，想让儿子识文断字，便请来一位先生，教儿子写字。 \n先生先教小少爷握笔，接着挥笔写下一横，说：“这是‘一’字。” 又写了第二笔，说：“‘一’下面加上一笔，就是‘二’字。” 再写了第三笔，说：“这是‘三’字。” \n小少爷看到这儿，乐得一拍大腿，扔下毛笔，兴高采烈地跑去找父亲：“爹！我全会啦！别再花钱请先生啦！” 地主一听，高兴得不得了，立刻请先生回家了。 \n过了几天，地主想请一位姓“万”的朋友来家里吃饭，就让儿子写张请柬。 可左等右等，从早等到晚，还是不见动静。 地主觉得奇怪，走进书房一看，只见儿子满头大汗，地上全是纸，正气呼呼地在纸上一笔一划地写着。 \n“你不是早就学会写字了吗？怎么这么久还没有写完？”地主问。 \n小少爷气得一拍桌子，大叫：“爹啊，天下姓名那么多，为什么就一定要姓‘万’？我从早晨写到现在，才写了五百划，还差得远呢！”", "9": "好玩儿的日记\n李大明聪明活泼，就是有点儿粗心，写字经常写错。你看，这回他把两个很像的字写错了，出了一个大笑话。下面是他写的一篇日记。\n1. 扫雷的一天\n星期一 天气：下雷\n今天早上，我一睁眼就看见窗外白茫茫的一片。哇，下了一夜的雷！地上积满了厚厚的一层雷，房顶上、树上、车上，全是雷。", "10": "我兴奋极了，赶紧背上书包冲出家门，一边走一边踩着雷玩，咯吱咯吱响，真好玩！到了学校，老师说：“今天我们不上第一节课，全班一起去扫雷！”\n太棒啦！我们拿起扫把、铁铲，在操场上使劲扫雷。你一扫把，我一铲，把雷堆成了一座座小山。\n扫完雷，我们又开始打——雷仗！我们分成两队，用雷做成“雷球”，你扔我，我扔你，打得热火朝天。\n我被王刚打中了三次，一个雷球正好打在我的鼻子上，冷得我直哆嗦。我也向王刚还以颜色，打中了他的屁股！他“嗷”地一声，像被雷击中了一样，跳了起来。全班都笑疯了。大家又笑又叫，打得衣服裤子上全是雷。", "11": "我真希望每天都这样下雷！\n回家后，妈妈翻开李大明写的日记，差点儿笑翻在地上：“什么？天上下雷？打雷仗？还全校扫雷？你今天是去学校了，还是去当拆弹小分队了？”\n李大明一看，哎呀，原来整篇日记里，都把“雪”写成了“雷”！幸好不是真雷，要不然就小命不保了。\n2. 看医生的一天\n星期三 天气：多云转晴\n今天从床上坐起来，我觉得鼻子不通气，头痛，还不停咳嗽。妈妈摸了摸我的额头，说：“哎呀，有点发高烧，赶紧去医院看看吧！”\n我穿好了衣服，跟着妈妈去了社区医院。", "12": "医生叔叔戴着口罩，声音听起来闷闷的。医生拿出一根冰凉的压舌板，按了按我的舌头，让我张大嘴巴，说：“啊——”我“啊——”得特别大声，把医生吓了一跳。医生和护士阿姨都笑了！\n医生说：“嗓子有点儿红。”我小声问：“是不是昨天辣条吃的？”医生说：“不是，感冒啦！我们先做个检查！”\n检查结果出来了，我得了肺炎。要打针！我吓了一跳，问：“打哪儿？” 医生说：“当然是打屁股啦！” 我问：“是你打？还是我自己打？” 医生说：“当然是我打啦！” 我说：“能不能别像我爸爸那样，打得那么痛？” 医生说：“好吧，一定不把你的屁股打红！” “用什么打？”我又问。 医生回答：“当然是用针打啦！”\n我这才松了口气，原来不是用手打，那还好！打针一点儿也不痛，医生说我很勇敢。看完医生回到家，我还可以玩 iPad，睡多久也没人管，生病原来没那么差！", "13": "没有名字的怪物\n俞愉\n有一个怪物，他一直一个人生活，没有名字，也没有朋友。\n有一天，怪物想找一群朋友，更想有几个名字。于是，他从家里走了出来。\n刚出门，怪物就看见一头老虎扑向了一只小白兔，怪物连忙冲到老虎跟前，“啊——呜——”他扯着嗓子叫了一声，眼睛瞪着老虎。老虎被他的怪模样吓坏了，放下小白兔就逃。小白兔想谢谢怪物，但又害怕怪物会吃了她。\n怪物笑了：“我怎么会吃你？我只吃蔬菜。”接着怪物请求小白兔给他取一个名字。\n“好吧，”小白兔说，“你就叫‘善良’吧。”原来我很善良，怪物乐呵呵地想着，和小白兔一起上路了。\n他们走哇走，碰到了一只狐狸和一头熊在赌钱。狐狸让熊猜一猜他的哪只手里有硬币。猜对了，狐狸手里的硬币就归熊；猜错了，熊就给狐狸一个硬币。猜呀猜，熊老是输。突然，怪物叫了起来，“不对，狐狸在耍赖！他的手里根本就没有硬币！”\n狐狸一听慌了，只能让他把两只手都摊开，果然没有硬币。这下，熊气极了，挥起大拳头就要打狐狸。狐狸吓得一溜烟儿地逃跑了。熊非常感谢怪物，他想把一半的硬币分给他。但怪物说他不要硬币，只要能给他取个名字。\n“我看你叫‘聪明’最合适了！”熊说。\n怪物很高兴他又有了一个新名字。他和小白兔、熊一起往前走，来到了一条小河边。只见猴妈妈在河边跳来跳去，急得直哭。原来她的小猴掉进河里了，而她又不会游泳。怪物本想说自己也不会游泳，但看到小猴马上要沉到水里去了，他不知哪里来的勇气，扑通一声就跳下了河。\n经过一番折腾，小猴被救上来了。猴妈妈不知道怎样才能感谢怪物。怪物说：“给我取个名字就行了！”\n猴妈妈想了想说：“那就叫‘勇敢’吧！”\n现在，怪物有了三个名字，并且拥有了一群朋友，更让他高兴的是，他知道了自己是一个善良、聪明、勇敢的人。\n\n【童诗写作】树林\n一棵、两棵、三棵……好多棵树，有的在玩一二三木头人，有的模仿电线杆，有的被妈妈罚站，有的摆好姿势在照相。\n不动，不动，大家专心地——不动！\n\n【童诗写作】阳光\n阳光，你是红色的吗？你看，枫叶红红的。\n阳光，你是绿色的吗？你看，大地绿绿的。\n阳光，你在哪里？你在花上笑着！你在溪上流着！你在妈妈的眼里亮着！", "14": "大家来跳舞\n张晓玲\n有一天，小老鼠对小刺猬说：“你愿意和我一起跳舞吗？”\n小刺猬说：“好啊，我们俩正好差不多大哟！”\n于是——吧嗒，吧嗒，小老鼠和小刺猬跳舞。\n小兔子对獾说，“你愿意和我一起跳舞吗？”\n獾说：“好哇，我们俩正好差不多大哟！”\n于是——嘀哩，嗒啦，小兔子和獾跳舞。\n狮子对豹子说：“你愿意和我一起跳舞吗？”\n豹子说：“好哇，我们俩正好差不多大哟！”\n扑通，扑通，狮子和豹子跳舞。\n只有大象没有舞伴，孤孤单单坐在一边。\n“嗨，大象！”一个细小的声音说。\n大象顺着声音找过去，看到了一只小得不能再小的蟋蟀。\n“想不想做我的舞伴呢，大象？”蟋蟀问。\n“可是，我这么大，你这么小……”大象说。\n“这有什么关系？”蟋蟀跳到了大象的头上，自顾自地和着节奏跳了起来。\n大象犹豫了一下，也跟着跳了起来。\n窸窣，轰隆，窸窣，轰隆……\n小老鼠看到了，说：“太好玩了，我们也交换舞伴吧！”\n小老鼠和獾跳舞，小兔子和狮子跳舞，大象和豹子跳舞，蟋蟀和刺猬跳舞。\n吧嗒，嘀哩，吧嗒，扑通，轰隆，扑通，窸窣，轰隆，嗒啦，窸窣——\n大家都觉得从来没有这么快乐过。\n\n【童诗写作】风\n谁也没有看见过风，不用说你和我了。\n但是树叶颤动的时候，我们知道风在那儿了。\n谁也没有看见过风，不用说你和我了。\n但是林木点头的时候，我们知道风正走过了。\n\n【童诗写作】家\n天空是小鸟的家，海洋是鱼儿的家，大地是小草的家，地球是我们的家。\n家是温暖的地方，我的家里有爸爸、妈妈、哥哥和弟弟，只有相亲相爱的，才是一家人。", "15": "找扣子\n[美]苏珊·克鲁格/著 夏宁、张雪莲/译\n小熊和大袋鼠是好朋友，他们住在一起。\n有一天，小熊对大袋鼠说：“我丢了一个扣子，你看，这是我的红夹克，这儿没扣子了。”\n大袋鼠说：“别着急，我给你缝上一个。这儿有一根针，还有一根线，可是，我们在哪儿能找到一颗扣子呢？”\n小熊说：“我知道！我可以从我的蓝大衣上扯下来一个扣子。”说着，他就从那件大衣上扯下来一颗扣子。\n大袋鼠拿起针和线，把这颗蓝扣子缝在了红夹克上。\n小熊说：“啊，天哪！现在我的蓝大衣上又需要一个扣子了。”\n大袋鼠说：“别着急，我给你缝上一个。可是，我们到哪儿找到一颗扣子呢？”\n小熊说：“我知道！我可以从我的棕色毛衣上取下一个。”说着，他就从棕色毛衣上扯下来一颗扣子。\n大袋鼠拿起针和线，把这个棕色扣子缝在了蓝大衣上。\n大袋鼠刚缝好，小熊又叫了起来：“哎呀，天哪！现在，我的棕色毛衣上又需要一个扣子了。”\n大袋鼠说：“别着急，我给你缝上一个。这儿有一根针，还有一根线，可是，我们到哪儿能找到一颗扣子呢？”\n小熊垂头丧气地说：“我不知道！”\n大袋鼠说：“我知道！我把这颗红扣子给你缝上，这是我刚刚找到的。”\n小熊感激地说：“谢谢你！”\n大袋鼠拿起针和线，把红扣子缝在了棕色的毛衣上。\n小熊对大袋鼠说：“你真是一个好朋友！”\n\n【童诗写作】我爸爸\n我爸爸真的很棒！他吃得像河马一样多，干活从来不说累！\n我爸爸真的很棒！他跑得像马一样快，送我上学从来不迟到。\n我爸爸真的很棒！他睡觉像狗熊一样长，闹钟从来叫不醒他！\n\n【童诗写作】开满鲜花的头\n如果头上不长头发，种满鲜花该是怎样的景象？\n一眼就可以看出，谁心地善良，谁心情悲伤。\n前额长着一束玫瑰花的人，一定招人喜欢。\n头上长着含羞草的人，一定不喜欢说话。\n头上顶着一蓬乱草的人，一定思维混乱。", "16": "门开了\n民间童谣\n门开了，爸爸妈妈回来了。\n门开了，哥哥姐姐回来了。\n门开了，大家的笑声都回来了。\n\n【童诗写作】那该有多好\n要是爸爸发火的时候，我总是不在场，那该有多好！\n要是老师考试的时候，总是碰到大雪天，那该有多好！\n要是象棋比赛的时候，对手总是不出现，那该有多好！\n要是我家的钢琴坏了，老是修不好，那该有多好！\n要是学校校长换成了我，那样就最好！", "17": "小板凳\n民间童谣\n小板凳，你莫歪，让我爷爷坐下来。\n我帮爷爷捶捶背，爷爷说我好乖乖。\n\n【童诗写作】如果\n如果我长了轮子没长腿，那我就可以开着自己这部车，放学回自己的家。\n如果我背上长了翅膀，那我就可以离开自己的家，一直向北，去北极熊的家。\n如果我没长眼睛，长了玫瑰，那谁看我，满眼都是爱，我就可以去所有小朋友的家！", "18": "方脸和圆脸\n武玉桂\n山脚下住着一户人家，家里有位老公公和一位老婆婆。\n老公公高高的个子，挺瘦，长着方脸盘儿。\n老婆婆矮矮的个子，挺胖，长着圆脸蛋。\n方脸老公公喜欢方东西：他坐，要用方凳；喝酒，要用方杯，就连走路，也要迈四方步。\n圆脸老婆婆喜欢圆东西：她吃饭，常用圆桌；梳头，要照圆镜；睡觉的时候不用枕头，枕一个大南瓜。\n有一天，老两口吵了嘴，要分家。\n老公公说：“方东西是我的！”\n老婆婆说：“圆东西是我的！”\n好，就这么定啦，分吧。\n老公公站在小院儿里一瞅，说：“屋子是方的，归我。”\n老婆婆说，“椽子是圆的，我得把屋顶拆喽——”\n老公公指着家具说：“桌凳是方的，归我。”\n老婆婆说：“钉子是圆的，我得把钉子都取下来——”\n老两口分了一上午，越分越分不清楚。瞧吧：\n被子是方的，被面上绣的花是圆的！\n菜刀是方的，刀柄是圆的！\n褂子是方的，袖子是圆的！\n老两口再互相一看，又发现：\n老公公的脸盘是方的，眼珠儿是圆的！\n老婆婆的脸蛋是圆的，两颗门牙是方的！\n“哈哈！”老公公笑了。\n“扑哧！”老婆婆乐了。\n老公公和老婆婆都说：“不分啦！不分啦！”\n现在，老公公和老婆婆还住在一起，他们越过越快乐。\n\n【童诗写作】我长大以后\n妈妈，当我长大了，我要搭一个长长的梯子，一直通到云端，我要爬到天上去摘星星。\n我要把所有的口袋，都装满闪闪发光的星星，然后带回来，分给学校里的小朋友们。\n对于您，我的好妈妈，我要给您带回那轮明月，让它照亮咱们家，不再费一点儿电。", "19": "这是什么鸟\n[俄罗斯]苏捷耶夫/著 徐永平/译\n有这样一只大雁，他又愚蠢，又爱嫉妒。他嫉妒所有的人，见人就吵架，而且对什么都有意见……大家见了他都摇头说：“这只大雁！”\n有一次，大雁看见水塘里有一只天鹅。他很喜欢天鹅那长长的脖子。\n“我要有这样的脖子该多好！”大雁想。\n他问天鹅：“我们换一下吧，把你的脖子给我，我的脖子给你。”\n天鹅想一想，答应了。他们换了脖子。\n大雁有了天鹅的脖子，但是他不知道这脖子有什么用。他一会儿转动脖子，一会儿伸长脖子，一会儿卷起脖子，怎么也不灵便。鹈鹕看到他，笑了。\n“你呀，”鹈鹕说，“你既不是大雁，又不是天鹅！哈哈哈！”\n大雁很委屈，正要发牢骚，看到鹈鹕嘴巴下面有好大一个口袋。\n大雁想。“我的嘴巴下面要有这样一个口袋就好了！”\n大雁对鹈鹕说：“我们换一下吧！把我的红鼻子给你，你嘴巴下面的口袋给我。”\n鹈鹕笑了，但还是答应了。于是，他们换了。大雁很高兴。\n接着：大雁把自己的蹼脚换成了鹤的长腿。大雁把自己的大白翅膀换成了乌鸦的小黑翅膀。大雁又说服了孔雀，用自己的小尾巴换上了孔雀漂亮的长尾巴。好心的公鸡又把自己的红冠子送给了大雁。\n大雁现在什么也不像了。他走路用的是鹤腿，乌鸦的翅膀没有用处地挥动着，天鹅的脖子在向四处转着。\n前面来了一群大雁。“嘎——嘎——嘎——这是什么鸟？”群雁惊奇了。\n“我是大雁！”大雁叫着，拍了拍乌鸦翅膀，伸了伸天鹅脖子，学着孔雀的嗓门吆喝着，“咯咯咯！我比任何人都漂亮！”\n“如果你是大雁，我们就和你一起走。”这群大雁说。\n雁群来到一块草地上，大雁也来了。群雁都会啄草吃，但是大雁的口袋嘴巴只会吧嗒吧嗒，却吃不到草。\n群雁来到水塘里游泳，大雁也来了。群雁都会在水里游，大雁只能在岸上溜达，因为他的长腿不会游泳。\n群雁笑起来：“嘎——嘎——嘎——”而大雁急得直叫：“咯咯咯！”\n群雁走在岸上，这时，不知道从哪里来了一只狐狸！群雁“嘎——嘎——嘎——”叫着，一起飞走了。只有大雁自己留在岸上，乌鸦翅膀让他飞不起来，他只好用鹤腿跑进了芦苇荡里，但是孔雀的长尾巴却使他跑不快。\n狐狸一口咬住了大雁的天鹅脖子。群雁看到这一幕，立即从四面飞来啄狐狸。狐狸扔下大雁，逃走了。\n“谢谢，谢谢你们救了我！”大雁说，“现在我知道自己应该做什么了。”\n大雁找到天鹅，把长脖子还给他；找到鹈鹕，把口袋嘴巴还给他；找到鹤，把长腿还给他；找到乌鸦，把黑翅膀还给他；找到孔雀，把长尾巴还给他；找到公鸡，把红冠子还给他。\n大雁又成了大雁。只是他变得聪明，变得不再嫉妒了。\n\n【童诗写作】等我也长了胡子\n等我也长了胡子，我就是一个爸爸，我会有一个小小的儿子，他就像我现在这么大。\n我要跟他一起去探险，看小蜘蛛怎样织网，看小蚂蚁怎样搬家。我一定不打着他的屁股喊：“喂，别往地上爬！”\n我要给他讲最有趣的故事，告诉他大公鸡为什么不会下蛋，告诉他小蝌蚪为什么不像妈妈。我一定不对他吹胡子瞪眼：“去去！我忙着哪！”\n哎呀，我真想真想快点长出胡子，到时候，不骗你，一定做个这样的爸爸。", "20": "最最奇妙的鸡蛋\n[德]赫尔姆·海恩/著 韦苇/译\n早年，有三只母鸡，整天叫哇叫哇，吵个没完。吵些什么呢？就吵自己是所有母鸡中最漂亮的那只。\n说起来，三只母鸡各有自己值得自豪的地方：阿圆的羽毛好看，阿蒂的腿长而有力，阿莫的冠蓬开得像一朵红花。\n个个都说自己漂亮，究竟谁最漂亮，她们决定不了，只好去问国王，看国王说谁漂亮吧。\n国王说：“长得好看不好看并不重要，重要的是看你们都会做些什么。你们三个，哪个下出最最奇妙的蛋，我就封谁当公主。”\n这下，皇宫的庭园里热闹了，因为全国的母鸡都到皇宫里来争当公主了。\n阿圆用嘴梳理梳理羽毛，蹲在湿漉漉的草地上。过了一阵，她“咕嗒”叫了一声，站了起来，走了开去。这时，大家都看到草地上立着一个蛋，白白净净，就像磨得光光洁洁的大理石，莹莹发亮。好看！\n“这是我见过的鸡蛋中顶完美的蛋！”国王大声说。所有的母鸡也没有什么不赞成的。\n现在看阿蒂的了。大家心里都为阿蒂感到不好受，因为阿蒂不可能生出一个比这更完美的蛋。这是大家都知道的。过了十分钟，阿蒂“咕嗒”叫了一声，站起来，在早晨暖融融的和煦阳光里，得意地舒展舒展腿脚。国王高兴地拍起巴掌来，因为草地上立着一个高高大大的蛋，这么大，连鸵鸟看了都要羡慕。\n“这是我见过的鸡蛋中最大的蛋！”国王叫起来，大家也都点头赞成。\n当大家对阿蒂的蛋点头的时候，阿莫轻轻地在草地上蹲了下来。大家心里都为阿莫感到不好受，因为大家知道：阿莫不可能下出比阿圆的蛋更完美、比阿蒂的蛋更大的蛋，完全不可能！阿莫平静地蹲在那儿，眼睛直瞅着地面。过了一会儿，阿莫轻轻“咕嗒”了一声，接着站起身。\n哟！这个蛋，就算过一百年也忘不了。在众母鸡面前立着一个四四方方的蛋，每边都像用尺画的一般直，每一面颜色还各不一样，面面都非常鲜艳。\n“这是我见过的蛋中最出奇的蛋！”国王高声说出他的意见。大家没有不点头赞成的。\n三个蛋，一个最完美，一个形体最大，一个方得出奇——选哪一个为最奇妙的呢？国王只好决定阿圆、阿蒂、阿莫三个谁也不落选，都当公主。\n从此以后，她们三只母鸡成了最好的朋友。她们继续快快乐乐地下蛋。她们依然各下各的蛋：下美的蛋，下大的蛋，下方的蛋。\n\n【童诗写作】我家是个动物园\n我叫正太，是个小男孩，其实呢，是只小猴子，最爱吃香蕉，爬树最拿手。\n我爸爸，龙太先生，其实呢，是只大猴子，最爱吃肉，不爱吃蔬菜，头发乱蓬蓬，叫起来像狮子吼。\n我妈妈，明美女士，其实呢，是只浣熊，不管看到什么东西，都马上去收去洗，有一次，差点把我也一起洗了。\n我爷爷，一郎先生，其实呢，是只长颈鹿，个子高高的，我可以骑在爷爷的肩上，看街上的风景。\n我奶奶，早纪子女士，其实呢，是只狐狸，很善于变化。出门的时候，在镜子前一变，变得连我都认不出来。\n最后是我的曾祖母，阿花老太太，其实呢，她是只猫头鹰，平常只说“啊”“嗯”。她没有牙齿，笑起来呵呵呵。", "21": "变成什么好\n[美]杰克·肯特/著 韦苇/译\n魔法师的家里有好多好多神奇变身水，都装在小瓶子里，谁不想做自己，要变成什么，比如变成一头猪，甚至变成一只恐龙，全行。\n每一个小瓶子外壁上都贴着纸片，写着这瓶变身水喝了可以变成什么。但是魔法师是整个乌有镇最忙的大忙人，他家里的变身水小瓶子放得七零八落，找一瓶变身水得花上好几个小时。他自己也觉得这样太费事了，他得把所有的小瓶子都整理整理，让自己一眼看过去，就能把想找的药水找到。\n“这瓶变身水是变什么的呢？”魔法师从地上捡起一个小瓶子，一看没贴纸片，就连自己也不知道这水喝了是变什么的了。\n就在这时候，魔法师忽然听到有谁敲他的门。“今天太忙，不开门！”魔法师生气地说。敲门声还在咚咚响个不停。\n魔法师把门打开一条缝，一看是只小老鼠，就说：“走开！你没见我正忙着吗？”\n“我要买一瓶神奇变身水。”小老鼠说，“我不想做老鼠了，没人喜欢老鼠。人们养猫来吃我们，装捕鼠器来捉我们，用电来电我们，拿扫把来追打我们。当老鼠一点儿也不快活，我想变成别的东西！”\n“你想变什么呢？”魔法师问。\n“我还没有想好！”小老鼠说，“我来看看你这里都有些什么神奇变身水，都看一看，我就能拿定主意了。”\n“那等我整理好了，你再来看。”魔法师说。\n“我一天也不能等了！”小老鼠说。\n“那就给你这一瓶吧！”魔法师把手上拿着的那瓶神奇变身水递给了小老鼠。“拿着，就算我送你的吧，不要钱了。”\n“这瓶上可没说是变什么的呀！”小老鼠接着问：“我会变成什么呢？”\n“你不是要变成别的东西吗？”魔法师说，“你喝了它就能变成别的东西了。”说完，就把小老鼠推出门去，嘭的一声把门关上了。\n小老鼠回到家，拿着瓶子直发愣——他在猜想他会变成什么呢。\n也许是变成一只蝴蝶。蝴蝶倒是很漂亮，但是蝴蝶都活不长久，他不想变成蝴蝶。\n要想活得长久，最好变成乌龟。但是乌龟走路太慢，他不希望自己变成乌龟。\n要想走路快，他得变成蜜蜂。但是蜜蜂一天到晚飞来飞去，得这里那里采花蜜，太辛苦，太劳碌，太累人。老鼠是不喜欢干活的。\n变成蚂蚁怎么样？变成蚂蚁要遭人踩。\n变成鸟儿吧，鸟儿整天玩玩，唱唱。可想到鸟儿吃虫子，他就感到恶心起来。\n“变成一头大象倒是挺不错的。”小老鼠想。但是他又想大象可走不进他的洞家。他喜欢他那个洞家，那里很安全。小老鼠不希望自己变成大象。\n他想来想去，想不出变成什么好。\n“当老鼠是不太好，”他想，“不过我至少知道当老鼠应该怎么当。当别的东西，说不定更糟呢！”\n小老鼠把那瓶神奇变身水拿去还给了魔法师。\n“你变了？”魔法师问。\n“我想我是变了。”小老鼠说，“我变得快活了！”\n魔法师一听，高兴得不得了。\n“瞧，这神奇变身水还真够神的。”小老鼠说，“不但能把我变快活，还能把咱们两个都变快活了！”\n等小老鼠一走，魔法师立刻把神奇变身水瓶子上的标签一张一张地统统撕去。不知道会变出什么来的神奇变身水，将给世界带来更多的快乐。\n\n【童诗写作】我的名字\n我的名字叫陈啸可，爸爸告诉我，这个名字是希望我，整天笑呵呵。\n上学后，为了容易念，爸爸把我的名字改成了“陈笑可”，可是经常有同学念成了“陈关可”。\n更令人讨厌的是，经常有人叫我“陈可笑”！你说可笑不可笑？\n\n【童诗写作】夏天在哪里\n夏天在头上，头上戴草帽。\n夏天在街上，街上买冰糕。\n夏天在床上，床上睡午觉。\n夏天在河里，河里在洗澡。", "22": "到小企鹅家里做客\n邓小秋\n小猎狗跟着探险队，来到了南极。\n“欢迎！欢迎！”一大群小企鹅，高兴地呼喊着，拥到了小猎狗的面前。其中有一个胖胖的小企鹅，特别热情，邀请小猎狗到他家里做客。\n小猎狗在热情好客的小企鹅的带领下，冒着刺骨的寒风，一起向前走去。他们绕过了两座高高的冰山，只见冰山后面，聚集着成百上千的小企鹅。原来，这儿就是小企鹅的家。\n小企鹅们围成一个大圈子，集体生活在一起，相处得很和睦，很友好。一天到晚，他们互相挤来挤去，非常亲热。那冰凉刺骨的寒风，虽然呼呼地吹，但是密密层层的成百上千只小企鹅们，却将那寒风挡在家的外面了。所以，当小猎狗走进了小企鹅们聚集的圈子里时，也不觉得很冷。\n小猎狗既然到了小企鹅的家里，当然想见见他们的妈妈。可是，小企鹅却搔了搔头皮，为难地说：“哎呀，真对不起，我们的妈妈到海边去啦，要过几个月才能回来呢！”\n“那，你们的爸爸一定在家里吧？”小猎狗急忙问。\n“我们的爸爸倒是在家里。”小企鹅说，“不过，他们在那里孵宝宝，不能接待客人。”\n“什么，在孵宝宝？”小猎狗觉得这倒是件新鲜事，无论如何也要去见识见识。在小猎狗的再三要求下，小企鹅终于答应带他去看自己的爸爸是怎样孵宝宝的。\n原来，企鹅爸爸孵宝宝，是直挺挺地站在冰面上，用两只脚，搁住了蛋，又抵着他那个肥肥的肚子，垂下来一部分皮肉，正好把蛋遮得严严密密，使蛋保持一定的温度。这样，一天一天地站着，既不吃，也不喝，要在零下五六十度的天气里，坚持站上两个多月。\n小猎狗看到这个情景，心里挺感动的。他掉转了脑袋，悄悄地问站在旁边的小企鹅：“你爸爸这么长时间不吃不喝，难道肚子就不饿吗？”\n“哈！”小企鹅笑着说：“为了孵宝宝，他早就做好准备啦！每年到了六月，我爸爸就在海边吃饱了肚子，然后连日连夜地赶回家乡。等回到家，妈妈刚好生下了蛋。她把蛋移交给爸爸，自己就到大海那儿去找食吃。我爸爸呢，就靠他原来肚子里储存下来的脂肪，维持着生命，一直到把宝宝孵出来。”\n“那你们的妈妈什么时候再回来呢？”\n“等我们的小弟弟、小妹妹从蛋壳里钻出来，妈妈就赶回来啦。那时候，爸爸就赶紧奔到海边舒舒服服地去吃个饱！”\n“哈哈哈！”小猎狗笑着说，“原来，他们是换着养宝宝的！”\n“对啦！”小企鹅听了，也笑了起来。\n\n【童诗写作】我要生起气来\n我要生起气来，就一个人到非洲去。我有一匹木马，我骑着它远远地跑掉。\n在非洲，饿了我就吃肉包子。\n妈妈，爸爸，奶奶，爷爷，我一个也不想，要是我心里不好受，我也不会哭，不会伤心。非洲有许多熊猫，它们一天高高兴兴的，它们会爬到我身上来，跟我一起玩！\n\n【童诗写作】妈妈的心\n妈妈的心，像我的影子，总是跟着我走的。\n早晨，我去上学，在教室里念书的时候，她就躲在我的耳朵里，悄悄地说：要认真读书哦！\n我在外面游戏的时候，她就跑出来，有时，在我面前，有时，在我背后，有时，在我左右，总是悄悄地说：小心，小心，不要跌倒哦！", "23": "（本课无精读课文）", "24": "（本课无精读课文）", "25": "（本课无精读课文）", "26": "（本课无精读课文）", "27": "（本课无精读课文）", "28": "（本课无精读课文）", "29": "（本课无精读课文）", "30": "（本课无精读课文）"}, "book": {"1": "第一章：两个人的小屋\n这是一间小小的屋子。小小的小屋里就住两个人：一个大，一个小。\n大人管小人儿叫“大头儿子”。大人说：“大头儿子，手不是穿在裤脚管里的。”“大头儿子，牙刷不是刷耳朵用的。”“大头儿子，别把鱼刺吃进去，鱼肉吐出来。”\n小人儿管大人叫“小头爸爸”。小人儿说：“小头爸爸，别看都是字的书。”“小头爸爸，我替你把胡子涂成彩色的吧！”“小头爸爸，我大便好了！”\n大头儿子跟小头爸爸在一张桌子上吃饭，在一张床上睡觉，还在一个脚盆里洗脚呢！\n有一次，大头儿子差点儿把一枚分币吞进肚子里，小头爸爸很生气，拿出一把木尺，狠狠打他手心，打得大头儿子直喊“痛死了！痛死了！” 有一次，小头爸爸打碎一个盘子，大头儿子拿出一根羽毛，狠狠打他的脚心，打得小头爸爸直叫“痒死了！痒死了！”\n在一个冬天的晚上，外面下着大雪，风像一百只老虎在吼叫。被窝里，大头儿子和小头爸爸搂抱在一起，像树洞里的两只熊。大头儿子帮小头爸爸焐热一只脚，又焐热一只脚；小头爸爸替大头儿子焐热一只手，又焐热一只手。焐着焐着，大头儿子马上就要睡着了，小头爸爸忽然推推他，问：“你将来长大了想做什么？” “想……做……像……你……一样的……小头爸爸。” 刚说完，大头儿子就呼呼睡着了。", "2": "第二章：会叫的大皮鞋\n小头爸爸躺在长椅上，呼噜噜，呼噜噜睡大觉。大头儿子一个人在公园的草地上玩，太没劲了！他走过去推小头爸爸，可小头爸爸动也不动。\n哼！气死我了！大头儿子朝地上看看，忽然有了主意。他拿起一只大皮鞋，走到树下，噗，扔进树下的废物箱里，还有一只也拿来，把它挂到树上。嘻嘻，大头儿子开心了，他回到小头爸爸那儿使劲推，使劲喊，这下终于把小头爸爸弄醒了。\n“哈哈，你的皮鞋没有了，你不能走路啦！” 小头爸爸一听，赶忙朝椅子底下找：真的没有了。 “好儿子，赶快拿出来，让爸爸穿上，可以跟你玩一会儿呢！”\n大头儿子一听，同意了，他噔噔噔跑到废物箱跟前，咦，大皮鞋里传来“吱——吱——”的叫声。 “爸爸，你快来看哪！”大头儿子又跳又叫，急得爸爸光着大脚丫，啪嗒啪嗒奔过来看：呀，原来是一只小小的白老鼠。\n“它大概冷，就躲进我的皮鞋里来了。”小头爸爸说着，用手帕把小白老鼠包起来。 “爸爸！爸爸！你快听，树上那只大皮鞋里好像也有声音的……” 小头爸爸凑过去一听，真的，那是“叽——叽——”的叫声。\n小头爸爸轻轻拿下大皮鞋，里面扑棱扑棱直跳：“嗨，一定是小鸟错把皮鞋当成鸟窝了。” 那是一只绿色鸟，可它的眼睛却是黑黑的，尾巴的顶端还有一点儿红，像火苗一样。大头儿子也拿出手帕，把绿色鸟包起来。 “爸爸，我们把小老鼠和小鸟都带回家吧，以后你跟我玩，小老鼠就跟小鸟玩。” 小头爸爸想了想，说：“好吧！”\n太阳红红的，把草坪照成金色的。小头爸爸带着大头儿子和小老鼠和小鸟，走过金色的草坪，走出公园的大门，朝自己家的小屋走去。", "3": "第三章：写信和读信 \n每天早晨，大头儿子醒来，身边总是空空的，小头爸爸早就去上班了。 大头儿子想小头爸爸，就对他说：“以后你走的时候，给我写一封信放在桌子上好吗？这样你不在家，我就可以读你写的信。” 小头爸爸说：“真是一个好主意！” \n这天，大头儿子一早起来，就看见餐桌上放着一封信，那一定是爸爸留下的。大头儿子急忙拆开，信上写：“大头儿子，再见！” 大头儿子念了五遍，又念了十遍，心里很开心，好像看见了爸爸早晨去上班的样子。 \n忽然，大头儿子想，我也应该每天给爸爸写一封信，等他下班回来时读。 这天，小头爸爸下班回来，大头儿子把自己关在卧室里，对着门外大声说：“爸爸，你先念我写给你的信，等念完了我们再见面。” 大头儿子觉得一个人念信的时候，另外一个人是不该在旁边的。", "4": "第四章：大狼灰 \n晚上，大头儿子想听一个老长老长的故事，小头爸爸说好的，就讲一个老长老长的大狼灰的故事。 大头儿子说，错了错了，应该是大灰狼的故事。 小头爸爸说，没错没错，就是大狼灰的故事，大狼灰有四只眼睛，分上、下、左、右。它专门吃大灰狼，冲上去就咬它的屁股，大灰狼害怕大狼灰—— 大头儿子叫起来，停住停住，要从头开始讲。 \n小头爸爸开始讲故事：从前—— 等一等，等一等，大头儿子去拉上窗帘。 小头爸爸开始讲故事：从前—— 等一等，等一等，大头儿子去锁好房门。 小头爸爸开始讲故事：从前—— 等一等，等一等，大头儿子拖小头爸爸一块儿躲到被窝里去讲。 \n小头爸爸说大头儿子这么害怕，就不讲大狼灰了，还是来做大灰狼吧。 大头儿子想了想，说好的好的，还说自己来做大狼灰，叫小头爸爸做大灰狼。 小头爸爸拿来一支彩笔，在大头儿子的额头上、下巴上、左脸腮上、右脸腮上，画了四只大大的双眼皮眼睛。\n大狼灰赶忙往镜子跟前跑，一看，咧嘴笑起来，他说自己一点儿也不可怕，也就是说大狼灰一点儿也不可怕。他看着看着，忽然从镜子里发现大灰狼正撅着屁股往大床底下钻，就一下扑过去啊呜啊呜直叫，吓得大灰狼捂住屁股，从大床那边钻出来，逃到门外去了。\n哈哈，大灰狼真的是害怕大狼灰的！", "5": "第五章：开心事\n小头爸爸枕在大枕头上，大头儿子枕在小枕头上，他们正在编儿歌。\n小头爸爸先想好了，他念道：“哗啦哗啦，是什么落在地面，出门看一看，原来是天爸爸在小便。” “咯咯咯……”大头儿子听完笑死了，“太滑稽了，太幽默了。” 接着，大头儿子念了一首：“树叶落在地上，像冰糖，我的鞋上有牙齿，踩在上面咯吱咯吱响。”\n小头爸爸听完没笑，而是“噌”地坐起来：“快，再念一遍——”他使劲摇大头儿子的肩膀。 大头儿子就又念了一遍。\n小头爸爸穿着短裤，哆哆嗦嗦地去拿来一支笔和一张纸，回到被窝里，把纸铺在大头儿子的肚子上，唰唰写起来。 “这首儿歌编得棒极了，爸爸替你寄到编辑部去……”小头爸爸收起笔说。\n“什么叫编辑部啊？”大头儿子不明白，“那是一家商店？还是一座花园呢？” “那是专门给小朋友编书的地方。把你的儿歌和你的名字一起登在书上，你高兴不高兴啊？” “嗯。”大头儿子好像明白了。\n从这天开始，小头爸爸下班回来，总给大头儿子带一本小人儿书，大头儿子就趴在桌子上一页一页地找，可总也找不到他的名字和他编的儿歌。 有一天，小头爸爸回来，干脆连书也没带。大头儿子使劲朝门外推爸爸，要他去买了小人儿书，重新下班回来。 小头爸爸就走了。\n大头儿子刚关上门，忽然发现一本图画书，从门底下爬进来了。大头儿子急忙捡起，打开第一页，忽然，他“哇”地叫起来：“我的名字，这是我的名字，还有我编的儿歌，都登出来啦！”", "6": "第六章：可爱的小屋\n大头儿子想把家搬到玩具店那儿去住，这样看玩具买玩具该有多方便啊！小头爸爸说，那得先去玩具店那儿看看，有没有空房子。大头儿子同意，他们就一起去了。\n玩具店跟一长排房子连在一起，什么百货店啊，食品店啊……全是商店，根本没有空房子。 “我们到楼上那户人家问问，如果他们同意跟我们换房子——”小头爸爸没说完，大头儿子就高兴得又蹦又跳，拉着小头爸爸往楼上跑。\n楼上住着一位老爷爷，他点头同意了，大头儿子和小头爸爸太高兴了，赶快往回跑，要知道搬家事先得整理好多东西呢！ 公共汽车在家门口停下，大头儿子一下车，就冲自己家的窗户大声说：“再见啦，以后我们不住在你这儿啦！” “咕咕……”忽然，房顶上的鸽子都探出头来，好像在问是谁这么大声嚷嚷。 “哇！顾叔叔的鸽子：点儿、雪白、花花……它们全在房顶上呢！”大头儿子认识这些鸽子，还都喊得出它们的名字。\n许多鸽子还在探头看着什么啊？哦，原来是在看窗台上的一盆仙人掌，仙人掌已经开花了，嫩黄嫩黄的花像鸡蛋糕一般，托在仙人掌上。\n“爸爸，”大头儿子忽然想起来了什么，“那个老爷爷家的房顶上有没有鸽子？窗台上有开黄花的仙人掌吗？” 小头爸爸说：“哦，这倒没注意，好像都没有。” “我不想搬家了。”上楼的时候，大头儿子突然这么说。 “怎么不搬啦？”小头爸爸觉得真奇怪。 “还是等以后玩具店搬到我们家楼下来吧！”说完这句话，大头儿子就奔跑起来，咚咚咚的声音从楼下传到了楼上。", "7": "第七章：红围裙\n围裙妈妈喜欢扎一条红围裙。红围裙上有一个高高胖胖的外国面包师，样子很滑稽。有时围裙妈妈干活儿累了，就低头看看这个面包师，忍不住笑起来，也就不累了。\n围裙妈妈扎着这条红围裙往厨房里一站，不一会儿，桌子上就放上一盘鱼、一盘虾、一盘青菜和一碗金黄金黄的鸡蛋汤。 围裙妈妈扎着这条红围裙往阳台上一站，不一会儿，爸爸的臭袜子、大头儿子的脏裤子，都干干净净地晾在竹竿上了。\n这天，围裙妈妈下班回家，找来找去，找不到红围裙了。她急得团团转，没了红围裙就好像没了手一样。 大头儿子也在帮着找，可他一边找，一边偷偷笑。围裙妈妈什么活儿也干不了了。\n一直找到晚上，爸爸下班回来，手里拿着一束鲜花对她说：“今天是你的生日，让我来烧菜烧饭吧！”说着，从口袋里掏出了那条红围裙。 爸爸扎起红围裙，就像围裙上面的面包师一样滑稽。他吹着口哨，和大头儿子一块儿忙了好长时间，才忙出一碗面。\n围裙妈妈吃着生日面，吃得又香又快又开心。 爸爸问：“味道怎么样？” 大头儿子问：“好吃不好吃？” 围裙妈妈说：“好极了！好极了！就是没放盐——”", "8": "第八章：洋娃娃\n围裙妈妈不仅有一个丈夫、一个儿子，还有许多许多洋娃娃。洋娃娃被放在卧室里、客厅里、厨房里和卫生间里。这样，不管围裙妈妈走到哪里，都可以看见洋娃娃，还可以伸手摸摸它们。\n有一天晚上，爸爸和大头儿子出去看电影，很晚还没有回来。围裙妈妈有点儿害怕，就把放在客厅里、厨房里和卫生间里的洋娃娃通通抱到卧室里来，大概有一百个哩！\n围裙妈妈斜靠在床上，拿起一个雀斑娃娃，想起这是她过生日的时候，她的丈夫送给她的；她拿起一个金发娃娃，想起这是她参加电视比赛获奖得来的；她拿起一个拇指娃娃，想起这是她生病住院，她的大头儿子送给她的—— 围裙妈妈一边看，一边想，她忘记了天黑，忘记了害怕。\n等到爸爸和儿子回家，推开卧室的门一看：一床的洋娃娃都睁着眼睛，只有围裙妈妈闭着眼睛，笑眯眯地睡着了。", "9": "第九章：害怕\n夜很黑，围裙妈妈和她的大头儿子还在路上走。\n走着走着，围裙妈妈有些害怕，说：“儿子，你走在前面，我跟在后面。”大头儿子走到前面。围裙妈妈跟在后面边走边想：万一碰上大老虎，把儿子先吃了怎么办？ 围裙妈妈又说：“儿子，我走在前面，你跟着我吧！”围裙妈妈走到了前面。她走着走着又想：大老虎出来先吃了我，肯定还要吃我的儿子—— 围裙妈妈停下，等大头儿子走上来，说：“儿子，我们并排走！”\n围裙妈妈和儿子并排走。走着走着，他们真的碰上一只“大老虎”。“大老虎”用一根木棍拦住他俩不让走，说：“我要吃一只手，再吃一只脚！” 围裙妈妈大声说：“我的手上涂过辣椒！” 大头儿子也大声说：“我的脚上沾满泥巴！” “大老虎”听了，哼哼了两声，说：“那我就吃一只耳朵，再吃一个鼻子！” 围裙妈妈小声说：“我的耳朵里都是耳屎。” 大头儿子也小声说：“我的鼻子里装满鼻涕。”\n这下，“大老虎”听了可不高兴呢，他哼哼了五声，忽然拿掉面具说：“那我就把你俩带回家里，洗洗干净再吃！” 呀，原来是爸爸来接他们啦！", "10": "第十章：有趣的事情\n吃过晚饭，围裙妈妈擦擦嘴，开始讲她今天碰到的有趣的事情。 围裙妈妈刚讲到：“今天我在菜场……嗝，嗝——”忽然，她打起嗝来，而且打个不停，变成了“今、嗝、天、嗝——”简直没办法再讲下去了。\n爸爸赶快倒来一杯热茶，说：“快一口气喝下去，把嗝冲掉。”围裙妈妈接过来，喝下去，嗝还是有。 大头儿子说：“我来吓你一大跳，把嗝吓跑。”大头儿子又学虎叫，又装狼吼，也没有把围裙妈妈的嗝吓跑。 爸爸又说：“这样吧，你做几个深呼吸试试——”\n围裙妈妈就做了五个深呼吸，然后小心地慢慢张开嘴，轻声说：“今天我在菜场……” “嗝！”忽然一声特别响亮的嗝，把围裙妈妈吓了一大跳。原来这一声嗝，是爸爸和大头儿子一起打的，是故意用来吓唬她的。\n这次，围裙妈妈的嗝真给吓跑了。可她要讲的趣事，也给吓跑了——围裙妈妈忘了。她生气地埋怨道：“都怪你们吓跑了我要讲的有趣的事情！” 爸爸和大头儿子一听，都笑死了，说：“围裙妈妈打嗝，就是一件最有趣的事情。”", "11": "第十一章：将来的事情\n围裙妈妈在揉面团。她一边揉，一边看窗外的云，一边想过去的事情。围裙妈妈想起自己还是小姑娘的时候，也常常喜欢趴在窗前看云。云一会儿像头牛，一会儿像匹马，很好玩呢。\n她想着想着，忽然停住手，来到镜子跟前，仔仔细细看自己的脸。她发现额头上有皱纹了，皮肤变粗了，头发也有好几根白的。“呜呜呜……”围裙妈妈一低头，竟用手捂住脸哭起来。\n爸爸和大头儿子急忙过来问：“怎么啦？” 围裙妈妈拉住爸爸边哭边说：“我越来越难看——” 爸爸忍住笑说：“你今天特别美。” 围裙妈妈搂住大头儿子边哭边说：“我变成老太婆了……” 大头儿子捂住妈妈的嘴说：“不，变成了大花脸！”\n围裙妈妈一听，再看镜子：哎哟，镜子里的围裙妈妈，脸上的面粉东一片、西一片，就像那天上的云—— “扑哧！”围裙妈妈忍不住笑起来。爸爸和大头儿子这才一起放声大笑。围裙妈妈又去揉面团了。她一边揉，一边看窗外的云，一边想将来的事情，脸上笑眯眯的。", "12": "第十二章：变成一条鱼\n围裙妈妈不敢下海游泳，但喜欢换上游泳衣，撑一顶粉红色的太阳伞，坐在海滩上看丈夫和儿子游。\n围裙妈妈说：“我不游，海里有鲸鱼。” 大头儿子说：“鲸鱼在大海的深处。” 围裙妈妈说：“我不游，海里有鲨鱼。” 爸爸说：“鲨鱼不敢来。” 围裙妈妈说：“我不游，海里有黄鱼。” 大头儿子说：“黄鱼不咬人。” 围裙妈妈说：“我不游，海里有带鱼……”\n反正，围裙妈妈就是不下海，爸爸和儿子只好自己去游。 一会儿，他俩回来了。 大头儿子说：“我看见沙滩上有一个粉红色的大蘑菇。” 爸爸说：“蘑菇下还坐着个傻瓜妈妈。” 围裙妈妈一听，抬头看看太阳伞，心里明白了。她从伞下跑出来，“扑通”跳进海里。\n“扑通！”“扑通！”爸爸和儿子也跟着跳下去。 他们游了一会儿，停住了，只听大头儿子喊：“看，粉红色的大蘑菇！” 围裙妈妈朝海滩上看，真的，远远望过去，太阳伞真像一个大蘑菇。\n爸爸说：“可惜，傻瓜妈妈不见了。” 大头儿子说：“不可惜，她已经变成了聪明妈妈。” 围裙妈妈说：“不，是变成了一条鱼。”说完，她像鱼一样钻进海里。", "13": "空屋子\n胖外婆很胖很胖，肚子圆滚滚的。这天，大头儿子指着胖外婆的肚子说：“外婆大概要生小弟弟喽！”\n胖外婆听了咯咯直笑，她摸摸自己的肚子说：“小弟弟早就生过了，这是小弟弟留下的空屋子。”\n吃晚饭的时候，大头儿子总往胖外婆的碗里夹鱼夹虾，说：“外婆快把空屋子装装满，要是又有小弟弟，他就不会饿了。”\n胖外婆点点头，就使劲吃起来，可胖外婆总吃鱼头，把鱼肉、虾肉都夹到大头儿子的碗里，说：“看你的肚子还没个鸟窝大，快多吃一些，身体长壮了，肚子长圆了，那才像个男子汉哩——”\n胖外婆吃好了，大头儿子也吃好了。他们一块儿收碗、洗碗、放碗，然后手拉手，一块儿出去散步。\n胖外婆说：“我们去小树林吧，让‘空屋子’里再装一点儿新鲜空气。”\n于是，他们来到小树林里，做深呼吸：一下、二下、三下……他们张大嘴巴，好像真的把大团大团的新鲜空气都吃进肚子里去了。", "14": "开满鲜花的葱地\n胖外婆在院子里圈出一小块地，专门用来种葱。没想到几天后，葱就长出来了，又绿又直，胖外婆见了欢喜得直搓手。可是大头儿子说：“光长葱没劲，要是能再长出一些花来就好了。”\n正说着，一只小鸟喳喳叫着从葱地上飞过。胖外婆忽然眼睛一亮说：“咱们在葱地旁做个鸟窝，让小鸟给我们带四面八方的种子。”\n鸟窝挂出去了。第一天，没有小鸟飞来。第二天还是没有。\n大头儿子说：“我们给小鸟放点儿吃的东西吧。”\n于是，在第三天，胖外婆用两个小碟子，分别装进水和小米，放进鸟窝里。\n这下，小鸟真的飞来了：一只、两只、三只……它们抢着吃米、喝水，还叽叽喳喳叫着，院子里一下热闹起来。\n一天，胖外婆终于发现葱地里长出了星星点点的绿。又过了几天，星星点点的绿变成了各种形状的叶子。\n胖外婆一片一片指给大头儿子看。大头儿子看了就高兴地直叫：“小鸟带来的种子发芽喽！”\n又过了几天，在各种形状的叶子上面，真的开出了一朵朵鲜花。大头儿子在葱地里钻过来，钻过去，使劲地闻着，急得胖外婆直叫：“别踩坏我的葱！”\n这时，有几只小鸟飞过葱地，大头儿子和胖外婆连忙抬起头，一起大声说：“小鸟，谢谢你们！”", "15": "捉香味\n胖外婆不爱戴耳环，也不爱戴项链，她只爱每天在胸前戴一朵白兰花。白兰花很香，胖外婆走到哪儿，香味就跟到哪儿。\n这天下午，大头儿子和胖外婆玩捉迷藏的游戏。胖外婆用一块黑布将大头儿子的双眼蒙起来，然后说了声：“开始！”就松了手。可谁知她刚转身，就被大头儿子捉住了。\n胖外婆说：“不算，不算，你偷看了！”\n大头儿子忍住笑，说：“不算就不算，反正我没偷看过。”说着，眼睛又被蒙了起来。这回胖外婆跑得远远的，才说“开始！”\n大头儿子先站着不动，然后就使劲吸鼻子：一下、二下、三下。好！他闻到一股白兰花的香味，是从左前方飘过来的，便一下冲过去，又将胖外婆给捉住了。\n胖外婆气呼呼地说：“难道黑布是透明的？我来试试！”于是胖外婆拿过黑布将自己的双眼蒙起来。\n大头儿子说：“开始！”\n胖外婆站在中间不敢动。她伸出双手摸鱼似的乱摸一阵后，还是不敢迈步。她抬头好像看空中；她又低头好像瞧地上。忽然，她闻到一股白兰花的香味，正从自己的胸前飘出——\n这下胖外婆明白了，她一把拉掉黑布说：“你这个小坏蛋，原来你蒙着眼睛是在捉香味呀！”", "16": "大口袋\n胖外婆的衣服前面有一个大口袋。大口袋方方正正，里面样样东西都有：手帕、话梅糖、巧克力和细短绳什么的。\n有一天，大头儿子忽然挺想把自己也变成一样东西放进胖外婆的大口袋里，那该多有趣啊！他决定把自己变成一粒玻璃弹子。\n大头儿子说：“外婆，我想钻进您的大口袋里！”\n胖外婆愣了愣，才说：“好啊！”\n大头儿子接着说：“我想变成一粒玻璃弹子！”\n胖外婆马上说：“那不行，万一我出门看见小孩哭，会把你从大口袋里摸出来送给他的。”\n大头儿子想了想，又说：“那我就变成梳子吧，您可以拿出来梳头。”\n胖外婆说：“也不行，那样会把你弄脏的。”\n那么变成什么呢？大头儿子想不出来了。他东看看西看看，忽然看见墙上挂着一张他和胖外婆的大照片：胖外婆搂着他，他贴着胖外婆，看起来很开心、很欢喜的样子。要是现在大头儿子把自己变没了，那胖外婆再去搂谁呢？\n于是，大头儿子说：“外婆，我什么也不变了，我还是做您的外孙吧！”\n胖外婆听了眼睛笑得眯起来。她忙从大口袋里摸出一块巧克力，放到大头儿子的手里。", "17": "最最好吃的东西\n大头儿子喜欢吃很甜很甜的东西：巧克力啊、冰淇淋啊、奶油蛋糕什么的。胖外婆喜欢吃很香很香的东西：花生米啊、瓜子仁啊、核桃肉什么的。\n这天下午要来一位客人。大头儿子说：“如果是小人儿，就用我吃的东西招待他；如果是大人，就用您吃的东西招待他。”\n胖外婆想了想，说：“也行。”\n下午，客人来了。胖外婆和大头儿子一看啊，他既不是大人，也不是小人儿，而是一个不大不小的中学生。\n大头儿子说：“不知道‘中人’喜欢吃什么？”\n胖外婆说：“家里没有‘中人’吃的东西，怎么办呢？”\n大头儿子晃晃大头又说：“外婆，把您吃的东西和我吃的东西放在一起，不就是‘中人’吃的东西了吗？”\n胖外婆忙说：“对，我们自己来做。”\n于是，他们将巧克力融化了，和花生米拌在一起；把瓜子仁撒在奶油蛋糕上；把核桃肉弄碎了放进冰淇淋中。完了，胖外婆笑眯眯地将三份点心端出去。\n中学生一边呼啦呼啦地吃着，一边连连说：“这真是最最好吃的东西！”\n大头儿子和胖外婆听了心里很开心，因为最最好吃的东西不是买来的，而是他们自己做的。", "18": "回到从前\n一到下雨天，胖外婆就喊背痛。大头儿子说：“我来帮您捶一捶吧！”说着，他握起小拳头，轻轻捶起来。\n还是捶着，胖外婆说：“你的拳头太小了，我的背还是痛！”\n大头儿子就戴上一副拳击手套：哇！小拳头变成了大拳头。大拳头轻轻捶起来。\n可捶着捶着，胖外婆说：“拳击手套太软了，我的背还痛着呢！”\n大头儿子又拿来一个小足球，对准胖外婆的背一扔，一扔。\n可扔着扔着，胖外婆又说：“这足球太硬了，把我的背越弄越痛。”\n大头儿子想了想，就用自己的大头替胖外婆捶背：一下、二下、三下。胖外婆说：“好了好了，我的背不痛了，你也歇歇吧。”\n大头儿子就将自己的大头靠在胖外婆的背上休息。慢慢地，胖外婆的背忽然摇动起来。摇着摇着，胖外婆还轻轻唱起了从前唱过的童谣：“背背驮驮，背背驮驮，上街买个大萝卜。”\n大头儿子马上说：“这是我小时候您背着我唱过的！”\n胖外婆说：“是呀，现在你长大了，外婆再也背不动你了。”说着，她又重新唱起来。\n大头儿子听着，摇着，好像又变成了小毛头，和胖外婆一起回到了从前。", "19": "新邻居\n大头儿子一回家，小头爸爸就告诉他：隔壁搬来一户新邻居。邻居叔叔是刚从美国留学回来的。大头儿子趁小头爸爸不注意，就悄悄地溜出去看。\n“咚、咚、咚！”大头儿子站在门外刚敲到第三下，门就朝里面“嘭”地打开了。大头儿子一抬头，咦？他看见的是一截闪闪发亮的皮带头。大头儿子再抬头，呀！他看见的是画着一匹飞马的白汗衫。大头儿子使劲抬高头，哟！他这才看见一张留着大胡子的黑面孔。大头儿子一愣，往后退了一步。\n“哎，别怕！别怕！我可不是大狗熊。我是大胡子！”叔叔说着，用大巴掌把大头儿子拖进了屋。\n忽然，从大胡子叔叔的粗腿后面，探出一张小小的脸，小眼睛盯着大头儿子的大头看。她看着看着，嘴里轻轻念道：“大头大头，下雨不愁，人家有伞，我有大头。”\n念完了，就“咯咯”地笑着又躲到粗腿后面去了。大头儿子摸摸大头，也笑了。\n“这是我的女儿，叫‘小眼睛’。你呢？你叫什么？”大胡子叔叔蹲下身也像一座小山。\n“我……我就叫‘大头儿子’。”\n“哈哈哈……”三个人都笑起来。\n“叔叔你叫什么？”\n“随便，你想叫什么就叫什么，叫‘大狗熊’也行。就是别叫我‘大黑猪’。”\n大头儿子想了想，说：“我就叫你……叫你‘隔壁大大叔’！”", "20": "过生日\n一大清早，小眼睛就来找大头儿子：“今天是我爸爸的生日，我想做一件让他高兴的事情——”\n大头儿子想了想，说：“这容易，我们让他再做一次小毛头，我们来做他的爸爸妈妈。”\n他们跑去跟隔壁大大叔一说，他连连点头，说：“好，好，今天我可以光吃饭不干活了。”\n“妈妈”和“爸爸”把房间整理好，就到了该吃午饭的时候了。\n“妈妈”把牛奶和面粉煮在一起，然后要喂给“小毛头”吃。\n“小毛头”看着锅里的奶糊，皱皱眉头，把脸扭开说：“不吃！”\n“爸爸”忙说：“你是小毛头，还不会说话呢！”\n“小毛头”就摇摇头，又摆摆手。\n“妈妈”温柔地说：“不吃要变成小蚂蚁的，快吃吧！”\n“小毛头”只好张嘴吃一口，又说：“我的生日可以……可以结束了……”\n“爸爸”说：“不行，你还没有哭过，我们还没有哄过你呢。”\n“小毛头”挤挤眼睛，眼泪出不来。他只能用眼药水代替。\n“哇哇哇……”“小毛头”乱哭乱叫，“妈妈”抱着他的手摇，“爸爸”抱着他的脚摇。\n摇着摇着，“小毛头”终于睡着了。\n等“小毛头”醒来时，好哇，他看见他的“爸爸”和“妈妈”正坐在那儿吃他的生日蛋糕呢！\n“我再也不做小毛头了！我也要吃蛋糕！”隔壁大大叔叫着爬起来，冲过去，一头钻进大蛋糕里，把奶油弄得满脸都是。", "21": "数呼噜\n隔壁大大叔昨晚一直在画画，没睡过觉，今天他好困啊！可小眼睛要爸爸陪他们玩，大头儿子也这么说。\n隔壁大大叔打了个大呵欠，说：“那我们来玩个游戏，我假装晕过去，你们来救我。”说着，他就“咚”地倒在地上，眼睛像门一样关住了。\n大头儿子和小眼睛开心极了，他们可以像医生一样去救一个病人。\n小眼睛先拖住他的大手，可大手也晕过去了，拖也拖不动；大头儿子再抱他的大脚，可大脚也晕过去了，抱也抱不动。\n大头儿子和小眼睛想了想，便一起用力把他往门口推。推啊，推啊，推得他们汗也出来了，可他还是一动也不动。\n“爸爸！爸爸！”小眼睛喊。\n“隔壁大大叔！隔壁大大叔！”大头儿子喊。\n喊着喊着，他俩有点儿害怕起来，以为隔壁大大叔真的晕过去了。\n他们找来小头爸爸。\n小头爸爸翻开他的眼皮看看，又贴着他的胸膛听听。\n“呼噜噜，呼噜噜……”隔壁大大叔轻轻地打起呼噜来，小头爸爸笑着说：“他不是晕过去了，他太累，睡着了。”\n小眼睛赶快抱来大枕头；大头儿子赶快拿来毛巾被。他们又像爸爸妈妈那样替他枕好盖好，然后轻轻地关上了门。\n小眼睛和大头儿子就坐在门口，替他守着，不让小孩来吵，不许小鸟来叫。他们一边守着，一边数他的呼噜。数着数着，他们觉得隔壁大大叔好像没睡觉，还在陪他们玩。", "22": "两座纸房子\n隔壁大大叔买了一台冰箱和一台洗衣机，他把冰箱和洗衣机拿出来放好，然后用一把剪刀和一支彩笔，将两只大纸箱做成了两座漂亮的纸房子。\n“哇，纸房子！”小眼睛和大头儿子看见了一起惊叫着，你推我拉，各抢了一座钻进去。\n吃饭了，他们不出来，隔壁大大叔只好去买两只三明治送进纸房子；天黑了，他们也不出来，隔壁大大叔只好找出两只手电筒递进纸房子；睡觉了，他们还不出来，隔壁大大叔只好拿两条毛巾被塞进纸房子。\n小纸房子有门有窗，大头儿子和小眼睛住在里面开心极了，好像这才是他们各自真正的家。他俩还分别在门上写了101号和102号。\n“叭嗒！”隔壁大大叔熄了灯。大头儿子从窗口看出去：啊，外面漆黑一片，好像纸房子真的在马路边。\n“我害怕……”小眼睛在她的房子里说。\n“我也有一点点害怕……”大头儿子觉得自己的心脏越跳越快。\n忽然，一阵大风呼啦啦吹过来，把两座纸房子吹得左右直摇，马上就要倒下来了。\n小眼睛说：“大概是刮台风了！”\n大头儿子说：“那我们快出去，不然准被台风刮到大海里——”\n他们赶快从纸房子里出来，一看哪，原来是天花板上的电风扇在呼啦啦、呼啦啦地吹……\n这会儿，隔壁大大叔正在卧室里偷偷地笑呢。", "23": "飞走的信\n小眼睛最怕虫子，隔壁大大叔就画许多大虫子、小虫子，吓得小眼睛哇哇叫着藏进壁橱里。大头儿子最怕鬼，隔壁大大叔就画许多红鬼、绿鬼，吓得大头儿子嗷嗷喊着爬进床底下。\n大头儿子和小眼睛抓住笔，不许他乱画。\n小眼睛说：“画一张地图给妈妈寄到美国去，好让妈妈早点儿回到我们的新家来。”\n隔壁大大叔说：“还是画一条我们新家门前的小路给妈妈寄去。”\n小眼睛把小路画得细细的、长长的、弯弯的，好像从这头到那头，要走很远很远。\n画完了小路，隔壁大大叔在小路边画了一只长满胡子的大狗熊，说：“这是我。我在等我的妻子。”\n小眼睛接过笔，在大狗熊的屁股后面画下一只眯眯眼老鼠，说：“这是我。我在等我的妈妈。”\n大头儿子也接过笔，在大狗熊的胳肢窝旁画下一只大脑袋兔子，说：“这是我。我在等从美国回来的阿姨。”\n小眼睛拿来一个信封，要把画装进去寄走。\n隔壁大大叔拿过画，说：“我要让它自己飞到美国去。”说着，他把画折成一只小鸟，又找出一只绿气球。然后他带着大头儿子和小眼睛一块儿爬上了房顶。\n绿气球骑在小鸟的肩膀上，小鸟骑在小眼睛的肩膀上，小眼睛骑在大头儿子的肩膀上，大头儿子骑在隔壁大大叔的肩膀上。他们站得高，小鸟也就飞得高。\n哇，小鸟飞起来了，真的飞得又高、又快！", "24": "开心极了的大胡子\n大头儿子在家里等小头爸爸，却等来一位陌生的阿姨，她背着一个大包，满脸是汗。\n她问大头儿子：“一位很高很高的大胡子叔叔和一个很小很小的小眼睛女孩住在哪里？”\n大头儿子愣了愣，才说：“就在隔壁——”\n“笃笃笃！”门打开了。小眼睛一见陌生阿姨，惊讶地大叫起来：“妈妈！”\n隔壁大大叔也很惊讶。他摸摸大胡子，忽然使劲拍起大巴掌。\n小眼睛问：“妈妈，小鸟是什么时候飞到美国的？”\n小眼睛的妈妈说：“是昨天飞到美国的。”说着，她指指小眼睛，“你是那只小眼睛老鼠。”又指指大头儿子，“你是那只大脑袋兔子。”她又从兜里摸出一把小刷子，轻轻刷了刷大大叔的大胡子，继续说：“你嘛，就是那只大狗熊！”\n“咯咯咯咯！”大家都笑起来。\n小眼睛和大头儿子边笑，边抢那把刷子，都要去刷大胡子，吓得隔壁大大叔赶快找出一只大口罩戴上，把大胡子给藏了起来。\n大大叔拉过大头儿子对妻子说：“这是我们最棒的邻居，叫大——头——儿子！”\n小眼睛躲在妈妈背后，只露出一对小小的眼睛，她跟着轻轻念道：“大头大头，下雨不愁，人家有伞，我有大头。人家有大头，我有妈妈的手。”\n哈哈哈哈！隔壁大大叔笑得可响哩，他的大胡子和大嘴巴一使劲，竟把口罩也给绷掉了。\n“噢——”大家见了一起拥上去，都用手去“刷”那一捧开心极了的大胡子。", "25": "《晴天有时下猪》一、日记不是给别人看的\n我叫畠山则安。三年级三班。绰号“十元便宜货”。\n我最自豪的一件事，就是每天记日记。\n我是从二年级开始记日记的。那年暑假，班主任和子老师让我们开始记日记。我一天也不落，还配上了图画。\n第二学期，我把日记带到了学校，被和子老师夸奖了一番：“写得好，十元便宜货。要是这么坚持下去就好啦！”\n现在，我要是有一天没记日记，就坐立不安，连觉都睡不着。\n和子老师曾这样对我说：“日记，不是给别人看的哟！所以，下次不要再让老师看了。但要记真实的事情。不要光是记好事，失败的事啊，错的事啊，全都要一字不漏地记下来。字写错了，能用橡皮擦掉，但那天发生的事情，却是用橡皮擦不掉的。不要不好意思。更不要作假，要正视自己。这才是记日记的目的。那样的话，别人就不会叫你‘十元便宜货’了，至少能涨到一百元左右了！”\n可我有时一边记日记，一边会脸发红。恨不得用铅笔乱涂一气。\n比如说，记了这样的事情的时候：\n5月26日 星期二 雨转晴\n放学回家的路上，水洼没跳过去，掉到了水里。泥水溅到了疖子晴子的裙子上。疖子生气啦，用雨伞打我的书包，叫我十元便宜货。\n疖子晴子不是真的名字。真的名字叫小关晴子。但这是个真的绰号，不是我瞎编的。\n像和子老师说的那样，我把那天发生的事，如实写了下来。\n可是有一天，发生了一件让我担心的事。对谁也没有说过的事，妈妈却知道了。\n她问我：“小关是个什么样的孩子？还挺厉害呢！则安，你可不能输给了女孩子啊。嘿嘿嘿……疖子晴子……”\n我觉得有点奇怪。这件叫人脸红的事情，我没对任何人说过啊。是疖子说的吗？不可能，妈妈根本就不认识疖子。怪了——\n为了不让别人看，我把日记放在了桌子的抽屉里面。也有的时候，桌子会被人翻得乱七八糟。但我以为是妹妹阿玉干的，没在意。因为阿玉还不识字。\n尽管如此，我还是受到了打击……是许多天之后的事情了。一放学，我就直接回家来。“我回来了！”大喊了一声，却没人应声。进屋一看，妈妈正坐在我的桌子前面。我回来了，她竟没有发现。“咯咯咯……”她一边发出声音，还一边哆嗦着肩膀。是在哭吗？我悄悄地凑过去一看，是在笑。妈妈正在读我的日记。\n一股血冲上了脑门，我羞辱极了。“啊呀，你干什么呀！”我一把夺过日记。\n“哇，吓我一大跳！怎么，则安，你已经回来啦？”\n“不是回来了吗？你为什么随便看人家的日记？”\n妈妈若无其事地说：“啊呀，已经这么晚啦。我要去买东西喽！”妈妈一边掩饰，一边逃进了厨房。\n我已经是三年级的学生了，不是幼儿园、一年级的小孩子了。可妈妈还这么瞧不起我！总是把我当成一个小孩子。一直是这样！就说上一次吧，还随便就把我的一封信给撕开了。信里装的是我得奖得来的贴纸。\n发生了这样的事情，还叫我怎么能记真实的事情呢？和子老师明明说过：“日记可不是给别人看的哟！”可就是有人随便偷看，真叫人吃不消。\n日记中怪怪的地方，都被我用橡皮擦掉了。要是有办法，我真想把妈妈的脑子也擦个一干二净！", "26": "《晴天有时下猪》二、厕所里有条蛇\n我琢磨着，怎么样才能叫妈妈认输呢？我有了一个好主意。在日记里写点怪事情，妈妈看了，叫她大吃一惊。\n但也不能写些根本就不存在的谎话呀，好不容易才坚持下来的日记嘛！\n于是，我决定写“明天的日记”。“明天的日记”！我一边笑，一边想。我的脑袋还真够好使的。因为写的是以后的事，不管写的是什么，都不能说是谎话。\n我是这样写的：\n6月4日 星期四 晴\n打开厕所门，里面有条土色的大蟒蛇。人哪怕是被它咬了豆大的一口，也活不长了，准没命。我运足了气，“嗨”的一声，把这条叫人发毛的大蟒蛇干掉了。\n那天夜里，我躺在被窝里想：妈妈如果读了这篇日记，脸上该是一副什么表情呢？一定惊慌失措地打扫厕所吧。嘿嘿嘿……一个人越想越有趣，竟睡着了。\n可是第二天，也就是四号这天，发生了一桩怪事。\n一大早，我就被妹妹阿玉叫醒了。“哥哥，你要迟到了！你要迟到了！”\n“嗯？！”一看闹钟，早就过了起床的时间。“咦，奇怪！铃没响过吗？”我像条懒虫似的钻出了被窝。\n“好困啊——”眼睛黏糊糊的，摇摇晃晃地走进了厕所。咚咚！我敲敲厕所的门。咚咚！里头有回音。\n“哎？爸爸早就上班去了，妈妈又在厨房里……”我觉得有点奇怪，打开门一看，是条蛇。一条好大的蛇。大概是一种叫“青大将”的蛇吧！\n我睡得稀里糊涂的，也不知道害怕。我用报纸卷成一个纸卷，吧嗒吧嗒敲着墙壁，想把它轰跑。蛇哧溜哧溜地逃掉了。从窗户逃到了外面。\n我好像还在做梦似的。妈妈大声喊道：“则安，再不快点，就晚啦！”我急急忙忙地穿好衣服。早饭也没顾得上吃，就飞快地出了家门。连厕所也没上。赶到学校，差一点就迟到了。", "27": "《晴天有时下猪》三、油炸铅笔\n那天晚上，临睡前，我又写了明天的日记。在被窝里胡思乱想，太好玩了。\n妈妈不知道读了今天那段没有……白天什么也没说，好像还没有读过。不过，今天早上，我倒是真被吓了一跳。事情竟照着昨晚写的样子发生了。说不定，那条蛇半夜里偷偷地读了日记。哈哈哈……\n那么，明天这段写点什么呢？有啦，写点妈妈的事情吧！妈妈读了，会“哇”地惊叫起来。偷看别人的日记不对嘛！\n6月5日 星期五 阴天\n妈妈把铅笔用油炸了。爸爸说：“真好吃！”咔嚓咔嚓地吃了进去。\n电视里的天气预报说，明天是阴天，只有天气会像日记里写的一样吧！如果妈妈读了，说不定晚上会油炸什么吧？不会做吧——\n想来想去，我想起了今天早上差一点就迟到的事来。早点睡还是早了点，我还是关了灯，睡觉。\n可是，第二天，一到五号，又出了怪事。是傍晚的事情。正在厨房里忙碌的妈妈，冲我喊道：“则安，你新的铅笔多不多？”\n“有啊，你要干什么？”被我一追问，妈妈出乎意料地说：“今天吃油炸铅笔。”\n哈哈，我知道了。妈妈读了我的日记，在嘲笑我呢！好吧，你嘲笑我，我也不含糊。我故意装出一副满不在乎的样子，拿来了铅笔。“给你！HB四根，2H三根，剩下的是B和2B的。”\n可妈妈却装模作样地说：“谢谢。马上就炸好。”妈妈把铅笔裹上面糊，扔进滚烫的油锅里。哧，啪啪。油花四溅。“啊啊！”“则安，危险，快到一边去！”\n怎么回事？真的炸起铅笔来了！\n吃饭的时候，妈妈把油炸铅笔“砰”的一声摆到了餐桌上。“我先吃了。”爸爸突然就拿起一根油炸铅笔，嚼了起来。咔嚓，嚼了一口。“啊，好吃！”他吃得挺高兴。\n可要是在平常，我稍稍舔一下铅笔尖，他还会发一顿火呢！他吃了下去。我呆呆地看着。\n爸爸说：“则安，你不想吃吗？”当然不想吃。爸爸发出嘎吱嘎吱的声音，香喷喷地吃着油炸铅笔。“还是HB到3B之间的铅笔好吃，又软又香。接下来，想尝尝彩色铅笔了。好吗，则安妈？”\n“是呀，则安，把粉红色和黄绿色的铅笔拿来呀！还有天蓝色的。说不定更好吃。”简直是乱了套了。我可不想把我喜欢的彩色铅笔都油炸了！它们和土豆、胡萝卜不一样！\n妹妹阿玉抓起一根油炸铅笔就要往嘴里塞。“呀，别吃！”我一把从阿玉的手里抢了过来。“哇！哥哥抢走啦！”妹妹哭了。“则安，别闹了！”妈妈生气了。\n这不是开玩笑啊！开玩笑也要适可而止。这顿晚饭是搅得一团糟了。我往大米饭上浇了一个鸡蛋，只喝了一口酱汤，吃了点咸菜。\n没多久，爸爸的脸色开始发青。“肚子疼！”他叫了起来。我担心地对妈妈说：“你看，就是你让他吃油炸铅笔吃的！快叫医生吧！”\n可妈妈却笑了：“哈哈哈，用不着大惊小怪。则安，把橡皮拿过来。”“橡皮？你在说什么呀！还是叫救护车吧。”“好啦好啦，拿来吧！”\n爸爸已经是汗流满面了。妹妹拿来了橡皮。“给，橡皮。”“哎呀，真是个好孩子。”妈妈像擦萝卜泥似的，“咯吱咯吱”地擦了起来。一眨眼的工夫，橡皮泥就堆成了一座山。“对付铅笔，要靠橡皮、橡皮。”妈妈一边说着，一边把橡皮泥倒进了爸爸的嘴里。爸爸歪着脸，闭着嘴巴嚼着，好半天才缓过来。“啊，好多啦。”他终于恢复了常态。", "28": "《晴天有时下猪》四、一条金鱼做了个鬼脸\n我是一败涂地。我输了。爸爸和妈妈还结成一伙，嘲笑我。既然这样，我就让你们看看男人的力量吧！我要给你们写点更荒唐的事情。\n我绞尽脑汁，写了一篇怪得不能再怪了的日记。这下子，爸爸和妈妈读了，非吓呆不可。我想。\n6月6日 星期六 大晴天\n金鱼从金鱼缸里跳了出来，在屋子里乱飞。我拿网子去追，金鱼朝我做了个鬼脸。\n第二天，六号星期六。爸爸因为不上班，一直赖在被窝里不肯起来。我把日记放到抽屉里，上学去了。\n上课时，我总是想着日记的事，老师的话一句也没听进去。这会儿，爸爸和妈妈肯定被我的日记吓了一大跳。等我回家，会说什么呢？我净想这些事了。\n星期六学校只上半天课，我一次也没被老师叫过，这可救了我。\n可从学校回到家后，发现家里有点不大对劲。阿玉一看见我，光着脚丫就跑了过来。“鱼、鱼——”\n“唔，金鱼怎么啦？”我连忙冲进屋去，地板上全是水。桌子上，放着我的捕虫网。“出了什么事？”\n听我这么一问，爸爸和妈妈七嘴八舌地告诉我：“不得了啦，则安！”“金鱼飞起来了！”“飘啊飘啊地就飞了起来。”“可把妈妈吓坏啦。”“它们一会儿躲到电视机后头，一会儿粘到天花板上——”“现在，总算是用网子把它们抓到了。”“这回它们逃不出来了。”\n金鱼缸上面，压着电话号码簿。我发出了一阵呻吟。天呀，爸爸妈妈真是了不得。本想叫他们大吃一惊，反过来，却叫我大吃一惊。和油炸铅笔不一样，我还以为他们演不出金鱼飞起来这幕戏呢！竟能干出这样的事……我算是服了。", "29": "《晴天有时下猪》五、晴天，有时下猪\n我又输掉啦。可我也不能就此撒手不干哪。是他们不对嘛！随便偷看我的日记，绝对不能原谅。无论如何，一定要让他们认输。\n我动开了脑筋，决定胡说八道一通，叫他们跳起来！写点他们绝对演不出来的事。\n这天晚上，吃完晚饭，我连电视也没看，就坐到了桌子前面。爸爸和妈妈说起我来：“哟，则安的作业一大堆吧？今天是星期六呀，少见。”“是呀，明天会下雨。”他们以为我在学习。哈哈哈！\n明天是星期天，我可以一整天待在家里。假装到什么地方去玩，然后悄悄往窗户里瞅。看看爸爸和妈妈读这篇日记时那副目瞪口呆的样子。哈哈哈！\n我用了两个小时，写完了明天的日记。\n6月7日 星期日 晴天有时下猪\n今天的天气，一开始是晴天，午后下起猪来了。全家一起吃丸子时，丸子卡在了妈妈的嗓子眼儿里。一拉妈妈的脖子，妈妈的脖子一下子伸得老长。\n写得太有趣了，我都等不到明天啦。我钻进被窝，还故意把日记打开，放到了枕头边上。装出记着记着日记，就睡着了的样子。灯也没关，装作睡着了。嘿嘿嘿，妈妈快点来读呀……\n我把眼睛睁开一条缝，练习起偷看妈妈来了。可因为今天是星期六，爸爸和妈妈就是坐在电视前不动。等啊等啊，就是不来。等到最后，我竟真的睡着了。\n七号星期天。一大早，我就被咚咚的声音吵醒了。是从厨房传来的菜刀的声音。我睁开了眼睛，好刺眼。一个大晴天。日记还和昨天晚上一样。妈妈他们看了还是没看，我不知道。\n我穿好衣服，走到妈妈那里。“哼，你看了我的日记吧？”妈妈正在切洋葱，不解地问我：“哎呀，怎么啦？日记怎么啦？”“没什么——”我死死地盯住妈妈的脸，观察着她。“我没看啊。你不相信妈妈说的话吗？妈妈好伤心啊！哎呀，你看我的眼睛！”妈妈的眼睛里滚出了泪水。是切洋葱切的。女人的脸皮真厚。\n这时，爸爸大声叫了起来：“喂，快来看哪。电视里在说怪话啦！”过去一看，电视里正在播送天气预报。“南风将会增强。虽然是晴天，但从午后起，局部地区有时会下猪。”\n我一惊，还以为心脏停止跳动了呢。电视里的播音员一本正经地说：“晴天，有时下猪。”就像我昨晚写的日记一样。\n爸爸笑嘻嘻地说：“这是什么节目啊？逗笑节目？肯定是在开玩笑！”咔嚓咔嚓，爸爸转了一个电视频道。可别的频道也在播天气预报。画面上打出了一行白字。这样写道：“晴天，有时下猪。”\n“啊呀？哟，好像是真的哟！”爸爸突然发出了兴奋的叫声。我连忙打开报纸一看。天哪，报纸上也写着：“晴天，有时下猪。”而且，天气图上还画着这样的标记：“猪”。\n我以为爸爸会发火了吧，他却快乐地笑了起来：“哈哈哈，这可太有意思啦。阿玉呀，要下猪了呀，猪呀。猪、猪，要下猪了。”阿玉乐得直跳：“猪、猪、猪、猪！”妈妈也开心极了：“这下可帮了大忙了。今天晚上，吃炸猪排吧。不过，要是不早一点下的话，晚饭就来不及了。”\n简直是在胡说八道。我完全蒙掉了。是在做梦吗？\n爸爸和妈妈不可能让电视和报纸也跟着一起演戏。报纸上，清清楚楚地写着：“晴天，有时下猪。”我哆嗦了一下。这是真的啊。日记上写的事，真的发生了。\n“要是真的下起猪来，可怎么办啊？”爸爸露出了为难的表情。“嗯……如果真下起猪来，可就糟了。”我想，爸爸果然也在担心着呢。\n我朝天空望去。天是蓝蓝的。连一片云彩都没有。不可能下猪。妈妈也说：“天气预报根本就不准的，不用担心。”爸爸也笑了起来：“说得也是，是呀！哈哈哈。”这下我放心了。早上就这么过去了。可到了下午，就不对头了。", "30": "《晴天有时下猪》六、妈妈的脖子伸长了\n过了中午，爸爸悠闲地擦起打高尔夫球的球杆来了。我和阿玉正在玩。妈妈说：“三点的点心时间，吃点什么好呢？啊，有了，吃丸子吧。香喷喷、香喷喷的丸子！”妈妈立刻系上围裙，做起丸子来。\n我不信任妈妈了。叫我说什么呢，铅笔都给油炸了。要是叫我吃怪里怪气的丸子，我可受不了。所以，我一直盯着她做丸子。揉好了面粉，撒上炒熟的黄豆面。豆馅儿用的是罐头，我放心了。好像没有什么异常的地方。我决定吃丸子。妈妈常常做蛋糕，好吃极了。\n阿玉的眼睛都发亮了：“丸子！丸子！”她开心死了。还没好呀？还没好呀？我们俩都等不及了。\n可是，妈妈把烧好的丸子放到盘子里，自己却先吃上了。“来吧来吧，多吃点！”虽然嘴上这样说，却只顾自己一个人吃。她两手抓丸子，大口大口地吃着。我和阿玉伸不出手了，只是呆呆地看着她。妈妈把满满一盘子丸子，全吃光了。她腮帮子鼓了起来，嘴里塞满了丸子，死劲儿地嚼着。\n我觉得要出事。刚一这么想，妈妈就哼哼地叫了起来。丸子卡在嗓子眼儿里啦！\n“啊，妈妈！”我一喊，爸爸冲了进来。“怎么啦？怎么啦？啊？丸子卡住了吗？是吗？是吗？”“别慌，我马上就能治好。”爸爸去拉妈妈的脖子。\n我吓了一跳，拦住了爸爸：“不能拉！”“不要乱叫。”爸爸拉起来。“脖子会被拉长的哟！”“傻瓜！脖子怎么会拉长？我只是拉一下。”妈妈的脖子长了一点。\n我拼命地按住爸爸的手。“不行！要拉长的啊——”爸爸火了。“则安，你漫画看得太多了。妈妈又不是妖怪。”他又去拉。“可、可是伸长了呀——”“则安，你每天是为了什么才去学校的啊？又不是橡皮筋，人的脖子怎么会一下子——”说完，爸爸就用力拉起妈妈的脖子来。妈妈的脖子一下子伸长了。\n爸爸抱着妈妈的脑袋，重重地一屁股坐到了地上。妈妈的脖子像蛇一样长了。爸爸哆嗦起来。脸都白了。“啊呀，变成脖子可长可短的怪物啦！”\n相反，妈妈倒是满不在乎：“多谢，这下脖子顺畅多了。”真是一个不知愁的人！知不知道自己的脖子变成什么样了呢——\n阿玉觉得好玩，搂住了妈妈的脖子。爸爸用被子盖住脑袋，睡觉了。"}};            // {zika:[{cls,cards}], eka:[...]}

    if(/premium|enhanced|siri/i.test(v.name)) s+=3;
    if(/Ting-?Ting|Mei-?Jia|Yu-?shu|Li-?mu|Han/i.test(v.name)) s+=1;
    if(v.localService) s+=1; return s; };
  zhVoice = zh.sort((a,b)=>score(b)-score(a))[0]||null;
}
pickVoice(); if(typeof speechSynthesis!=='undefined') speechSynthesis.onvoiceschanged=pickVoice;
let readToken=0;
function speak(t,rate){ try{ readToken++; speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(t); u.lang='zh-CN'; u.rate=rate||.7; if(zhVoice)u.voice=zhVoice; speechSynthesis.speak(u);}catch(e){} }

// ---- sidebar ----
const side=document.getElementById('side');
for(let i=1;i<=N;i++){ const b=document.createElement('button'); b.textContent='第'+i+'课'; b.dataset.cls=i; b.onclick=()=>{cls=i; resetSeq(); syncSide(); render();}; side.appendChild(b); }
function syncSide(){ [...side.children].forEach(b=>b.classList.toggle('on',+b.dataset.cls===cls)); }

// ---- tabs ----
const tabsEl=document.getElementById('tabs');
[...tabsEl.children].forEach(b=>b.onclick=()=>{ tab=b.dataset.tab; resetSeq(); render(); });
function syncTabs(){ [...tabsEl.children].forEach(b=>b.classList.toggle('on',b.dataset.tab===tab)); }

// ---- views ----
const deckV=document.getElementById('deckView'), testV=document.getElementById('testView'), keV=document.getElementById('keView');
function deck(){ return DATA[tab][cls-1].cards; }

function render(){
  syncSide(); syncTabs();
  testV.classList.add('hidden');
  if(tab==='ke' || tab==='book'){ deckV.classList.add('hidden'); keV.classList.remove('hidden'); renderKe(); return; }
  keV.classList.add('hidden'); deckV.classList.remove('hidden');
  ensureSeq(); idx=seq[pos];
  document.getElementById('shuffle').classList.toggle('on',shuffled);
  const c=deck()[idx];
  document.getElementById('pinyin').textContent=c.p;
  const h=document.getElementById('hanzi');
  if(tab==='zika' && c.hi!=null){
    h.innerHTML='';
    [...c.c].forEach((ch,i)=>{
      const s=document.createElement('span');
      s.textContent=ch;
      s.style.color=(i===c.hi?'#222':'#9a9a9a');
      s.style.cursor='pointer';
      s.onclick=(e)=>{ e.stopPropagation(); if(sw)return; speak(ch); };   // tap a single character to pronounce it
      h.appendChild(s);
    });
  } else {
    h.textContent=c.c;
  }
  fitHanzi();
  document.getElementById('counter').textContent=(pos+1)+' / '+seq.length+(shuffled?'　🔀':'');
  if(autoSpeak) speak(c.c);   // auto-pronounce only when the toggle is on
}
function ensureSeq(){ const k=tab+'|'+cls; if(k!==seqKey){ seqKey=k; seq=deck().map((_,i)=>i); pos=0; shuffled=false; } }
// keep multi-char words on one line: shrink font until it fits the card width
function fitHanzi(){
  const h=document.getElementById('hanzi'); if(!h.textContent) return;
  h.style.fontSize='';
  const avail=h.parentElement.clientWidth-36;
  if(h.scrollWidth>avail){
    const cur=parseFloat(getComputedStyle(h).fontSize);
    h.style.fontSize=(cur*avail/h.scrollWidth)+'px';
  }
}
window.addEventListener('resize',()=>{ if(!deckV.classList.contains('hidden')) fitHanzi(); });
document.getElementById('prev').onclick=()=>{ pos=(pos-1+seq.length)%seq.length; render(); };
document.getElementById('next').onclick=()=>{ pos=(pos+1)%seq.length; render(); };
document.getElementById('shuffle').onclick=()=>{
  ensureSeq(); shuffled=!shuffled;
  seq=deck().map((_,i)=>i);
  if(shuffled){ seed=(Date.now()%233280)||7; shuffle(seq); }
  pos=0; render();
};
document.getElementById('speak').onclick=()=>speak(deck()[idx].c);
document.getElementById('hanzi').onclick=()=>{ if(sw)return; speak(deck()[idx].c); };
// swipe left/right on the card to navigate
(function(){
  const st=document.querySelector('#deckView .stage'); let x0=null,y0=null;
  st.addEventListener('touchstart',e=>{ const t=e.changedTouches[0]; x0=t.clientX; y0=t.clientY; sw=false; },{passive:true});
  st.addEventListener('touchend',e=>{
    if(x0==null) return;
    const t=e.changedTouches[0], dx=t.clientX-x0, dy=t.clientY-y0;
    if(Math.abs(dx)>40 && Math.abs(dx)>Math.abs(dy)){
      sw=true; setTimeout(()=>{ sw=false; },400);
      document.getElementById(dx<0?'next':'prev').click();
    }
    x0=null;
  },{passive:true});
})();

// ---- test (over current deck) ----
let order=[],qi=0,correct=0,seed=1,wrongList=[];
function rnd(){ seed=(seed*9301+49297)%233280; return seed/233280; }
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(rnd()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
let actx=null;
function errSound(){ try{ actx=actx||new (window.AudioContext||window.webkitAudioContext)(); if(actx.state==='suspended')actx.resume();
  const o=actx.createOscillator(),g=actx.createGain(); o.type='square'; o.frequency.setValueAtTime(180,actx.currentTime);
  o.frequency.exponentialRampToValueAtTime(90,actx.currentTime+.2); g.gain.setValueAtTime(.18,actx.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+.25); o.connect(g); g.connect(actx.destination); o.start(); o.stop(actx.currentTime+.26);
}catch(e){} }
function startTest(){
  seed=(idx+1)*(cls+7)*(tab.length+3)+deck().length;
  order=shuffle(deck().map((_,i)=>i)); qi=0; correct=0; wrongList=[];
  deckV.classList.add('hidden'); testV.classList.remove('hidden'); showQ();
}
function showQ(){
  if(qi>=order.length){ finish(); return; }
  document.getElementById('tprompt').textContent='读拼音，选对应的'+(tab==='zika'?'词':'字');
  const q=deck()[order[qi]];
  document.getElementById('score').textContent='第'+(qi+1)+'/'+order.length+'题　得分 '+correct;
  document.getElementById('qpinyin').textContent=q.p;
  speak(q.c);
  const pool=deck().map((c,i)=>i).filter(i=>i!==order[qi]); shuffle(pool);
  const choices=shuffle([order[qi],pool[0],pool[1],pool[2]].filter(x=>x!==undefined));
  const box=document.getElementById('opts'); box.innerHTML='';
  let wrongThisQ=false;
  choices.forEach(i=>{ const b=document.createElement('button'); b.textContent=deck()[i].c;
    b.onclick=()=>{
      if(i===order[qi]){
        b.className='right'; if(!wrongThisQ) correct++; speak(q.c);
        setTimeout(()=>{ qi++; showQ(); },700);
      } else {
        b.className='wrong'; b.disabled=true; errSound();
        if(!wrongThisQ){ wrongThisQ=true; wrongList.push(q.c); }
        document.getElementById('tprompt').textContent='再试一次 🔄';
      }
    }; box.appendChild(b);
  });
}
function finish(){
  const box=document.getElementById('opts'); box.innerHTML='';
  document.getElementById('qpinyin').textContent=correct+' / '+order.length;
  document.getElementById('tprompt').textContent=(correct===order.length?'全对！太棒了 🎉':'完成！再来一次吧');
  document.getElementById('score').textContent='';
  if(wrongList.length){
    const w=document.createElement('div'); w.style.cssText='grid-column:1/-1;text-align:center;margin:4px 0 8px;';
    w.innerHTML='<div style="color:#e74c3c;font-size:16px;margin-bottom:4px;">错的字（点一下听发音）：</div>';
    wrongList.forEach(c=>{ const s=document.createElement('span'); s.textContent=c; s.style.cssText='display:inline-block;font-size:30px;margin:4px 10px;cursor:pointer;color:#c0392b;'; s.onclick=()=>speak(c); w.appendChild(s); });
    box.appendChild(w);
  }
  const r=document.createElement('button'); r.textContent='重新测验'; r.style.gridColumn='1/-1'; r.onclick=startTest; box.appendChild(r);
}
document.getElementById('startTest').onclick=startTest;
document.getElementById('qspeak').onclick=()=>speak(deck()[order[qi]].c);
document.getElementById('backToCards').onclick=()=>{ testV.classList.add('hidden'); deckV.classList.remove('hidden'); render(); };

// ---- 课文 / 整本书 reader (tappable chars + read + pause/resume) ----
const KEWEN = DATA.kewen || {}, BOOK = DATA.book || {};
const READ_RATE=.55, TAP_RATE=.7;
const keText=document.getElementById('keText');
let curRead='';
function fillChars(text, parent){
  const out=[];
  for(const ch of text){
    if(/[一-鿿]/.test(ch)){ const s=document.createElement('span'); s.className='kc'; s.textContent=ch; s.onclick=()=>speak(ch,TAP_RATE); parent.appendChild(s); out.push(s); }
    else parent.appendChild(document.createTextNode(ch));
  }
  return out;
}
// karaoke highlight: map spoken-text char index -> its .kc span
let hlSpans=[], hlMap=[];
function setHl(text, spans){
  hlSpans=spans||[]; hlMap=[]; let k=0;
  for(let i=0;i<text.length;i++) hlMap[i]=/[一-鿿]/.test(text[i])?k++:-1;
}
function clearHl(){ keText.querySelectorAll('.kc.khl,.kc.kseg').forEach(s=>s.classList.remove('khl','kseg')); }
function hlRange(start,len,cls){ for(let i=start;i<start+len;i++){ const o=hlMap[i]; if(o>=0&&hlSpans[o]) hlSpans[o].classList.add(cls); } }
function hlWord(start,len){
  keText.querySelectorAll('.kc.khl').forEach(s=>s.classList.remove('khl'));
  hlRange(start,len,'khl');
  const o=hlMap[start]; if(o>=0&&hlSpans[o]) hlSpans[o].scrollIntoView({block:'nearest'});
}
function renderKe(){
  const txt=(tab==='book'?BOOK:KEWEN)[cls]||'（暂无内容）';
  curRead=txt; storyList=[]; storyIdx=0; paused=false;   // reset reader for new content
  keText.innerHTML=''; keSpans=fillChars(txt, keText); keText.scrollTop=0;
  syncPause();
}
// resumable story player (segment-based; iOS pause()/resume() is unreliable)
let storyList=[], storyIdx=0, storyRate=READ_RATE, paused=false, keSpans=[];
function buildSegs(text){
  const LONG=/[。！？!?]/, SHORT=/[，、；：,;:]/; const segs=[]; let off=0;
  text.split('\n').forEach((line,li)=>{
    let cur='', cs=off;
    for(const ch of line){ cur+=ch;
      if(LONG.test(ch)){ segs.push({t:cur,p:480,s:cs}); cs+=cur.length; cur=''; }
      else if(SHORT.test(ch)){ segs.push({t:cur,p:280,s:cs}); cs+=cur.length; cur=''; } }
    if(cur.trim()) segs.push({t:cur,p:0,s:cs});
    if(segs.length) segs[segs.length-1].p=Math.max(segs[segs.length-1].p, li===0?600:420);
    off+=line.length+1;
  });
  return segs.filter(s=>s.t.trim());
}
function playStory(){
  const my=++readToken;
  (function next(){
    if(my!==readToken || paused || storyIdx>=storyList.length){ if(storyIdx>=storyList.length){ syncPause(); clearHl(); } return; }
    const seg=storyList[storyIdx];
    const u=new SpeechSynthesisUtterance(seg.t.trim());
    const base=seg.s+(seg.t.length-seg.t.trimStart().length);
    u.lang='zh-CN'; u.rate=storyRate; if(zhVoice)u.voice=zhVoice;
    // sentence highlight up front (fallback when no boundary events, e.g. some iOS voices)
    u.onstart=()=>{ if(my!==readToken) return; clearHl(); hlRange(seg.s,seg.t.length,'kseg'); const o=hlMap[base]; if(o>=0&&hlSpans[o]) hlSpans[o].scrollIntoView({block:'nearest'}); };
    u.onboundary=e=>{ if(my===readToken) hlWord(base+e.charIndex, e.charLength||1); };
    u.onend=()=>{ if(my===readToken && !paused){ storyIdx++; setTimeout(next, seg.p); } };
    speechSynthesis.speak(u);
  })();
}
function speakStory(text){ storyList=buildSegs(text); setHl(text, keSpans); storyIdx=0; paused=false; readToken++; try{speechSynthesis.cancel();}catch(e){} syncPause(); playStory(); }
function togglePause(){
  if(!storyList.length || storyIdx>=storyList.length) return;
  if(paused){ paused=false; playStory(); }
  else { paused=true; readToken++; try{speechSynthesis.cancel();}catch(e){} }
  syncPause();
}
function syncPause(){ const b=document.getElementById('stop'); if(!b) return;
  const playing=storyList.length && storyIdx<storyList.length && !paused;
  b.innerHTML = playing ? '&#9208; 暂停' : '&#9654; 继续'; }
document.getElementById('read').onclick=()=>{ if(curRead) speakStory(curRead); };
document.getElementById('stop').onclick=togglePause;

// auto-pronounce toggle
const asBtn=document.getElementById('autospk');
try{ autoSpeak = localStorage.getItem('autoSpeak')==='1'; }catch(e){}
function syncAs(){ asBtn.textContent=(autoSpeak?'🔊 自动读：开':'🔇 自动读：关'); asBtn.classList.toggle('on',autoSpeak); }
asBtn.onclick=()=>{ autoSpeak=!autoSpeak; try{localStorage.setItem('autoSpeak',autoSpeak?'1':'0');}catch(e){} syncAs(); if(autoSpeak) speak(deck()[idx].c); };
syncAs();

syncSide(); render();
</script>
